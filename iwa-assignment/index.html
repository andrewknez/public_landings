      <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

      {/* ── HERO ── */}
      <Wide style={{ paddingTop: compact ? 48 : 80, paddingBottom: compact ? 40 : 60 }}>
        <div style={{ fontFamily: mono, fontSize: 11, letterSpacing: "0.2em", color: P.accent, textTransform: "uppercase", fontWeight: 500, marginBottom: 20 }}>
          Covalent Networks — Workforce Intelligence
        </div>
        <h1 style={{ fontFamily: serif, fontSize: "clamp(30px, 4vw + 8px, 56px)", fontWeight: 300, color: P.ink, lineHeight: 1.15, margin: "0 0 20px" }}>
          A Smarter Way to Assign Shop-Floor Work
        </h1>
        <p style={{ fontFamily: serif, fontSize: "clamp(16px, 0.8vw + 10px, 21px)", color: P.inkMuted, lineHeight: 1.7, margin: 0, maxWidth: "min(580px, 80%)" }}>
          Intelligent Work Assignment automatically matches your workforce to your highest-priority
          work — respecting skills, capacity, and your operational rules.
        </p>
        <div style={{ width: 60, height: 1, background: P.rule, marginTop: 40 }} />
      </Wide>

      {/* ═══════════════ SECTION 1: THE CHALLENGE ═══════════════ */}
      <SectionHeader
        title="The Challenge"
        subtitle="Shift planning is a high-stakes puzzle that gets solved under pressure."
      />
      <Prose>
        <p>
          Every shift, someone has to decide who works on what. Dozens of workers with
          different skills. Dozens of jobs at different stages of completion. When it's done
          by gut — scanning a whiteboard, making mental tradeoffs — things slip through the cracks.
          High-priority work goes understaffed. Skilled workers get wasted on low-priority jobs.
          New starters sit idle.
        </p>
      </Prose>
      <Figure caption="Toggle between views to see the difference optimization makes.">
        <BeforeAfterDiagram />
      </Figure>

      {/* ═══════════════ SECTION 2: HOW IT WORKS ═══════════════ */}
      <SectionHeader
        title="How It Works"
        subtitle="Three things the model knows about your operation."
      />
      <Prose>
        <p>
          The model takes three inputs and produces one output: an optimized set of assignments
          for the shift.
        </p>
      </Prose>

      <Prose><SectionLabel>1 · Priorities</SectionLabel>
        <p>
          <strong>It knows your priorities.</strong> A production planner ranks every job by
          urgency — considering progress, delivery dates, and operational needs. Rank 1 gets staffed first, then Rank 2, and so on. The model always
          respects this order.
        </p>
      </Prose>
      <Figure caption="Jobs ranked by the planner. Progress and delivery dates drive the priority order.">
        <PriorityRanking />
      </Figure>

      <Prose><SectionLabel>2 · Availability</SectionLabel>
        <p>
          <strong>It knows who's available.</strong> The supervisor marks who showed up and who
          didn't. Each available worker has a fixed number of hours in their shift. As jobs get assigned,
          their remaining capacity ticks down. The model packs work into each person's shift
          without overloading them.
        </p>
      </Prose>
      <Figure caption="Five workers ready with 8 hours each. Marchand called out — the supervisor flagged them as unavailable.">
        <WorkerRoster />
      </Figure>

      <Prose><SectionLabel>3 · Skills & Efficiency</SectionLabel>
        <p>
          <strong>It knows who can do what — and how well.</strong> Not every worker is
          certified for every job. Among those who are, the model knows their historical
          efficiency — how fast they've completed similar work before. It assigns the
          best-qualified available person to each job.
        </p>
      </Prose>
      <Figure caption="Hover a worker to see their eligible jobs, or a job to rank eligible workers by efficiency.">
        <EligibilityGraph />
      </Figure>
      <Prose>
        <p>
          With this knowledge, the model works through the priority list one job at a time.
          For each job, it ranks the available workers by how well they'd perform, picks the best,
          and moves on — filling shifts efficiently without overloading anyone.
        </p>
      </Prose>
      <Figure caption="Step through the assignment process. Watch the model pick the best available workers for each job.">
        <AuctionVisual />
      </Figure>
      <Aside>
        <strong>The result:</strong> The highest-priority work gets the most capable available
        people, every shift, automatically — with a clear rationale for every decision.
      </Aside>

      <Divider />
      <Prose>
        <p style={{ fontFamily: serif, fontSize: "clamp(21px, 1.8vw + 10px, 28px)", fontWeight: 400, fontStyle: "italic", color: P.ink, marginBottom: 4 }}>
          And When the Plan Breaks?
        </p>
        <p>
          A good plan is only useful until something changes. A worker calls out sick.
          A rush job gets added. Without IWA, one absence cascades into three or four manual
          reassignments — each one a rushed gut call that ripples across the floor.
        </p>
        <p>
          With IWA, you just rerun the model. It takes the updated roster and produces a
          new optimized plan in seconds. No scrambling, no dominoes.
        </p>
      </Prose>
      <Figure caption="Click any worker to simulate an absence. Watch the manual cascade, then hit Rerun IWA.">
        <AbsenceCascadeDiagram />
      </Figure>

      {/* ═══════════════ SECTION 3: YOUR RULES, BUILT IN ═══════════════ */}
      <SectionHeader
        title="Your Rules, Built In"
        subtitle="Optimization alone isn't enough. The model adapts to how your operation actually runs."
      />
      <Prose>
        <p>
          Every factory floor has rules that pure optimization would ignore — crew continuity
          on multi-day jobs, union agreements about worker priority, and workflow preferences
          that keep things running smoothly. IWA has configurable rules (called <em>gates</em>)
          that enforce these constraints automatically.
        </p>
      </Prose>

      {/* Gate 1 */}
      <Divider />
      <Prose>
        <p style={{ fontFamily: serif, fontSize: "clamp(21px, 1.8vw + 10px, 28px)", fontWeight: 400, fontStyle: "italic", color: P.ink, marginBottom: 4 }}>
          Keep Crews Together Across Shifts
        </p>
        <p>
          When a job takes multiple days — like assembling a jet engine — the workers
          who started it should continue it. They know the work, they own the quality.
          IWA automatically reserves them for the same engine, even if priorities shift overnight.
        </p>
      </Prose>
      <Figure caption="Toggle to see the difference. With the rule, every worker continues their engine.">
        <Gate1Timeline />
      </Figure>

      {/* Gate 2 */}
      <Divider />
      <Prose>
        <p style={{ fontFamily: serif, fontSize: "clamp(21px, 1.8vw + 10px, 28px)", fontWeight: 400, fontStyle: "italic", color: P.ink, marginBottom: 4 }}>
          Reduce Context Switching
        </p>
        <p>
          When a worker builds three diffusers in a shift, they stay in flow — same tooling,
          same setup, same muscle memory. Without this rule, the model might scatter them across
          different job types, wasting time on workstation changes and mental resets.
        </p>
      </Prose>
      <Figure caption="Toggle to compare. With the rule, one job type dominates the shift.">
        <Gate2BatchTrack />
      </Figure>

      {/* Gate 3 */}
      <Divider />
      <Prose>
        <p style={{ fontFamily: serif, fontSize: "clamp(21px, 1.8vw + 10px, 28px)", fontWeight: 400, fontStyle: "italic", color: P.ink, marginBottom: 4 }}>
          Respect Union Agreements
        </p>
        <p>
          When workers are borrowed from another zone to help with overflow, union contracts
          require that the zone's own people get first pick of assignments. IWA enforces this
          automatically — primary workers are assigned first, borrowed workers fill what remains.
        </p>
      </Prose>
      <Figure caption="Step through the two passes. Primary workers go first, borrowed workers fill the rest.">
        <Gate3Precedence />
      </Figure>

      {/* ═══════════════ SECTION 4: THE OUTCOME ═══════════════ */}
      <SectionHeader
        title="The Outcome"
        subtitle="What changes when assignment decisions are automated."
      />

      <Wide style={{ marginBottom: 40 }}>
        <div style={{ display: "grid", gridTemplateColumns: compact ? "1fr" : vw < 768 ? "1fr 1fr" : "1fr 1fr 1fr", gap: 16 }}>
          {[
            { metric: "Seconds", desc: "to generate a full shift of optimized assignments — replacing hours of manual planning", icon: "⚡" },
            { metric: "Zero", desc: "manual cascade when someone calls out. Rerun the model and get a new plan instantly", icon: "🔄" },
            { metric: "Higher", desc: "labor utilization per shift. Workers are fully loaded with priority work — no idle time, no overloading", icon: "📈" },
            { metric: "Every", desc: "assignment backed by a clear rationale — who was picked, why, and what rule applied. Audit-ready from day one", icon: "📋" },
            { metric: "Consistent", desc: "enforcement of your operational rules, every shift, every time. No human variance, no forgotten constraints", icon: "✓" },
            { metric: "Broader", desc: "skill development across your workforce. Workers get varied assignments instead of the same top performers carrying every shift", icon: "🌱" },
          ].map((item, i) => (
            <div key={i} style={{
              padding: "clamp(20px, 2vw, 32px)", borderRadius: 12,
              background: P.cardBg, border: `1px solid ${P.ruleFaint}`,
              boxShadow: "0 1px 4px rgba(0,0,0,0.04)",
            }}>
              <div style={{ fontSize: 24, marginBottom: 8 }}>{item.icon}</div>
              <div style={{ fontFamily: serif, fontSize: "clamp(24px, 1.8vw + 10px, 36px)", fontWeight: 400, color: P.accent, lineHeight: 1.1 }}>
                {item.metric}
              </div>
              <div style={{ fontFamily: sans, fontSize: "clamp(13px, 0.5vw + 8px, 15px)", color: P.inkMuted, marginTop: 8, lineHeight: 1.5 }}>
                {item.desc}
              </div>
            </div>
          ))}
        </div>
      </Wide>

      <Prose style={{ paddingBottom: 20 }}>
        <p style={{ fontFamily: serif, fontSize: "clamp(16px, 0.8vw + 10px, 21px)", color: P.inkMuted, lineHeight: 1.7, fontStyle: "italic" }}>
          Every shift starts with clarity. Every assignment has a reason. And when the unexpected
          happens, you're seconds away from a new optimized plan.
        </p>
      </Prose>

      {/* ═══════════════ CTA SECTION ═══════════════ */}
      <CTASection />

      {/* Footer */}
      <Wide style={{ paddingTop: 20, paddingBottom: 40 }}>
        <div style={{ paddingTop: 20, borderTop: `1px solid ${P.rule}` }}>
          <span style={{ fontFamily: mono, fontSize: 10, letterSpacing: "0.15em", color: P.inkFaint, textTransform: "uppercase" }}>
            Covalent Networks · Workforce Intelligence Suite
          </span>
        </div>
      </Wide>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(IWACustomer));
  </script>
</body>
</html>
