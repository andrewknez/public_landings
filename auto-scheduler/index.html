  { id: "O10", name: "Hazmat Handling Level II", group: "Safety", dur: "8h", h: 8, crit: "critical" },
  { id: "O11", name: "SMAW Welding - Structural", group: "Welding", dur: "10h", h: 10, crit: "high" },
  { id: "O12", name: "First Aid / CPR / AED", group: "Safety", dur: "4h", h: 4, crit: "high" },

const AREAS = ["Assembly Line A", "Assembly Line B", "Turbine Machining", "Final Assembly", "Test Cell", "Fabrication Shop"];
const TRAINERS = [
  { id: "T1", name: "J. Kowalski", objs: ["O1","O4","O11"] },
  { id: "T2", name: "D. Reeves", objs: ["O2","O5","O10"] },
  { id: "T3", name: "C. Medina", objs: ["O3","O7"] },
  { id: "T4", name: "P. Nair", objs: ["O6","O8","O9"] },
  { id: "T5", name: "R. Kim", objs: ["O2","O5","O12"] },
];
const ROOMS = [
  { id: "R1", name: "Training Center A - Rm 1", cap: 6 },
  { id: "R2", name: "Welding Lab B", cap: 4 },
  { id: "R3", name: "Safety Classroom C", cap: 8 },
];
const WORKERS = [
  { id: "W01", name: "Maria Santos", role: "Welder II", area: "Fabrication Shop", shift: "Day" },
  { id: "W02", name: "James Okafor", role: "Welder I", area: "Fabrication Shop", shift: "Day" },
  { id: "W03", name: "Chen Wei", role: "Sr. Machinist", area: "Turbine Machining", shift: "Day" },
  { id: "W04", name: "Sarah Mitchell", role: "Assembler III", area: "Assembly Line A", shift: "Swing" },
  { id: "W05", name: "Robert Tran", role: "Assembler II", area: "Assembly Line A", shift: "Day" },
  { id: "W06", name: "Aisha Patel", role: "Test Technician", area: "Test Cell", shift: "Day" },
  { id: "W07", name: "Marcus Johnson", role: "Welder III", area: "Fabrication Shop", shift: "Swing" },
  { id: "W08", name: "Elena Volkov", role: "Machinist II", area: "Turbine Machining", shift: "Night" },
  { id: "W09", name: "David Park", role: "Material Handler", area: "Final Assembly", shift: "Day" },
  { id: "W10", name: "Lisa Fernandez", role: "Assembler I", area: "Assembly Line B", shift: "Day" },
  { id: "W11", name: "Tom Bradley", role: "Welder II", area: "Fabrication Shop", shift: "Night" },
  { id: "W12", name: "Yuki Tanaka", role: "QC Inspector", area: "Final Assembly", shift: "Day" },
  { id: "W13", name: "Andre Williams", role: "Crane Operator", area: "Assembly Line A", shift: "Day" },
  { id: "W14", name: "Kathryn Bell", role: "Assembler II", area: "Assembly Line B", shift: "Swing" },
  { id: "W15", name: "Omar Hassan", role: "Welder I", area: "Fabrication Shop", shift: "Day" },
];

const NOW = new Date(2026, 2, 20);
const addD = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r; };
const fmtD = d => d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
const weekKey = d => { const s = new Date(d); s.setDate(s.getDate() - s.getDay() + 1); return s.toISOString().slice(0, 10); };

function buildBacklog() {
  const a = [
    ["W01","O1",-5],["W01","O4",18],["W01","O5",42],["W01","O2",88],
    ["W02","O1",12],["W02","O5",25],["W02","O11",65],
    ["W03","O6",8],["W03","O3",35],["W03","O9",120],
    ["W04","O2",-2],["W04","O5",15],["W04","O8",90],
    ["W05","O5",22],["W05","O3",55],["W05","O12",110],
    ["W06","O10",10],["W06","O2",30],["W06","O5",72],
    ["W07","O1",28],["W07","O4",45],["W07","O11",80],["W07","O2",150],
    ["W08","O6",38],["W08","O3",95],
    ["W09","O7",14],["W09","O5",60],["W09","O12",130],
    ["W10","O5",-8],["W10","O8",50],["W10","O12",100],
    ["W11","O1",20],["W11","O4",55],["W11","O2",85],
    ["W12","O8",32],["W12","O9",78],
    ["W13","O3",6],["W13","O5",40],["W13","O12",140],
    ["W14","O2",48],["W14","O5",70],["W14","O8",160],
    ["W15","O1",16],["W15","O5",35],["W15","O11",90],
  ];
  return a.map(([wId, oId, dte], idx) => {
    const w = WORKERS.find(x => x.id === wId), o = OBJECTIVES.find(x => x.id === oId);
    const cs = o.crit === "critical" ? 4 : o.crit === "high" ? 3 : 2;
    const us = dte <= 0 ? 4 : dte <= 30 ? 3 : dte <= 90 ? 2 : 1;
    return {
      id: `BL-${String(idx + 1).padStart(3, "0")}`, worker: w, obj: o,
      expiry: addD(NOW, dte), dte, crit: o.crit,
      urg: dte <= 0 ? "overdue" : dte <= 30 ? "due30" : dte <= 90 ? "due90" : "due12mo",
      pri: Math.min(100, Math.round((cs * us / 16) * 100 + (dte <= 0 ? 15 : 0))),
      status: "unscheduled",
    };
  }).sort((a, b) => b.pri - a.pri || a.dte - b.dte);
}

function optimizedSchedule(items) {
  const sessions = [], used = new Set(), awl = {};
  const byObj = {};
  [...items].sort((a, b) => b.pri - a.pri || a.dte - b.dte).forEach(i => { byObj[i.obj.id] = byObj[i.obj.id] || []; byObj[i.obj.id].push(i); });

  Object.entries(byObj).forEach(([oid, oi]) => {
    const obj = OBJECTIVES.find(o => o.id === oid);
    const trs = TRAINERS.filter(t => t.objs.includes(oid));
    if (!trs.length) return;
    const q = oi.filter(i => !used.has(i.id)).sort((a, b) => a.dte - b.dte);
    const cap = ["O2","O5","O10","O12"].includes(oid) ? 8 : ["O1","O4","O11"].includes(oid) ? 4 : 5;
    let bi = 0;
    while (q.length) {
      const batch = [], aib = {};
      const td = Math.max(3, q[0].dte <= 0 ? 3 : q[0].dte - 7);
      for (let i = 0; i < q.length && batch.length < cap;) {
        const it = q[i], ar = it.worker.area, wk = weekKey(addD(NOW, td));
        const cl = (awl[`${ar}-${wk}`] || 0) + (aib[ar] || 0);
        if (cl >= 2 && it.dte > 0 && batch.length >= 2) { i++; continue; }
        batch.push(it); aib[ar] = (aib[ar] || 0) + 1; q.splice(i, 1);
      }
      if (!batch.length) break;
      const sd = addD(NOW, td), wk = weekKey(sd);
      batch.forEach(b => { used.add(b.id); awl[`${b.worker.area}-${wk}`] = (awl[`${b.worker.area}-${wk}`] || 0) + (1); });
      const tr = trs[bi % trs.length];
      const rm = obj.group === "Welding" ? ROOMS[1] : obj.group === "Safety" ? ROOMS[2] : ROOMS[0];
      const oc = batch.filter(b => b.dte <= 0).length;
      const ac = {}; batch.forEach(b => { ac[b.worker.area] = (ac[b.worker.area] || 0) + 1; });
      const ma = Object.entries(ac).sort((a, b) => b[1] - a[1])[0];
      const cr = ma[1] >= 3 ? "high" : ma[1] >= 2 ? "medium" : "low";
      const parts = [];
      if (oc > 0) parts.push(`${oc} overdue worker${oc > 1 ? "s" : ""} \u2014 earliest available slot.`);
      if (batch.length >= cap - 1) parts.push(`High utilization: ${batch.length}/${cap} seats filled.`);
      const cw = batch.filter(b => { const oth = items.filter(i => i.worker.id === b.worker.id && i.id !== b.id && Math.abs(i.dte - b.dte) < 21); return oth.length > 0; });
      if (cw.length > 0) parts.push(`${cw.map(w => w.worker.name).join(", ")} ha${cw.length > 1 ? "ve" : "s"} other renewals within 3 weeks \u2014 consolidation opportunity.`);
      if (batch.length > 1) { const areas = [...new Set(batch.map(b => b.worker.area))]; if (areas.length === 1) parts.push(`All ${batch.length} workers from ${areas[0]}.`); else parts.push(`Workers from ${areas.length} areas grouped by deadline.`); }
      if (cr !== "low") parts.push(`Coverage: ${ma[1]} from ${ma[0]} \u2014 staggering applied.`);
      sessions.push({ id: `S-${String(sessions.length + 1).padStart(3, "0")}`, obj, trainer: tr, room: rm, date: sd, items: batch, cap, hoursOff: batch.length * obj.h, util: Math.round((batch.length / cap) * 100), cr, hasOD: oc > 0, rationale: parts.join(" ") });
      bi++;
    }
  });
  const wds = new Set();
  sessions.forEach(s => s.items.forEach(i => wds.add(`${i.worker.id}-${s.date.toISOString().slice(0, 10)}`)));
  return {
    sessions: sessions.sort((a, b) => a.date - b.date),
    stats: {
      sessionCount: sessions.length,
      backlogCovered: used.size,
      backlogTotal: items.length,
      totalHoursOff: sessions.reduce((s, x) => s + x.hoursOff, 0),
      avgUtil: sessions.length ? Math.round(sessions.reduce((s, x) => s + x.util, 0) / sessions.length) : 0,
      workerDays: wds.size,
      overdueAddressed: items.filter(i => i.dte <= 0 && used.has(i.id)).length,
      overdueTotal: items.filter(i => i.dte <= 0).length,
    },
  };
}

const C = {
  pri: "#05448E", priDk: "#03336B", priLt: "#E8F0F8", priMd: "#B8D4F0",
  acc: "#0B7A3E", accLt: "#E6F4EC", warn: "#B85C00", warnLt: "#FFF4E6",
  err: "#C4314B", errLt: "#FDE8EC", srf: "#FFFFFF", bg: "#F4F6F9",
  brd: "#E2E6EB", brdLt: "#F0F2F5", txt: "#1A1A2E", txM: "#5A6070", txL: "#8A90A0",
};

const CritBadge = ({ c }) => {
  const [bg, co, lb] = c === "critical" ? [C.errLt, C.err, "Critical"] : c === "high" ? [C.warnLt, C.warn, "High"] : [C.priLt, C.pri, "Medium"];
  return <span style={{ padding: "2px 7px", borderRadius: 4, fontSize: 10, fontWeight: 600, backgroundColor: bg, color: co, textTransform: "uppercase" }}>{lb}</span>;
};
const UrgBadge = ({ u, d }) => {
  const [bg, co, lb] = u === "overdue" ? [C.err, "#fff", `${Math.abs(d)}d overdue`] : u === "due30" ? [C.warn, "#fff", `${d}d`] : u === "due90" ? [C.warnLt, C.warn, `${d}d`] : [C.brdLt, C.txM, `${d}d`];
  return <span style={{ display: "inline-flex", alignItems: "center", gap: 3, padding: "2px 7px", borderRadius: 4, fontSize: 10, fontWeight: 600, backgroundColor: bg, color: co, fontVariantNumeric: "tabular-nums" }}>{u === "overdue" && "\u26A0 "}{lb}</span>;
};
const StatusBadge = ({ s }) => {
  const [bg, co, lb, dot] = s === "unscheduled" ? [C.brdLt, C.txM, "Unscheduled", C.txL] : s === "recommended" ? [C.priLt, C.pri, "Recommended", C.pri] : [C.accLt, C.acc, "Scheduled", C.acc];
  return <span style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "2px 7px", borderRadius: 4, fontSize: 10, fontWeight: 600, backgroundColor: bg, color: co }}><span style={{ width: 5, height: 5, borderRadius: "50%", backgroundColor: dot }} />{lb}</span>;
};
const PriBar = ({ v }) => {
  const co = v >= 75 ? C.err : v >= 50 ? C.warn : C.pri;
  return <div style={{ display: "flex", alignItems: "center", gap: 6, minWidth: 80 }}><div style={{ flex: 1, height: 5, backgroundColor: C.brdLt, borderRadius: 3, overflow: "hidden" }}><div style={{ width: `${v}%`, height: "100%", backgroundColor: co, borderRadius: 3 }} /></div><span style={{ fontSize: 10, fontWeight: 700, color: co, fontVariantNumeric: "tabular-nums", minWidth: 20, textAlign: "right" }}>{v}</span></div>;
};
const CRDot = ({ r }) => {
  const co = r === "high" ? C.err : r === "medium" ? C.warn : C.acc;
  return <span style={{ display: "inline-flex", alignItems: "center", gap: 3, fontSize: 10, fontWeight: 600, color: co }}><span style={{ width: 6, height: 6, borderRadius: "50%", backgroundColor: co }} />{r.charAt(0).toUpperCase() + r.slice(1)}</span>;
};
const SmallMetric = ({ label, value, sub, accent }) => <div style={{ flex: 1, padding: "10px 12px", backgroundColor: C.srf, borderRadius: 8, border: `1px solid ${C.brd}` }}><div style={{ fontSize: 9.5, fontWeight: 600, color: C.txL, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 2 }}>{label}</div><div style={{ fontSize: 20, fontWeight: 700, color: accent || C.txt, lineHeight: 1.1, fontVariantNumeric: "tabular-nums" }}>{value}</div>{sub && <div style={{ fontSize: 10.5, color: C.txM, marginTop: 2 }}>{sub}</div>}</div>;

function Processing({ onDone }) {
  const [step, setStep] = useState(0);
  const [prog, setProg] = useState(0);
  const steps = [
    ["Scanning backlog\u2026", "44 training needs across 15 workers"],
    ["Grouping by objective\u2026", "Identifying cohorts by area and shift"],
    ["Detecting consolidation opportunities\u2026", "Workers with multiple renewals in same window"],
    ["Applying staggering constraints\u2026", "Protecting area coverage across sessions"],
    ["Scoring & ranking\u2026", "Generating recommended sessions"],
  ];
  useEffect(() => {
    const iv = setInterval(() => {
      setProg(p => { const n = p + 1.6; if (n >= 100) { clearInterval(iv); setTimeout(onDone, 250); return 100; } setStep(Math.min(Math.floor(n / 20), 4)); return n; });
    }, 50);
    return () => clearInterval(iv);
  }, []);
  return (
    <div style={{ position: "fixed", inset: 0, backgroundColor: "rgba(0,0,0,0.45)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, backdropFilter: "blur(3px)" }}>
      <div style={{ backgroundColor: C.srf, borderRadius: 14, padding: "28px 36px", width: 420, boxShadow: "0 20px 60px rgba(0,0,0,0.2)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
          <div style={{ width: 32, height: 32, borderRadius: 8, backgroundColor: C.priLt, display: "flex", alignItems: "center", justifyContent: "center" }}>
            <svg width="15" height="15" viewBox="0 0 20 20" fill="none" style={{ animation: "spin 1s linear infinite" }}><path d="M10 2v4m0 8v4m-8-8h4m8 0h4m-2.83-5.17l-2.83 2.83m-4.68 4.68l-2.83 2.83m0-10.34l2.83 2.83m4.68 4.68l2.83 2.83" stroke={C.pri} strokeWidth="2" strokeLinecap="round" /></svg>
          </div>
          <div><div style={{ fontSize: 14, fontWeight: 700 }}>Optimizing Schedule</div><div style={{ fontSize: 11, color: C.txM }}>Generating recommendations</div></div>
        </div>
        <div style={{ height: 4, backgroundColor: C.brdLt, borderRadius: 2, overflow: "hidden", marginBottom: 16 }}>
          <div style={{ width: `${prog}%`, height: "100%", backgroundColor: C.pri, borderRadius: 2, transition: "width 0.08s linear" }} />
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
          {steps.map(([l, d], i) => (
            <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 8, opacity: i <= step ? 1 : 0.25, transition: "opacity 0.3s" }}>
              <div style={{ width: 15, height: 15, borderRadius: "50%", flexShrink: 0, marginTop: 1, display: "flex", alignItems: "center", justifyContent: "center", backgroundColor: i < step ? C.acc : i === step ? C.pri : C.brdLt }}>
                {i < step ? <svg width="8" height="8" viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5L8 3" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" /></svg> : i === step ? <div style={{ width: 4, height: 4, borderRadius: "50%", backgroundColor: "#fff" }} /> : null}
              </div>
              <div><div style={{ fontSize: 11.5, fontWeight: 600, color: i <= step ? C.txt : C.txL }}>{l}</div><div style={{ fontSize: 10, color: i <= step ? C.txM : C.txL }}>{d}</div></div>
            </div>
          ))}
        </div>
      </div>
      <style>{`@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}`}</style>
    </div>
  );
}

function ResultsSummary({ stats }) {
  return (
    <div style={{ backgroundColor: C.srf, borderRadius: 10, border: `1px solid ${C.brd}`, padding: "16px 20px", marginBottom: 12 }}>
      <div style={{ fontSize: 12, fontWeight: 700, color: C.txt, marginBottom: 12 }}>Recommended Schedule Summary</div>
      <div style={{ display: "flex", gap: 8 }}>
        <div style={{ flex: 1, textAlign: "center", padding: "10px 0" }}>
          <div style={{ fontSize: 28, fontWeight: 800, color: C.pri, lineHeight: 1 }}>{stats.sessionCount}</div>
          <div style={{ fontSize: 10, fontWeight: 600, color: C.txL, textTransform: "uppercase", letterSpacing: "0.05em", marginTop: 4 }}>Sessions</div>
        </div>
        <div style={{ width: 1, backgroundColor: C.brd }} />
        <div style={{ flex: 1, textAlign: "center", padding: "10px 0" }}>
          <div style={{ fontSize: 28, fontWeight: 800, color: C.txt, lineHeight: 1 }}>{stats.totalHoursOff}h</div>
          <div style={{ fontSize: 10, fontWeight: 600, color: C.txL, textTransform: "uppercase", letterSpacing: "0.05em", marginTop: 4 }}>Hours Off Floor</div>
        </div>
        <div style={{ width: 1, backgroundColor: C.brd }} />
        <div style={{ flex: 1, textAlign: "center", padding: "10px 0" }}>
          <div style={{ fontSize: 28, fontWeight: 800, color: C.acc, lineHeight: 1 }}>{stats.avgUtil}%</div>
          <div style={{ fontSize: 10, fontWeight: 600, color: C.txL, textTransform: "uppercase", letterSpacing: "0.05em", marginTop: 4 }}>Avg Utilization</div>
        </div>
        <div style={{ width: 1, backgroundColor: C.brd }} />
        <div style={{ flex: 1, textAlign: "center", padding: "10px 0" }}>
          <div style={{ fontSize: 28, fontWeight: 800, color: C.acc, lineHeight: 1 }}>{stats.overdueAddressed}/{stats.overdueTotal}</div>
          <div style={{ fontSize: 10, fontWeight: 600, color: C.txL, textTransform: "uppercase", letterSpacing: "0.05em", marginTop: 4 }}>Overdue Cleared</div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [bl, setBl] = useState(() => buildBacklog());
  const [view, setView] = useState("backlog");
  const [selItem, setSelItem] = useState(null);
  const [selRec, setSelRec] = useState(null);
  const [running, setRunning] = useState(false);
  const [done, setDone] = useState(false);
  const [result, setResult] = useState(null);
  const [approved, setApproved] = useState(new Set());

  const m = useMemo(() => ({
    total: bl.length,
    unsched: bl.filter(i => i.status === "unscheduled").length,
    overdue: bl.filter(i => i.dte <= 0).length,
    due30: bl.filter(i => i.dte > 0 && i.dte <= 30).length,
    rec: bl.filter(i => i.status === "recommended").length,
    sched: bl.filter(i => i.status === "scheduled").length,
  }), [bl]);

  const finish = useCallback(() => {
    const r = optimizedSchedule(bl.filter(i => i.status === "unscheduled"));
    setResult(r);
    setBl(prev => {
      const next = prev.map(i => ({ ...i }));
      r.sessions.forEach(s => s.items.forEach(si => { const it = next.find(i => i.id === si.id); if (it) it.status = "recommended"; }));
      return next;
    });
    setDone(true); setRunning(false); setView("recommendations");
  }, [bl]);

  return (
    <div style={{ fontFamily: "'IBM Plex Sans', -apple-system, sans-serif", backgroundColor: C.bg, minHeight: "100vh", color: C.txt }}>
      {running && <Processing onDone={finish} />}
      <div style={{ backgroundColor: C.pri, padding: "0 24px", height: 46, display: "flex", alignItems: "center", justifyContent: "space-between", color: "#fff" }}>
        <span style={{ fontSize: 13, fontWeight: 700 }}>COVALENT | Capability Management</span>
      </div>
      <div style={{ padding: "16px 24px", maxWidth: 1400, margin: "0 auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
          <h1 style={{ fontSize: 18, fontWeight: 700 }}>Training Scheduling Optimization</h1>
          {!done && <button onClick={() => setRunning(true)} style={{ backgroundColor: C.pri, color: "#fff", border: "none", padding: "8px 16px", borderRadius: 6, cursor: "pointer" }}>Run Optimization</button>}
        </div>
        <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
          <SmallMetric label="Backlog" value={m.total} />
          <SmallMetric label="Unscheduled" value={m.unsched} accent={C.warn} />
          <SmallMetric label="Overdue" value={m.overdue} accent={C.err} />
          {done && <SmallMetric label="Scheduled" value={m.sched} accent={C.acc} />}
        </div>
        {done && result && <ResultsSummary stats={result.stats} />}
        <div style={{ backgroundColor: C.srf, borderRadius: 8, border: `1px solid ${C.brd}`, overflow: "hidden" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
            <thead><tr style={{ backgroundColor: C.bg, textAlign: "left" }}>
              <th style={{ padding: 10 }}>PRIORITY</th><th style={{ padding: 10 }}>WORKER</th><th style={{ padding: 10 }}>OBJECTIVE</th><th style={{ padding: 10 }}>EXPIRY</th><th style={{ padding: 10 }}>STATUS</th>
            </tr></thead>
            <tbody>
              {bl.map(it => (
                <tr key={it.id} style={{ borderBottom: `1px solid ${C.brdLt}` }}>
                  <td style={{ padding: 10 }}><PriBar v={it.pri} /></td>
                  <td style={{ padding: 10 }}>{it.worker.name}</td>
                  <td style={{ padding: 10 }}>{it.obj.name}</td>
                  <td style={{ padding: 10 }}><UrgBadge u={it.urg} d={it.dte} /></td>
                  <td style={{ padding: 10 }}><StatusBadge s={it.status} /></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
