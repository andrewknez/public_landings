<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Covalent — Training Scheduler</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── RESET ──────────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: 'IBM Plex Sans', sans-serif; }

/* ── TOKENS ─────────────────────────────────────────────────────────────────── */
:root {
  --bg-base:       #eef1f6;
  --bg-surface:    #ffffff;
  --bg-card:       #f6f8fb;
  --bg-hover:      #edf1f8;
  --border:        #dde3ed;
  --border-light:  #c5cfe0;
  --text-primary:  #111827;
  --text-secondary:#4b5563;
  --text-dim:      #9ca3af;
  --accent:        #1a56db;
  --accent-dark:   #1345b5;
  --accent-glow:   rgba(26,86,219,0.08);
  --topbar-bg:     #1a3568;
  --topbar-border: #163060;
  --blue:          #1a56db;
  --blue-dim:      rgba(26,86,219,0.10);
  --green:         #057a55;
  --green-dim:     rgba(5,122,85,0.10);
  --red:           #e02424;
  --red-dim:       rgba(224,36,36,0.10);
  --orange:        #c4520a;
  --orange-dim:    rgba(196,82,10,0.10);
  --gray-dim:      rgba(107,114,128,0.10);
  --shadow:        0 2px 8px rgba(26,53,104,0.10);
  --shadow-md:     0 4px 16px rgba(26,53,104,0.14);
  --shadow-lg:     0 16px 48px rgba(26,53,104,0.18);
  --radius:        6px;
  --radius-lg:     10px;
  --font-sans:     'IBM Plex Sans', sans-serif;
  --font-mono:     'IBM Plex Mono', monospace;
}

body { background: var(--bg-base); color: var(--text-primary); display: flex; flex-direction: column; }

/* ── TOPBAR ─────────────────────────────────────────────────────────────────── */
.topbar {
  height: 52px; flex-shrink: 0;
  background: var(--topbar-bg); border-bottom: 1px solid var(--topbar-border);
  display: flex; align-items: center; padding: 0 20px; gap: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,.2); z-index: 50;
}
.topbar-logo   { font-size: 14px; font-weight: 700; color: #fff; font-family: var(--font-mono); letter-spacing: .1em; display:flex; align-items:center; gap:7px; }
.logo-dot      { width: 7px; height: 7px; background: #f6a623; border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.35} }
.topbar-sep    { width: 1px; height: 20px; background: rgba(255,255,255,.15); }
.topbar-mod    { font-size: 13px; color: rgba(255,255,255,.6); }
.topbar-spacer { flex: 1; }
.nav-tabs { display: flex; background: rgba(255,255,255,.08); border-radius: var(--radius); padding: 2px; gap: 2px; }
.nav-tab  { padding: 5px 14px; border-radius: 4px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; font-family: var(--font-sans); color: rgba(255,255,255,.65); background: transparent; transition: all .1s; }
.nav-tab.active { background: rgba(255,255,255,.18); color: #fff; }
.nav-tab:hover:not(.active) { background: rgba(255,255,255,.1); color: rgba(255,255,255,.85); }
.overdue-pill {
  display: flex; align-items: center; gap: 6px; padding: 4px 10px;
  border-radius: 20px; background: rgba(224,36,36,.15); border: 1px solid rgba(224,36,36,.3);
  font-size: 11px; font-weight: 600; color: #fca5a5; cursor: pointer; font-family: var(--font-mono);
}
.overdue-pill:hover { background: rgba(224,36,36,.22); }
.op-icon { width: 16px; height: 16px; border-radius: 50%; background: var(--red); color: #fff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
.tbar-user { display: flex; align-items: center; gap: 7px; font-size: 12px; color: rgba(255,255,255,.7); }
.tbar-avatar { width: 26px; height: 26px; border-radius: 50%; background: rgba(246,166,35,.3); color: #f6a623; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; font-family: var(--font-mono); }

/* ── APP LAYOUT ─────────────────────────────────────────────────────────────── */
.app { flex: 1; display: flex; overflow: hidden; }

/* ── SIDEBAR ────────────────────────────────────────────────────────────────── */
.sidebar {
  width: 230px; flex-shrink: 0; background: var(--bg-surface);
  border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-hd { padding: 12px 16px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.sidebar-hd-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text-dim); font-family: var(--font-mono); }
.sidebar-count { font-size: 10px; font-family: var(--font-mono); padding: 1px 6px; background: var(--bg-card); border-radius: 10px; color: var(--accent); border: 1px solid var(--border); }
.sidebar-body  { flex: 1; overflow-y: auto; }
.sidebar-body::-webkit-scrollbar { width: 3px; }
.sidebar-body::-webkit-scrollbar-thumb { background: var(--border); }

.sidebar-group-label { padding: 8px 16px 4px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text-dim); font-family: var(--font-mono); }

.worker-item { display: flex; align-items: center; gap: 10px; padding: 8px 14px; cursor: pointer; transition: background .1s; }
.worker-item:hover { background: var(--bg-hover); }
.worker-item.selected { background: var(--accent-glow); }
.worker-avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; font-family: var(--font-mono); }
.worker-name   { font-size: 12px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.worker-name.sel { color: var(--accent); font-weight: 600; }
.worker-meta   { font-size: 10px; color: var(--text-secondary); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tag-trainer   { font-size: 9px; font-weight: 700; font-family: var(--font-mono); padding: 1px 5px; border-radius: 3px; background: rgba(26,86,219,.1); color: var(--accent); border: 1px solid rgba(26,86,219,.2); white-space: nowrap; flex-shrink: 0; }
.overdue-badge { display: inline-flex; align-items: center; gap: 3px; margin-top: 2px; font-size: 9px; font-weight: 600; color: var(--red); font-family: var(--font-mono); }
.ov-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--red); }

/* ── CONTENT AREA ───────────────────────────────────────────────────────────── */
.content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.hidden  { display: none !important; }

/* ═══════════════════════════════════════════════════════════════════════════
   PROFILE VIEW
═══════════════════════════════════════════════════════════════════════════ */
.profile { flex: 1; overflow-y: auto; padding: 24px 28px; }
.profile::-webkit-scrollbar { width: 4px; }
.profile::-webkit-scrollbar-thumb { background: var(--border); }

.profile-header { display: flex; align-items: flex-start; gap: 18px; margin-bottom: 24px; padding: 20px; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow); }
.profile-avatar { width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; font-family: var(--font-mono); }
.profile-name  { font-size: 20px; font-weight: 700; color: var(--text-primary); line-height: 1.2; }
.profile-role  { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }
.profile-meta  { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
.meta-pill { display: flex; flex-direction: column; gap: 1px; }
.meta-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text-dim); font-family: var(--font-mono); }
.meta-value { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.profile-spacer { flex: 1; }

.cap-control { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.cap-label { font-size: 11px; color: var(--text-secondary); font-family: var(--font-mono); }
.cap-stepper { display: flex; align-items: center; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.cap-btn { width: 26px; height: 26px; border: none; background: var(--bg-card); color: var(--text-secondary); cursor: pointer; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
.cap-btn:hover:not(:disabled) { background: var(--accent-glow); color: var(--accent); }
.cap-btn:disabled { opacity: .3; cursor: not-allowed; }
.cap-val { min-width: 28px; text-align: center; font-size: 13px; font-weight: 700; font-family: var(--font-mono); color: var(--text-primary); padding: 0 4px; }

.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.section-title  { font-size: 13px; font-weight: 700; color: var(--text-primary); }
.btn-assign { display: flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: var(--radius); border: 1px solid var(--accent); background: var(--accent-glow); color: var(--accent); font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font-sans); }
.btn-assign:hover { background: rgba(26,86,219,.14); }

.obj-table { width: 100%; border-collapse: collapse; background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow); margin-bottom: 22px; }
.obj-table th { padding: 8px 14px; font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-dim); font-family: var(--font-mono); text-align: left; background: var(--bg-card); border-bottom: 1px solid var(--border); }
.obj-table td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.obj-table tr:last-child td { border-bottom: none; }
.obj-table tr:hover td { background: var(--bg-hover); }
.obj-name { font-weight: 500; color: var(--text-primary); }
.obj-dur  { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); margin-top: 2px; }

.badge { display: inline-flex; align-items: center; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; border: 1px solid; font-family: var(--font-mono); letter-spacing: .04em; text-transform: uppercase; white-space: nowrap; }
.badge.assigned    { color: var(--text-secondary); background: var(--gray-dim); border-color: rgba(107,114,128,.25); }
.badge.in_progress { color: var(--accent); background: var(--blue-dim); border-color: rgba(26,86,219,.25); }
.badge.active      { color: var(--green); background: var(--green-dim); border-color: rgba(5,122,85,.25); }
.badge.certified   { color: #7c3aed; background: rgba(124,58,237,.08); border-color: rgba(124,58,237,.25); }

.session-list { display: flex; flex-direction: column; gap: 10px; }
.session-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; display: flex; align-items: flex-start; gap: 14px; box-shadow: var(--shadow); transition: box-shadow .12s; }
.session-card:hover { box-shadow: var(--shadow-md); }
.session-card.overdue { border-left: 3px solid var(--red); }
.sess-status-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.sess-body { flex: 1; min-width: 0; }
.sess-obj  { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.sess-meta { font-size: 11px; color: var(--text-secondary); margin-top: 3px; font-family: var(--font-mono); }
.sess-actions { display: flex; gap: 6px; flex-shrink: 0; }
.sess-btn { padding: 4px 10px; border-radius: var(--radius); border: 1px solid var(--border); background: transparent; font-size: 11px; font-weight: 600; cursor: pointer; font-family: var(--font-sans); color: var(--text-secondary); transition: all .1s; }
.sess-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
.sess-btn.danger:hover { border-color: var(--red); color: var(--red); background: var(--red-dim); }
.sess-btn.success:hover { border-color: var(--green); color: var(--green); background: var(--green-dim); }

/* ═══════════════════════════════════════════════════════════════════════════
   CALENDAR / GANTT VIEW
═══════════════════════════════════════════════════════════════════════════ */
.cal-wrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; padding: 20px 24px; gap: 14px; background: var(--bg-base); }

.cal-toolbar { display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap; }
.cal-title   { font-size: 15px; font-weight: 700; color: var(--text-primary); }
.cal-range   { font-size: 12px; color: var(--text-secondary); font-family: var(--font-mono); }
.toolbar-spacer { flex: 1; }

.legend      { display: flex; gap: 12px; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-secondary); }
.legend-dot  { width: 8px; height: 8px; border-radius: 2px; }

.row-toggle { display: flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.row-btn { padding: 5px 12px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; background: transparent; color: var(--text-secondary); font-family: var(--font-sans); transition: all .1s; }
.row-btn + .row-btn { border-left: 1px solid var(--border); }
.row-btn.active { background: rgba(124,58,237,.1); color: #7c3aed; }
.row-btn:hover:not(.active) { background: var(--bg-hover); }

.zoom-toggle { display: flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.zoom-btn { padding: 5px 12px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; background: transparent; color: var(--text-secondary); font-family: var(--font-sans); transition: all .1s; }
.zoom-btn + .zoom-btn { border-left: 1px solid var(--border); }
.zoom-btn.active { background: var(--accent-glow); color: var(--accent); }
.zoom-btn:hover:not(.active) { background: var(--bg-hover); }

.btn-nav { padding: 5px 12px; font-size: 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-surface); color: var(--text-secondary); cursor: pointer; font-family: var(--font-sans); transition: all .1s; }
.btn-nav:hover { border-color: var(--accent); color: var(--accent); }
.btn-today { color: var(--accent) !important; border-color: var(--accent) !important; }

.cal-grid-wrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--bg-surface); box-shadow: var(--shadow); }

.cal-header-row { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg-card); }
.cal-header-axis { width: 210px; flex-shrink: 0; border-right: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 8px; }
.axis-label { font-size: 10px; font-family: var(--font-mono); font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text-dim); }
.axis-count { font-size: 10px; font-family: var(--font-mono); padding: 1px 6px; background: var(--bg-surface); border-radius: 10px; color: var(--accent); border: 1px solid var(--border); }
.cal-header-days { flex: 1; display: grid; }

.cal-hcell { padding: 10px 8px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--text-secondary); border-right: 1px solid var(--border); font-family: var(--font-mono); position: relative; text-align: center; }
.cal-hcell:last-child { border-right: none; }
.cal-hcell .day-n { font-size: 16px; font-weight: 700; color: var(--text-primary); font-family: var(--font-sans); display: block; margin-top: 2px; }
.cal-hcell.today .day-n { color: var(--accent); }
.cal-hcell.compact { padding: 5px 0 4px; }
.cal-hcell.compact .day-n { font-size: 11px; margin-top: 1px; }
.cal-hcell.compact .day-letter { font-size: 9px; display: block; }
.cal-hcell.month-start { border-left: 2px solid var(--border-light); }
.month-badge { position: absolute; top: -16px; left: 0; right: 0; text-align: center; font-size: 8px; font-weight: 700; color: var(--text-dim); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .1em; pointer-events: none; }

.cal-body { flex: 1; overflow-y: auto; }
.cal-body::-webkit-scrollbar { width: 4px; }
.cal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.gantt-row { display: flex; border-bottom: 1px solid var(--border); }
.gantt-row:last-child { border-bottom: none; }

.row-label { width: 210px; flex-shrink: 0; border-right: 1px solid var(--border); padding: 10px 14px; display: flex; align-items: flex-start; gap: 10px; background: var(--bg-surface); cursor: pointer; transition: background .1s; }
.row-label:hover { background: var(--bg-hover); }
.row-label.sel-row { background: var(--accent-glow); }

.row-body { flex: 1; position: relative; cursor: pointer; min-height: 56px; overflow: visible; transition: background .1s; }
.row-body:hover { background: rgba(0,0,0,.012); }
.row-body:hover .row-add { opacity: 1; transform: scale(1); }
.row-add { position: absolute; bottom: 5px; right: 8px; width: 20px; height: 20px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; opacity: 0; pointer-events: none; transition: opacity .15s, transform .15s; transform: scale(.75); box-shadow: var(--shadow); }

.day-sep { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--border); pointer-events: none; }
.today-hl { position: absolute; top: 0; bottom: 0; background: rgba(26,86,219,.05); pointer-events: none; border-left: 1px solid rgba(26,86,219,.2); }

/* Span bars */
.span-bar { position: absolute; height: 26px; display: flex; align-items: center; gap: 5px; padding: 0 8px; font-size: 11px; font-weight: 600; overflow: hidden; cursor: pointer; z-index: 1; border: 1px solid transparent; border-radius: 5px; white-space: nowrap; transition: filter .12s, box-shadow .12s; box-sizing: border-box; }
.span-bar:hover { filter: brightness(.93); box-shadow: var(--shadow-md); z-index: 3; }
.span-bar.scheduled { background: var(--blue-dim);   border-color: rgba(26,86,219,.4);  color: var(--blue); }
.span-bar.completed { background: var(--green-dim);  border-color: rgba(5,122,85,.4);   color: var(--green); }
.span-bar.overdue   { background: var(--red-dim);    border-color: rgba(224,36,36,.4);  color: var(--red); animation: ov-pulse 2s infinite; }
.span-bar.extended  { background: var(--orange-dim); border-color: rgba(196,82,10,.4);  color: var(--orange); }
.span-bar.cancelled { background: var(--gray-dim);   border-color: rgba(107,114,128,.3); color: var(--text-dim); opacity: .7; }
.span-bar.dim       { opacity: .22; }
.span-bar.clip-left  { border-left: none; border-top-left-radius: 0; border-bottom-left-radius: 0; padding-left: 4px; }
.span-bar.clip-right { border-right: none; border-top-right-radius: 0; border-bottom-right-radius: 0; padding-right: 4px; }
.span-bar.clip-left::before  { content: '◀'; font-size: 8px; opacity: .6; flex-shrink: 0; }
.span-bar.clip-right::after  { content: '▶'; font-size: 8px; opacity: .6; flex-shrink: 0; margin-left: auto; }
.bar-dot  { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.bar-text { overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
.bar-sub  { font-size: 10px; font-weight: 400; opacity: .7; flex-shrink: 0; }
@keyframes ov-pulse { 0%,100%{border-color:rgba(224,36,36,.4)}50%{border-color:rgba(224,36,36,.1)} }

/* Concurrency strip */
.conc-strip { height: 24px; flex-shrink: 0; border-top: 1px solid var(--border); display: flex; background: var(--bg-card); }
.conc-axis  { width: 210px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; align-items: center; padding: 0 14px; font-size: 9px; font-family: var(--font-mono); font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text-dim); }
.conc-cols  { flex: 1; display: grid; }
.conc-cell  { display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--border); font-size: 9px; font-family: var(--font-mono); font-weight: 600; color: var(--text-dim); position: relative; cursor: default; }
.conc-cell:last-child { border-right: none; }
.conc-cell.has-n { color: var(--accent); }
.conc-cell.hi-n  { color: var(--red); background: rgba(224,36,36,.04); }
.conc-tt { display: none; position: absolute; bottom: 26px; left: 50%; transform: translateX(-50%); background: var(--topbar-bg); border-radius: var(--radius); padding: 4px 8px; font-size: 10px; color: #fff; white-space: nowrap; z-index: 99; pointer-events: none; }
.conc-cell:hover .conc-tt { display: block; }

/* Obj row pill */
.obj-pill { display: inline-flex; align-items: center; gap: 4px; background: rgba(124,58,237,.08); border: 1px solid rgba(124,58,237,.2); border-radius: 4px; padding: 2px 7px; font-size: 10px; font-family: var(--font-mono); color: #7c3aed; }

/* Status bar */
.status-bar { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); display: flex; justify-content: space-between; flex-shrink: 0; padding-top: 2px; }

/* ═══════════════════════════════════════════════════════════════════════════
   SCHEDULE MODAL
═══════════════════════════════════════════════════════════════════════════ */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.38); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
.overlay.hidden { display: none; }
.modal { background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: var(--radius-lg); width: 100%; max-width: 540px; max-height: 92vh; display: flex; flex-direction: column; box-shadow: var(--shadow-lg); }

.modal-hd { padding: 16px 22px 12px; border-bottom: 1px solid var(--border); background: var(--bg-card); display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-shrink: 0; }
.modal-title { font-size: 15px; font-weight: 700; }
.modal-sub   { font-size: 12px; color: var(--text-secondary); margin-top: 3px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.trainee-chip { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; background: var(--green-dim); color: var(--green); border: 1px solid rgba(5,122,85,.25); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .05em; }
.modal-x { width: 26px; height: 26px; border: 1px solid var(--border); border-radius: var(--radius); background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 14px; flex-shrink: 0; display:flex; align-items:center; justify-content:center; }
.modal-x:hover { background: var(--red-dim); color: var(--red); border-color: var(--red); }

.modal-body { flex: 1; overflow-y: auto; padding: 18px 22px; display: flex; flex-direction: column; gap: 14px; }
.modal-body::-webkit-scrollbar { width: 4px; }
.modal-body::-webkit-scrollbar-thumb { background: var(--border); }

.form-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .07em; font-family: var(--font-mono); margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
.form-input { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; font-family: var(--font-sans); background: var(--bg-card); color: var(--text-primary); outline: none; transition: border-color .15s; }
.form-input:focus { border-color: var(--accent); background: var(--bg-surface); }
.form-select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; font-family: var(--font-sans); background: var(--bg-card); color: var(--text-primary); outline: none; cursor: pointer; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.dur-unit-toggle { display: flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
.dur-unit-btn { padding: 2px 9px; font-size: 10px; font-weight: 600; border: none; cursor: pointer; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .06em; background: transparent; color: var(--text-dim); transition: all .1s; }
.dur-unit-btn.active { background: var(--accent); color: #fff; }
.shift-btn { flex: 1; padding: 8px 0; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-card); color: var(--text-secondary); font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font-sans); transition: all .1s; }
.shift-btn.active { border-color: var(--accent); background: var(--accent-glow); color: var(--accent); }

.obj-card { padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-card); cursor: pointer; transition: all .1s; display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.obj-card:hover { border-color: var(--border-light); background: var(--bg-hover); }
.obj-card.selected { border-color: var(--accent); background: var(--accent-glow); }
.obj-card-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.obj-card-meta { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); margin-top: 2px; }

.load-badge { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; font-family: var(--font-mono); }
.load-ok   { background: var(--green-dim); color: var(--green); }
.load-warn { background: var(--orange-dim); color: var(--orange); }
.load-over { background: var(--red-dim); color: var(--red); }

.trainer-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; gap: 10px; }
.trainer-row:last-child { border-bottom: none; }
.trainer-row:hover { background: var(--bg-hover); }
.trainer-row.sel-trainer { background: var(--accent-glow); }
.trainer-sel-box { border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-card); padding: 9px 12px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 10px; transition: border-color .15s; }
.trainer-sel-box:hover { border-color: var(--border-light); }
.trainer-sel-box.open { border-color: var(--accent); }
.trainer-dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 11; background: var(--bg-surface); border: 1px solid var(--accent); border-radius: var(--radius); box-shadow: var(--shadow-lg); overflow: hidden; max-height: 200px; overflow-y: auto; }

.aw-panel { margin-top: 6px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.aw-hd    { display: flex; justify-content: space-between; padding: 6px 12px; background: var(--bg-card); font-size: 11px; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border); }
.aw-row   { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-bottom: 1px solid var(--border); font-size: 12px; }
.aw-row:last-child { border-bottom: none; }
.aw-dot   { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.aw-obj   { flex: 1; color: var(--text-primary); }
.aw-tr    { font-size: 11px; color: var(--text-secondary); }
.aw-dt    { font-size: 11px; font-family: var(--font-mono); color: var(--text-dim); }
.overload-banner { padding: 6px 12px; background: var(--red-dim); font-size: 11px; font-weight: 600; color: var(--red); border-top: 1px solid rgba(224,36,36,.2); }

.ws-status { margin-top: 5px; padding: 5px 10px; border-radius: var(--radius); font-size: 11px; font-weight: 600; }
.ws-ok   { background: var(--green-dim); color: var(--green); border: 1px solid rgba(5,122,85,.2); }
.ws-warn { background: var(--orange-dim); color: var(--orange); border: 1px solid rgba(196,82,10,.2); }
.ws-over { background: var(--red-dim); color: var(--red); border: 1px solid rgba(224,36,36,.2); }

.end-readout { padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-surface); font-size: 13px; font-weight: 700; color: var(--accent); font-family: var(--font-mono); white-space: nowrap; }

.window-summary { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
.ws-row2 { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; font-size: 12px; }
.ws-k { color: var(--text-secondary); }
.ws-v { color: var(--text-primary); font-weight: 500; font-family: var(--font-mono); }

.modal-ft { padding: 12px 22px; border-top: 1px solid var(--border); background: var(--bg-card); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.ft-msg   { font-size: 12px; color: var(--text-secondary); }
.ft-sp    { flex: 1; }
.btn-cancel-m { padding: 7px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font-sans); }
.btn-save  { padding: 7px 18px; border-radius: var(--radius); border: 1px solid var(--accent); background: var(--accent); color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font-sans); }
.btn-save:hover { background: var(--accent-dark); }
.btn-save:disabled { opacity: .4; cursor: not-allowed; }

/* ── TOAST ──────────────────────────────────────────────────────────────────── */
.toast-wrap { position: fixed; bottom: 20px; right: 20px; z-index: 300; display: flex; flex-direction: column; gap: 7px; pointer-events: none; }
.toast { padding: 9px 14px; background: var(--topbar-bg); border-radius: var(--radius); font-size: 12px; font-weight: 500; color: #fff; box-shadow: var(--shadow-lg); animation: tIn .2s ease; display: flex; align-items: center; gap: 8px; border-left: 3px solid #f6a623; }
@keyframes tIn { from{transform:translateX(16px);opacity:0}to{transform:translateX(0);opacity:1} }

/* btn-primary */
.btn-primary { padding: 8px 16px; border-radius: var(--radius); border: none; background: var(--accent); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font-sans); }
.btn-primary:hover { background: var(--accent-dark); }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo"><div class="logo-dot"></div>COVALENT</div>

<!-- APP -->
<div class="app">

  <!-- SIDEBAR -->

  <!-- CONTENT -->

    <!-- CALENDAR VIEW -->

  </div>
</div>

<!-- SCHEDULE MODAL -->

    <div class="modal-hd">

      <span class="ft-msg" id="modalFtMsg"></span>

      <button class="btn-cancel-m" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="modalSaveBtn" onclick="saveSession()">Open Window</button>
    </div>
  </div>
</div>

<!-- TOAST WRAP -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
// ─── DATASET ─────────────────────────────────────────────────────────────────
const now  = new Date();
const dS   = n => { const d=new Date(now); d.setDate(d.getDate()+n); d.setHours(0,0,0,0); return d; };
const dE   = n => { const d=new Date(now); d.setDate(d.getDate()+n); d.setHours(23,59,59,999); return d; };

const WORKERS = [
  { id:"w1",  name:"Marcus Webb",    role:"Assembly Tech II",  shift:"Day",   color:"#4a9eff", canTrain:true,  trainingCapacity:3, certifiedObjectives:["o1","o2","o4"] },
  { id:"w2",  name:"Layla Okonkwo",  role:"QA Specialist",     shift:"Day",   color:"#3fb950", canTrain:true,  trainingCapacity:3, certifiedObjectives:["o3","o5","o6"] },
  { id:"w3",  name:"Dmitri Sorel",   role:"Assembly Tech I",   shift:"Night", color:"#f6a623", canTrain:false },
  { id:"w4",  name:"Priya Nanduri",  role:"Assembly Tech III", shift:"Day",   color:"#db61a2", canTrain:true,  trainingCapacity:3, certifiedObjectives:["o1","o2","o3","o4"] },
  { id:"w5",  name:"Carlos Ibarra",  role:"Assembly Tech III", shift:"Night", color:"#a371f7", canTrain:true,  trainingCapacity:3, certifiedObjectives:["o1","o2","o6"] },
  { id:"w6",  name:"Yuki Tanaka",    role:"Maintenance Tech",  shift:"Day",   color:"#e3b341", canTrain:false },
  { id:"w7",  name:"Jordan Kim",     role:"Assembly Tech I",   shift:"Day",   color:"#58a6ff", canTrain:false },
  { id:"w8",  name:"Rosa Ferreira",  role:"Weld Technician",   shift:"Night", color:"#ffa657", canTrain:false },
  { id:"w9",  name:"Amir Hassan",    role:"Quality Inspector", shift:"Day",   color:"#79c0ff", canTrain:false },
  { id:"w10", name:"Tanya Osei",     role:"Assembly Tech II",  shift:"Night", color:"#56d364", canTrain:false },
  { id:"w11", name:"Brendan Cole",   role:"Maintenance Tech",  shift:"Day",   color:"#ff7b72", canTrain:false },
];
const OBJECTIVES = [
  { id:"o1", name:"Torque Wrench Calibration",  duration:2,  workstationIds:["ws1","ws4"] },
  { id:"o2", name:"Engine Assembly Step 4",      duration:10, workstationIds:["ws1"] },
  { id:"o3", name:"Safety Inspection Protocol",  duration:1,  workstationIds:["ws2","ws6"] },
  { id:"o4", name:"Hydraulic System Check",      duration:5,  workstationIds:["ws3"] },
  { id:"o5", name:"Component Quality Audit",     duration:3,  workstationIds:["ws2"] },
  { id:"o6", name:"Machine Setup & Zero Point",  duration:7,  workstationIds:["ws5","ws1"] },
];
const WORKSTATIONS = [
  { id:"ws1", name:"Station 4B",         zone:"Assembly Zone A",  maxConcurrentObjectives:2 },
  { id:"ws2", name:"Inspection Bay 1",   zone:"Quality Control",  maxConcurrentObjectives:3 },
  { id:"ws3", name:"Hydraulic Test Rig", zone:"Systems Lab",      maxConcurrentObjectives:2 },
  { id:"ws4", name:"Weld Cell 2",        zone:"Fabrication",      maxConcurrentObjectives:1 },
  { id:"ws5", name:"CNC Cell 1",         zone:"Machining",        maxConcurrentObjectives:2 },
  { id:"ws6", name:"Classroom A",        zone:"Training Center",  maxConcurrentObjectives:5 },
];
let ASSIGNMENTS = [
  { workerId:"w3",  objectiveId:"o1", status:"in_progress" }, { workerId:"w3",  objectiveId:"o2", status:"in_progress" },
  { workerId:"w3",  objectiveId:"o4", status:"in_progress" }, { workerId:"w3",  objectiveId:"o5", status:"assigned" },
  { workerId:"w6",  objectiveId:"o3", status:"assigned" },    { workerId:"w6",  objectiveId:"o6", status:"assigned" },
  { workerId:"w1",  objectiveId:"o5", status:"assigned" },    { workerId:"w5",  objectiveId:"o1", status:"in_progress" },
  { workerId:"w5",  objectiveId:"o2", status:"in_progress" }, { workerId:"w7",  objectiveId:"o1", status:"assigned" },
  { workerId:"w7",  objectiveId:"o2", status:"assigned" },    { workerId:"w7",  objectiveId:"o3", status:"assigned" },
  { workerId:"w8",  objectiveId:"o3", status:"assigned" },    { workerId:"w8",  objectiveId:"o4", status:"assigned" },
  { workerId:"w9",  objectiveId:"o3", status:"in_progress" }, { workerId:"w9",  objectiveId:"o5", status:"assigned" },
  { workerId:"w10", objectiveId:"o1", status:"assigned" },    { workerId:"w10", objectiveId:"o2", status:"assigned" },
  { workerId:"w10", objectiveId:"o4", status:"assigned" },    { workerId:"w11", objectiveId:"o6", status:"assigned" },
  { workerId:"w11", objectiveId:"o4", status:"assigned" },
];
let SESSIONS = [
  { id:"s1",  traineeId:"w3", trainerId:"w1", objectiveId:"o1", workstationId:"ws1", start:dS(0),   end:dE(13),  shift:"Day",   status:"scheduled", comments:[{type:"instruction"}] },
  { id:"s2",  traineeId:"w3", trainerId:"w4", objectiveId:"o2", workstationId:"ws1", start:dS(2),   end:dE(51),  shift:"Day",   status:"scheduled", comments:[] },
  { id:"s8",  traineeId:"w3", trainerId:"w2", objectiveId:"o5", workstationId:"ws2", start:dS(5),   end:dE(9),   shift:"Day",   status:"scheduled", comments:[] },
  { id:"s5",  traineeId:"w3", trainerId:"w2", objectiveId:"o4", workstationId:"ws3", start:dS(-8),  end:dE(2),   shift:"Day",   status:"completed", comments:[{type:"observation"}] },
  { id:"s3",  traineeId:"w6", trainerId:"w2", objectiveId:"o6", workstationId:"ws5", start:dS(-5),  end:dE(4),   shift:"Day",   status:"overdue",   comments:[{type:"instruction"}] },
  { id:"s10", traineeId:"w6", trainerId:"w4", objectiveId:"o3", workstationId:"ws2", start:dS(-1),  end:dE(5),   shift:"Day",   status:"cancelled", comments:[] },
  { id:"s6",  traineeId:"w6", trainerId:"w4", objectiveId:"o3", workstationId:"ws2", start:dS(18),  end:dE(24),  shift:"Day",   status:"scheduled", comments:[{type:"instruction"}] },
  { id:"s4",  traineeId:"w5", trainerId:"w1", objectiveId:"o2", workstationId:"ws1", start:dS(-10), end:dE(24),  shift:"Night", status:"scheduled", comments:[] },
  { id:"s9",  traineeId:"w5", trainerId:"w2", objectiveId:"o1", workstationId:"ws1", start:dS(3),   end:dE(16),  shift:"Night", status:"scheduled", comments:[{type:"follow_up"}] },
  { id:"s7",  traineeId:"w5", trainerId:"w2", objectiveId:"o1", workstationId:"ws1", start:dS(17),  end:dE(21),  shift:"Night", status:"cancelled", comments:[] },
];
let workerCapacities = {}; // overrides for trainingCapacity per worker

// ─── STATE ────────────────────────────────────────────────────────────────────
let view      = "profile";
let rowMode   = "worker";
let zoom      = "week";
let frameOff  = 0;
let selectedW = WORKERS.find(w=>w.id==="w4") || WORKERS[0];
let modalState = null; // { worker, editSession, prefilledDate }
let trainerDropOpen = false;
let _sid = 200;

// ─── UTILS ───────────────────────────────────────────────────────────────────
const initials = n => n.split(" ").map(p=>p[0]).join("").slice(0,2).toUpperCase();
const fmtDate  = d => new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric"});
const fmtRange = (a,b) => `${fmtDate(a)} – ${fmtDate(b)}`;
const isoDate  = d => new Date(d).toISOString().split("T")[0];
const addDays  = (d,n) => { const x=new Date(d); x.setDate(x.getDate()+n); return x; };
const DAY_MS   = 86400000;
const LANE_H   = 30, LANE_PAD = 8, LANE_GAP = 3;
const MONTHS   = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAY_LTRS = ["S","M","T","W","T","F","S"];

function workerCap(w) { return workerCapacities[w.id] ?? w.trainingCapacity ?? 3; }

function assignLanes(windows) {
  const sorted = [...windows].sort((a,b)=>new Date(a.start)-new Date(b.start));
  const ends   = [];
  return sorted.map(w => {
    let lane = ends.findIndex(e=>new Date(w.start)>=new Date(e));
    if(lane===-1) lane=ends.length;
    ends[lane]=w.end;
    return {...w,lane};
  });
}
function barGeom(s,fStart,fDays) {
  const fS=fStart.getTime(), fE=fS+fDays*DAY_MS;
  const sS=new Date(s.start).getTime(), sE=new Date(s.end).getTime()+DAY_MS;
  const vS=Math.max(sS,fS), vE=Math.min(sE,fE);
  const fM=fDays*DAY_MS;
  return { leftPct:(vS-fS)/fM*100, widthPct:(vE-vS)/fM*100, clL:sS<fS, clR:sE>fE };
}
function getFrame() {
  const today=new Date();
  const fDays=zoom==="month"?28:7;
  const d=new Date(today);
  if(zoom==="week") d.setDate(today.getDate()-today.getDay()+frameOff*7);
  else d.setDate(today.getDate()+frameOff*28);
  d.setHours(0,0,0,0);
  const fStart=d;
  const days=Array.from({length:fDays},(_,i)=>{const dd=new Date(fStart);dd.setDate(fStart.getDate()+i);return dd;});
  const fEnd=new Date(fStart.getTime()+fDays*DAY_MS-1);
  return {fStart,fEnd,days,fDays};
}
function isSameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}

function setView(v) {
  view=v;
  document.getElementById("profileView").classList.toggle("hidden",v!=="profile");
  document.getElementById("calendarView").classList.toggle("hidden",v!=="calendar");
  document.getElementById("tabProfile").classList.toggle("active",v==="profile");
  document.getElementById("tabCalendar").classList.toggle("active",v==="calendar");
  if(v==="profile") renderProfile();
  else renderCalendar();
}
function setRowMode(m) { rowMode=m; renderCalendar(); }
function setZoom(z) { zoom=z; frameOff=0; renderCalendar(); }
function navigate(d) { frameOff+=d; renderCalendar(); }
function goToday() { frameOff=0; renderCalendar(); }
function jumpToOverdue() {
  const w=WORKERS.find(wk=>SESSIONS.some(s=>s.status==="overdue"&&(s.traineeId===wk.id||s.trainerId===wk.id)));
  if(w){selectedW=w; setView("profile");}
}

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function renderSidebar() {
  const count=document.getElementById("workerCount"); count.textContent=WORKERS.length;
  const body=document.getElementById("sidebarBody"); body.innerHTML="";
  const overdueTotal=SESSIONS.filter(s=>s.status==="overdue").length;
  const pill=document.getElementById("overduePill");
  pill.classList.toggle("hidden",overdueTotal===0);
  if(overdueTotal>0) document.getElementById("overduePillText").textContent=`${overdueTotal} session${overdueTotal!==1?"s":""} overdue`;

  [{ label:"Trainers", group:WORKERS.filter(w=>w.canTrain) },
   { label:"Employees",group:WORKERS.filter(w=>!w.canTrain)}].forEach(({label,group})=>{
    const gl=document.createElement("div"); gl.className="sidebar-group-label"; gl.textContent=`${label} ${group.length}`; body.appendChild(gl);
    group.forEach(w=>{
      const hasOv=SESSIONS.some(s=>s.status==="overdue"&&(s.traineeId===w.id||s.trainerId===w.id));
      const div=document.createElement("div");
      div.className=`worker-item${selectedW.id===w.id?" selected":""}`;
      div.onclick=()=>{selectedW=w;renderSidebar();if(view==="profile")renderProfile();else renderCalendar();};
      div.innerHTML=`
        <div class="worker-avatar" style="background:${w.color}22;color:${w.color};${hasOv?`box-shadow:0 0 0 2px var(--red)`:""}">${initials(w.name)}</div>
        <div style="flex:1;min-width:0">
          <div class="worker-name${selectedW.id===w.id?" sel":""}">${w.name}</div>
          <div class="worker-meta">${w.role} · ${w.shift}</div>
          ${hasOv?`<div class="overdue-badge"><div class="ov-dot"></div>overdue</div>`:""}
        </div>
        ${w.canTrain?`<div class="tag-trainer">Trainer</div>`:""}`;
      body.appendChild(div);
    });
  });
}

// ─── PROFILE VIEW ────────────────────────────────────────────────────────────
function renderProfile() {
  const w=selectedW;
  const wa=ASSIGNMENTS.filter(a=>a.workerId===w.id);
  const wSess=SESSIONS.filter(s=>s.traineeId===w.id||s.trainerId===w.id).sort((a,b)=>new Date(b.start)-new Date(a.start));
  const cap=workerCap(w);
  const activeSess=SESSIONS.filter(s=>s.trainerId===w.id&&s.status==="scheduled").length;
  const pv=document.getElementById("profileView");

  const STATUS_CLR={scheduled:"var(--blue)",completed:"var(--green)",overdue:"var(--red)",extended:"var(--orange)",cancelled:"var(--text-dim)"};

  pv.innerHTML=`
    <!-- Header -->
    <div class="profile-header">
      <div class="profile-avatar" style="background:${w.color}22;color:${w.color}">${initials(w.name)}</div>
      <div>
        <div class="profile-name">${w.name}</div>
        <div class="profile-role">${w.role}</div>
        <div class="profile-meta">
          <div class="meta-pill"><span class="meta-label">Shift</span><span class="meta-value">${w.shift}</span></div>
          <div class="meta-pill"><span class="meta-label">Objectives</span><span class="meta-value">${wa.length}</span></div>
          <div class="meta-pill"><span class="meta-label">Windows</span><span class="meta-value">${wSess.length}</span></div>
        </div>
        ${w.canTrain?`
          <div style="display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap">
            <div class="tag-trainer">Certified Trainer</div>
            <div class="cap-control">
              <span class="cap-label">Capacity</span>
              <div class="cap-stepper">
                <button class="cap-btn" onclick="adjustCap('${w.id}',-1)" ${cap<=1?"disabled":""}>−</button>
                <span class="cap-val">${cap}</span>
                <button class="cap-btn" onclick="adjustCap('${w.id}',1)" ${cap>=10?"disabled":""}>＋</button>
              </div>
              <span style="font-size:11px;color:var(--text-dim);font-family:var(--font-mono)">${activeSess}/${cap} active</span>
            </div>
          </div>`:""}
      </div>
      <div class="profile-spacer"></div>
      <button class="btn-primary" onclick="openModal('${w.id}',null,null)">＋ Schedule Training</button>
    </div>

    <!-- Objectives table -->
    <div class="section-header">
      <div class="section-title">Assigned Objectives (${wa.length + (w.certifiedObjectives?.length||0)})</div>
    </div>
    ${wa.length===0&&!w.certifiedObjectives?.length
      ? `<div style="text-align:center;padding:30px;color:var(--text-dim);font-size:13px">No objectives assigned</div>`
      : `<table class="obj-table" style="margin-bottom:22px">
          <thead><tr><th>Objective</th><th>Est.</th><th>Status</th><th>Windows</th></tr></thead>
          <tbody>
            ${wa.map(a=>{
              const obj=OBJECTIVES.find(o=>o.id===a.objectiveId);
              const ns=wSess.filter(s=>s.objectiveId===a.objectiveId&&s.traineeId===w.id).length;
              const completed=SESSIONS.some(s=>s.status==="completed"&&s.traineeId===w.id&&s.objectiveId===a.objectiveId);
              const statusKey=completed?"active":a.status;
              return `<tr>
                <td><div class="obj-name">${obj?.name}</div></td>
                <td><div style="font-size:11px;color:var(--text-dim);font-family:var(--font-mono)">${obj?.duration}sh</div></td>
                <td><span class="badge ${statusKey}">${statusKey==="in_progress"?"In Progress":statusKey.charAt(0).toUpperCase()+statusKey.slice(1)}</span></td>
                <td><span style="font-size:12px;color:var(--text-secondary);font-family:var(--font-mono)">${ns} window${ns!==1?"s":""}</span></td>
              </tr>`;
            }).join("")}
            ${(w.certifiedObjectives||[]).map(oid=>{
              const obj=OBJECTIVES.find(o=>o.id===oid);
              const times=SESSIONS.filter(s=>s.objectiveId===oid&&s.trainerId===w.id).length;
              return `<tr>
                <td><div class="obj-name" style="color:var(--text-secondary)">${obj?.name}</div></td>
                <td><div style="font-size:11px;color:var(--text-dim);font-family:var(--font-mono)">${obj?.duration}sh</div></td>
                <td><span class="badge certified">Certified</span></td>
                <td><span style="font-size:12px;color:var(--text-secondary);font-family:var(--font-mono)">Trained ${times}×</span></td>
              </tr>`;
            }).join("")}
          </tbody>
        </table>`
    }

    <!-- Session list -->
    <div class="section-header" style="margin-top:4px">
      <div class="section-title">Training Windows (${wSess.length})</div>
    </div>
    ${wSess.length===0
      ? `<div style="text-align:center;padding:30px;color:var(--text-dim);font-size:13px">No training windows yet</div>`
      : `<div class="session-list">
          ${wSess.map(s=>{
            const obj=OBJECTIVES.find(o=>o.id===s.objectiveId);
            const partner=s.traineeId===w.id?WORKERS.find(x=>x.id===s.trainerId):WORKERS.find(x=>x.id===s.traineeId);
            const isTrainee=s.traineeId===w.id;
            return `<div class="session-card${s.status==="overdue"?" overdue":""}">
              <div class="sess-status-dot" style="background:${STATUS_CLR[s.status]||"var(--text-dim)"}"></div>
              <div class="sess-body">
                <div class="sess-obj">${obj?.name}</div>
                <div class="sess-meta">
                  ${fmtRange(s.start,s.end)} · ${s.shift}
                  · ${isTrainee?"Trainer":"Trainee"}: ${partner?.name}
                  <span style="margin-left:6px;text-transform:capitalize;color:${STATUS_CLR[s.status]||"var(--text-dim)"}">${s.status}</span>
                </div>
              </div>
              <div class="sess-actions">
                ${s.status==="scheduled"||s.status==="overdue"?`
                  <button class="sess-btn" onclick="openModal('${w.id}','${s.id}',null)">Edit</button>
                  <button class="sess-btn success" onclick="completeSession('${s.id}')">Complete</button>
                  <button class="sess-btn danger" onclick="cancelSession('${s.id}')">Cancel</button>
                `:""}
              </div>
            </div>`;
          }).join("")}
        </div>`
    }
  `;
}

function adjustCap(wid, delta) {
  const w=WORKERS.find(x=>x.id===wid);
  const cur=workerCap(w);
  workerCapacities[wid]=Math.max(1,Math.min(10,cur+delta));
  renderProfile();
}

function completeSession(sid) {
  const s=SESSIONS.find(x=>x.id===sid); if(!s)return;
  s.status="completed";
  showToast("✓ Session marked complete");
  renderProfile(); renderSidebar();
}

function cancelSession(sid) {
  const s=SESSIONS.find(x=>x.id===sid); if(!s)return;
  s.status="cancelled";
  showToast("Session cancelled");
  renderProfile(); renderSidebar();
}

// ─── CALENDAR VIEW ───────────────────────────────────────────────────────────
function renderCalendar() {
  const today=new Date();
  const {fStart,fEnd,days,fDays}=getFrame();
  const todayIdx=days.findIndex(d=>isSameDay(d,today));

  // Range label
  const rl=zoom==="month"?`${fmtDate(days[0])} – ${fmtDate(days[fDays-1])}, ${days[0].getFullYear()}`:`${fmtDate(days[0])} – ${fmtDate(days[6])}, ${days[0].getFullYear()}`;
  document.getElementById("calRange").textContent=rl;
  document.getElementById("btnWeek").className=`zoom-btn${zoom==="week"?" active":""}`;
  document.getElementById("btnMonth").className=`zoom-btn${zoom==="month"?" active":""}`;
  document.getElementById("btnWorkers").className=`row-btn${rowMode==="worker"?" active":""}`;
  document.getElementById("btnObjectives").className=`row-btn${rowMode==="objective"?" active":""}`;
  document.getElementById("btnToday").className=`btn-nav${frameOff===0?" btn-today":""}`;
  document.getElementById("axisLabel").textContent=rowMode==="worker"?"Employee":"Objective";
  document.getElementById("axisCount").textContent=rowMode==="worker"?WORKERS.length:OBJECTIVES.length;
  document.getElementById("statusRight").textContent=`Selected: ${selectedW.name}`;

  // Header padding for month badges
  document.getElementById("calHeaderRow").style.paddingTop=zoom==="month"?"16px":"0";

  // Day column headers
  const hDays=document.getElementById("calHeaderDays");
  hDays.style.gridTemplateColumns=`repeat(${fDays},1fr)`;
  hDays.innerHTML=days.map((d,i)=>{
    const isT=isSameDay(d,today);
    const isMB=d.getDate()===1;
    if(zoom==="week") return `<div class="cal-hcell${isT?" today":""}">${d.toLocaleDateString("en-US",{weekday:"short"})}<span class="day-n">${d.getDate()}</span></div>`;
    return `<div class="cal-hcell compact${isT?" today":""}${isMB?" month-start":""}">${isMB?`<div class="month-badge">${MONTHS[d.getMonth()]}</div>`:""}<span class="day-letter">${DAY_LTRS[d.getDay()]}</span><span class="day-n">${d.getDate()}</span></div>`;
  }).join("");

  // Body rows
  const body=document.getElementById("calBody"); body.innerHTML="";
  const barH=zoom==="month"?22:26;
  const laneH=zoom==="month"?barH+2:LANE_H+LANE_GAP;

  const buildRowBody=(wins,rowH)=>{
    const laned=assignLanes(wins);
    let html=`<div class="row-body" style="min-height:${rowH}px">`;
    if(todayIdx>=0) html+=`<div class="today-hl" style="left:${todayIdx/fDays*100}%;width:${1/fDays*100}%"></div>`;
    for(let i=1;i<fDays;i++) html+=`<div class="day-sep" style="left:${i/fDays*100}%"></div>`;
    laned.forEach(s=>{
      const {leftPct,widthPct,clL,clR}=barGeom(s,fStart,fDays);
      if(widthPct<=0)return;
      const obj=OBJECTIVES.find(o=>o.id===s.objectiveId);
      const trainee=WORKERS.find(w=>w.id===s.traineeId);
      const trainer=WORKERS.find(w=>w.id===s.trainerId);
      const hasNotes=(s.comments||[]).filter(c=>c.type!=="system").length>0;
      const hi=s.traineeId===selectedW.id||s.trainerId===selectedW.id;
      const label=zoom==="month"?obj?.name.split(" ").slice(0,2).join(" "):obj?.name;
      const pair=zoom==="month"?`${trainee?.name.split(" ").map(p=>p[0]).join("")}/${trainer?.name.split(" ").map(p=>p[0]).join("")}`:`${trainee?.name.split(" ")[0]} / ${trainer?.name.split(" ")[0]}`;
      const cls=["span-bar",s.status,clL?"clip-left":"",clR?"clip-right":"",!hi?"dim":""].filter(Boolean).join(" ");
      html+=`<div class="${cls}" style="left:${leftPct}%;width:${widthPct}%;top:${LANE_PAD+s.lane*laneH}px;height:${barH}px;font-size:${zoom==="month"?10:11}px"
        onclick="openBarDetail(event,'${s.id}')" title="${obj?.name} · ${trainee?.name} / ${trainer?.name} · ${fmtRange(s.start,s.end)}">
        ${hasNotes?`<div class="bar-dot"></div>`:""}
        <span class="bar-text">${label||""}</span>
        ${!clR?`<span class="bar-sub">${pair}</span>`:""}
      </div>`;
    });
    html+=`<div class="row-add">＋</div></div>`;
    return html;
  };

  if(rowMode==="worker"){
    const sorted=[...WORKERS].sort((a,b)=>{
      const aw=SESSIONS.filter(s=>(s.traineeId===a.id||s.trainerId===a.id)&&new Date(s.start)<=fEnd&&new Date(s.end)>=fStart).length;
      const bw=SESSIONS.filter(s=>(s.traineeId===b.id||s.trainerId===b.id)&&new Date(s.start)<=fEnd&&new Date(s.end)>=fStart).length;
      return bw-aw;
    });
    sorted.forEach((w,wi)=>{
      const wins=SESSIONS.filter(s=>(s.traineeId===w.id||s.trainerId===w.id)&&new Date(s.start)<=fEnd&&new Date(s.end)>=fStart);
      const laned=assignLanes(wins);
      const nL=laned.length>0?Math.max(...laned.map(s=>s.lane))+1:1;
      const rowH=Math.max(56,LANE_PAD*2+nL*laneH);
      const isSel=w.id===selectedW.id;
      const hasOv=wins.some(s=>s.status==="overdue");
      const div=document.createElement("div"); div.className="gantt-row"; div.style.borderBottom=wi<sorted.length-1?"1px solid var(--border)":"none";
      div.innerHTML=`<div class="row-label${isSel?" sel-row":""}" style="min-height:${rowH}px" onclick="selectedW=WORKERS.find(x=>x.id==='${w.id}');renderSidebar();renderCalendar()">
        <div class="worker-avatar" style="background:${w.color}22;color:${w.color};${hasOv?`box-shadow:0 0 0 2px var(--red)`:""};width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:var(--font-mono);flex-shrink:0;margin-top:2px">${initials(w.name)}</div>
        <div style="min-width:0;flex:1">
          <div style="font-size:12px;font-weight:${isSel?600:500};color:${isSel?"var(--accent)":"var(--text-primary)"};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${w.name}</div>
          <div style="font-size:10px;color:var(--text-secondary);margin-top:1px;display:flex;align-items:center;gap:4px">${w.shift}${w.canTrain?`<span class="tag-trainer">Trainer</span>`:""}</div>
          ${hasOv?`<div class="overdue-badge"><div class="ov-dot"></div>overdue</div>`
            :wins.length>0?`<div style="font-size:9px;font-family:var(--font-mono);color:var(--text-dim);margin-top:2px">${wins.length} window${wins.length!==1?"s":""}${nL>1?` · <span style="color:var(--accent)">${nL} concurrent</span>`:""}</div>`:""
          }
        </div>
      </div>${buildRowBody(wins,rowH)}`;
      div.querySelector(".row-body").addEventListener("click",e=>{
        if(e.target.classList.contains("span-bar")||e.target.closest(".span-bar"))return;
        const pct=e.offsetX/e.currentTarget.offsetWidth;
        const dIdx=Math.min(fDays-1,Math.max(0,Math.floor(pct*fDays)));
        openModal(w.id,null,days[dIdx]);
      });
      body.appendChild(div);
    });
  } else {
    OBJECTIVES.forEach((obj,oi)=>{
      const wins=SESSIONS.filter(s=>s.objectiveId===obj.id&&new Date(s.start)<=fEnd&&new Date(s.end)>=fStart);
      const laned=assignLanes(wins);
      const nL=laned.length>0?Math.max(...laned.map(s=>s.lane))+1:1;
      const rowH=Math.max(56,LANE_PAD*2+nL*laneH);
      const div=document.createElement("div"); div.className="gantt-row"; div.style.borderBottom=oi<OBJECTIVES.length-1?"1px solid var(--border)":"none";
      div.innerHTML=`<div class="row-label" style="min-height:${rowH}px;flex-direction:column;justify-content:center;gap:4px;cursor:default">
        <div style="font-size:12px;font-weight:600;color:var(--text-primary)">${obj.name}</div>
        <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
          <span class="obj-pill">${obj.duration} shift${obj.duration!==1?"s":""}</span>
          ${wins.length>0?`<span style="font-size:9px;font-family:var(--font-mono);color:var(--text-dim)">${wins.length} window${wins.length!==1?"s":""}</span>`:""}
        </div>
      </div>${buildRowBody(wins,rowH)}`;
      div.querySelector(".row-body").addEventListener("click",e=>{
        if(e.target.classList.contains("span-bar")||e.target.closest(".span-bar"))return;
        openModal(selectedW.id,null,null);
      });
      body.appendChild(div);
    });
  }

  // Concurrency strip
  const concCols=document.getElementById("concCols");
  concCols.style.gridTemplateColumns=`repeat(${fDays},1fr)`;
  concCols.innerHTML=days.map((d,i)=>{
    const dS2=d.getTime(), dE2=dS2+DAY_MS-1;
    const c=SESSIONS.filter(s=>s.status!=="cancelled"&&new Date(s.start).getTime()<=dE2&&new Date(s.end).getTime()>=dS2).length;
    return `<div class="conc-cell${c>0?" has-n":""}${c>3?" hi-n":""}">${c>0?c:""}<div class="conc-tt">${c} active · ${fmtDate(d)}</div></div>`;
  }).join("");
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
let mState = {}; // modal reactive state

function openModal(wid, sid, prefDate) {
  const w  = WORKERS.find(x=>x.id===wid) || selectedW;
  const es = sid ? SESSIONS.find(s=>s.id===sid) : null;
  const wa = ASSIGNMENTS.filter(a=>a.workerId===w.id);
  mState = {
    w, es, wa,
    objId:        es?.objectiveId||"",
    trainerId:    es?.trainerId||"",
    workstationId:es?.workstationId||"",
    date:         es?isoDate(new Date(es.start)):prefDate?isoDate(prefDate):isoDate(addDays(new Date(),1)),
    duration:     es?String(Math.round((new Date(es.end)-new Date(es.start))/DAY_MS)+1):"5",
    durUnit:      "shifts",
    shift:        es?.shift||w.shift||"Day",
    trainerOpen:  false,
  };
  document.getElementById("modalTitle").textContent = es?"Edit Schedule Window":"Open Schedule Window";
  document.getElementById("modalSub").innerHTML = `<span class="trainee-chip">Trainee</span><strong>${w.name}</strong><span style="color:var(--text-dim)">·</span><span style="color:var(--text-secondary)">${w.role}</span>${w.canTrain?`<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:var(--blue-dim);color:var(--blue);border:1px solid rgba(26,86,219,.25);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.05em">Also a Trainer</span>`:""}`;
  document.getElementById("modalSaveBtn").textContent = es?"Save Changes":"Open Window";
  document.getElementById("schedModal").classList.remove("hidden");
  renderModalBody();
}

function closeModal() {
  document.getElementById("schedModal").classList.add("hidden");
  mState={};
}

function renderModalBody() {
  const {w,es,wa,objId,trainerId,workstationId,date,duration,durUnit,shift}=mState;

  // Compute end date
  let endReadout="—";
  if(date&&parseInt(duration)>0) {
    const e=addDays(new Date(date),parseInt(duration)-1);
    endReadout=fmtDate(e);
  }

  // Trainers for this objective
  const trainers=WORKERS.filter(t=>t.canTrain&&t.id!==w.id&&(!objId||(t.certifiedObjectives||[]).includes(objId)));
  const selTrainer=WORKERS.find(t=>t.id===trainerId);
  const trainerLoad=(tid,d,dur)=>{
    if(!tid||!d||!dur)return{load:0,cap:3};
    const wS=new Date(`${d}T00:00:00`), wE=addDays(wS,parseInt(dur)-1);
    const load=SESSIONS.filter(s=>s.trainerId===tid&&s.status!=="cancelled"&&s.status!=="completed"&&(!es||s.id!==es.id)&&new Date(s.start)<=wE&&new Date(s.end)>=wS).length;
    const cap=workerCap(WORKERS.find(t=>t.id===tid)||{trainingCapacity:3});
    return{load,cap};
  };
  const tl=trainerId?trainerLoad(trainerId,date,duration):{load:0,cap:3};
  const tlCls=tl.load===0?"ok":tl.load<tl.cap?"warn":"over";

  // Active windows for trainer in period
  let awHTML="";
  if(trainerId&&date&&parseInt(duration)>0){
    const wS=new Date(`${date}T00:00:00`), wE=addDays(wS,parseInt(duration)-1);
    const aw=SESSIONS.filter(s=>s.trainerId===trainerId&&s.status!=="cancelled"&&s.status!=="completed"&&(!es||s.id!==es.id)&&new Date(s.start)<=wE&&new Date(s.end)>=wS);
    if(aw.length===0){
      awHTML=`<div style="margin-top:5px;padding:5px 10px;background:var(--green-dim);border:1px solid rgba(5,122,85,.2);border-radius:var(--radius);font-size:11px;font-weight:600;color:var(--green)">✓ ${selTrainer?.name.split(" ")[0]} has no active windows in this period</div>`;
    } else {
      const isOv=aw.length>=tl.cap;
      awHTML=`<div class="aw-panel" style="margin-top:5px">
        <div class="aw-hd"><span>${selTrainer?.name.split(" ")[0]}'s active windows in this period</span><span style="color:${isOv?"var(--red)":"var(--text-dim)"};font-weight:700">${aw.length}/${tl.cap}</span></div>
        ${aw.map(s=>{const o=OBJECTIVES.find(x=>x.id===s.objectiveId);const tn=WORKERS.find(x=>x.id===s.traineeId);return`<div class="aw-row"><div class="aw-dot" style="background:var(--blue)"></div><div class="aw-obj">${o?.name}</div><div class="aw-tr">→ ${tn?.name.split(" ")[0]}</div><div class="aw-dt">${fmtRange(s.start,s.end)}</div></div>`;}).join("")}
        ${isOv?`<div class="overload-banner">⚠ At or above trainer capacity — consider another trainer</div>`:""}
      </div>`;
    }
  }

  // Workstations for selected objective
  const obj=OBJECTIVES.find(o=>o.id===objId);
  const wsOpts=objId?WORKSTATIONS.filter(ws=>(obj?.workstationIds||[]).includes(ws.id)):[];
  const wsLoad=(wsId)=>{
    if(!date||!parseInt(duration))return{load:0,max:1};
    const wS=new Date(`${date}T00:00:00`), wE=addDays(wS,parseInt(duration)-1);
    const activeObjs=new Set(SESSIONS.filter(s=>s.workstationId===wsId&&s.status!=="cancelled"&&s.status!=="completed"&&(!es||s.id!==es.id)&&new Date(s.start)<=wE&&new Date(s.end)>=wS).map(s=>s.objectiveId));
    const ws=WORKSTATIONS.find(w=>w.id===wsId);
    return{load:activeObjs.size,max:ws?.maxConcurrentObjectives||1};
  };
  const wl=workstationId?wsLoad(workstationId):{load:0,max:1};
  const wlMsg=workstationId?wl.load===0?`<div class="ws-status ws-ok">✓ Station available in this period</div>`:wl.load>=wl.max?`<div class="ws-status ws-over">⚠ At capacity (${wl.load}/${wl.max} objectives)</div>`:`<div class="ws-status ws-warn">${wl.load}/${wl.max} objective slots in use</div>`:"";

  const DUR_OPTS=[{v:"1",l:"1 shift (1 day)"},{v:"2",l:"2 shifts (2 days)"},{v:"3",l:"3 shifts (3 days)"},{v:"5",l:"5 shifts (1 week)"},{v:"10",l:"10 shifts (2 weeks)"},{v:"15",l:"15 shifts (3 weeks)"},{v:"20",l:"20 shifts (4 weeks)"},{v:"30",l:"30 shifts (6 weeks)"}];

  const canSave=!!(objId&&trainerId&&workstationId&&date&&parseInt(duration)>0);
  document.getElementById("modalSaveBtn").disabled=!canSave;
  document.getElementById("modalFtMsg").textContent=canSave?"":objId&&trainerId?"Set workstation and date to continue":objId?"Select a trainer certified for this objective":"Select an objective to begin";

  document.getElementById("modalBody").innerHTML=`
    ${!es?`
    <!-- Objective selector -->
    <div>
      <div class="form-label">Select Objective</div>
      ${wa.length===0?`<div style="padding:12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--text-secondary)">No objectives assigned to this worker.</div>`
        :wa.map(a=>{
          const o=OBJECTIVES.find(x=>x.id===a.objectiveId);
          return `<div class="obj-card${objId===a.objectiveId?" selected":""}" onclick="mState.objId='${a.objectiveId}';mState.workstationId='';if(${o?.duration}){mState.duration='${o?.duration||5}';}mState.trainerId=(()=>{const t=WORKERS.find(w=>w.id===mState.trainerId);return t&&(t.certifiedObjectives||[]).includes('${a.objectiveId}')?mState.trainerId:"";})();renderModalBody()">
            <div style="flex:1">
              <div class="obj-card-name">${o?.name}</div>
              <div class="obj-card-meta">${o?.duration} shift${o?.duration!==1?"s":""} est.</div>
            </div>
            ${objId===a.objectiveId?`<span style="color:var(--accent)">✓</span>`:""}
          </div>`;
        }).join("")
      }
    </div>`:`
    <!-- Edit mode: objective locked -->
    <div style="padding:10px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);border-left:3px solid var(--accent)">
      <div class="form-label" style="margin-bottom:4px">Objective</div>
      <div style="font-size:14px;font-weight:600;color:var(--text-primary)">${OBJECTIVES.find(o=>o.id===es.objectiveId)?.name}</div>
    </div>`}

    <!-- Date + Shift -->
    <div class="form-row">
      <div>
        <div class="form-label">Start Date</div>
        <input type="date" class="form-input" value="${mState.date}" oninput="mState.date=this.value;renderModalBody()"/>
      </div>
      <div>
        <div class="form-label">Shift</div>
        <div style="display:flex;gap:6px">
          ${["Day","Night"].map(s=>`<button class="shift-btn${mState.shift===s?" active":""}" onclick="mState.shift='${s}';renderModalBody()">${s}</button>`).join("")}
        </div>
      </div>
    </div>

    <!-- Duration -->
    <div style="display:flex;gap:12px;align-items:flex-end">
      <div style="flex:1">
        <div class="form-label">
          <span>Duration</span>
          <div class="dur-unit-toggle">
            <button class="dur-unit-btn${mState.durUnit==="shifts"?" active":""}" onclick="mState.durUnit='shifts';renderModalBody()">Shifts</button>
            <button class="dur-unit-btn${mState.durUnit==="hours"?" active":""}"  onclick="mState.durUnit='hours';renderModalBody()">Hours</button>
          </div>
        </div>
        <select class="form-select" onchange="mState.duration=this.value;renderModalBody()">
          ${DUR_OPTS.map(o=>`<option value="${o.v}" ${mState.duration===o.v?"selected":""}>${o.l}${obj&&obj.duration===parseInt(o.v)?" ← objective estimate":""}</option>`).join("")}
        </select>
      </div>
      <div>
        <div class="form-label">Closes on</div>
        <div class="end-readout">${endReadout}</div>
      </div>
    </div>

    <!-- Trainer -->
    <div>
      <div class="form-label">Trainer</div>
      <div style="position:relative">
        <div class="trainer-sel-box${mState.trainerOpen?" open":""}" onclick="if(mState.objId&&${trainers.length}>0){mState.trainerOpen=!mState.trainerOpen;renderModalBody()}" style="opacity:${!objId?.5:1};cursor:${!objId?"default":"pointer"}">
          ${!objId?`<span style="font-size:13px;color:var(--text-dim)">— Select an objective first</span>`
            :trainers.length===0?`<span style="font-size:13px;color:var(--red)">⚠ No certified trainers for this objective</span>`
            :!trainerId?`<span style="font-size:13px;color:var(--text-dim)">— Select trainer</span>`
            :`<div style="min-width:0"><span style="font-size:13px;font-weight:500;color:var(--text-primary)">${selTrainer?.name}</span><span style="font-size:11px;color:var(--text-secondary);margin-left:8px">${selTrainer?.role}</span></div>
             <span class="load-badge load-${tlCls}">${tl.load}/${tl.cap}</span>`
          }
          ${objId&&trainers.length>0?`<span style="font-size:10px;color:var(--text-dim);margin-left:auto;flex-shrink:0">${mState.trainerOpen?"▲":"▼"}</span>`:""}
        </div>
        ${mState.trainerOpen?`
          <div onclick="event.stopPropagation()" style="position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:50;background:var(--bg-surface);border:1px solid var(--accent);border-radius:var(--radius);box-shadow:var(--shadow-lg);overflow:hidden;max-height:200px;overflow-y:auto">
            ${trainers.map(t=>{
              const tld=trainerLoad(t.id,date,duration);
              const tc=tld.load===0?"ok":tld.load<tld.cap?"warn":"over";
              return `<div class="trainer-row${trainerId===t.id?" sel-trainer":""}" onclick="mState.trainerId='${t.id}';mState.trainerOpen=false;renderModalBody()">
                <div style="min-width:0">
                  <div style="font-size:13px;font-weight:${trainerId===t.id?600:400};color:${trainerId===t.id?"var(--accent)":"var(--text-primary)"}">${t.name}</div>
                  <div style="font-size:11px;color:var(--text-secondary);margin-top:1px">${t.role}</div>
                </div>
                <span class="load-badge load-${tc}">${tld.load}/${tld.cap}</span>
              </div>`;
            }).join("")}
          </div>
          <div style="position:fixed;inset:0;z-index:49" onclick="mState.trainerOpen=false;renderModalBody()"></div>`:""}
      </div>
      ${awHTML}
    </div>

    <!-- Workstation -->
    <div>
      <div class="form-label">Workstation</div>
      <select class="form-select" onchange="mState.workstationId=this.value;renderModalBody()" style="opacity:${!objId?.5:1}" ${!objId?"disabled":""}>
        <option value="">${!objId?"— Select an objective first":"— Select workstation"}</option>
        ${wsOpts.map(ws=>{
          const l=wsLoad(ws.id); const c=l.load===0?"✓":l.load>=l.max?"⚠":l.load>0?"◑":"✓";
          return `<option value="${ws.id}" ${workstationId===ws.id?"selected":""}>${c} ${ws.name} — ${ws.zone} (${l.load}/${l.max})</option>`;
        }).join("")}
      </select>
      ${wlMsg}
    </div>

    <!-- Window summary -->
    ${canSave?`
    <div class="window-summary">
      <div style="font-size:11px;font-weight:700;color:var(--text-dim);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Window Summary</div>
      <div class="ws-row2"><span class="ws-k">Trainee</span><span class="ws-v">${w.name}</span></div>
      <div class="ws-row2"><span class="ws-k">Objective</span><span class="ws-v">${obj?.name||"—"}</span></div>
      <div class="ws-row2"><span class="ws-k">Window</span><span class="ws-v">${date?fmtDate(new Date(date)):"—"} → ${endReadout}</span></div>
      <div class="ws-row2"><span class="ws-k">Trainer</span><span class="ws-v">${selTrainer?.name||"—"}</span></div>
      <div class="ws-row2"><span class="ws-k">Workstation</span><span class="ws-v">${WORKSTATIONS.find(x=>x.id===workstationId)?.name||"—"}</span></div>
    </div>`:""}
  `;
}

function saveSession() {
  const {w,es,objId,trainerId,workstationId,date,duration,shift}=mState;
  if(!objId||!trainerId||!workstationId||!date||!parseInt(duration))return;
  const start=new Date(`${date}T00:00:00`);
  const end=addDays(start,parseInt(duration)-1); end.setHours(23,59,59,999);
  if(es) {
    const idx=SESSIONS.findIndex(s=>s.id===es.id);
    SESSIONS[idx]={...SESSIONS[idx],trainerId,workstationId,start,end,shift,status:"scheduled"};
    showToast("✓ Training window updated");
  } else {
    SESSIONS.push({id:`s${_sid++}`,traineeId:w.id,trainerId,objectiveId:objId,workstationId,start,end,shift,status:"scheduled",comments:[]});
    showToast("✓ Training window scheduled");
  }
  closeModal();
  renderSidebar();
  if(view==="profile") renderProfile();
  else renderCalendar();
}

function openBarDetail(e,sid) {
  e.stopPropagation();
  const s=SESSIONS.find(x=>x.id===sid); if(!s)return;
  const obj=OBJECTIVES.find(o=>o.id===s.objectiveId);
  const trainee=WORKERS.find(w=>w.id===s.traineeId);
  const trainer=WORKERS.find(w=>w.id===s.trainerId);
  const ws=WORKSTATIONS.find(w=>w.id===s.workstationId);
  if(s.status==="scheduled"||s.status==="overdue"){
    openModal(s.traineeId, s.id, null);
  } else {
    showToast(`${obj?.name} · ${trainee?.name} · ${fmtRange(s.start,s.end)} · ${s.status}`);
  }
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg) {
  const wrap=document.getElementById("toastWrap");
  const div=document.createElement("div"); div.className="toast"; div.textContent=msg;
  wrap.appendChild(div);
  setTimeout(()=>div.remove(),3200);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderSidebar();
setView("profile");
</script>
</body>
</html>
