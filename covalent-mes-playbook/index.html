<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Covalent + MES: Workforce Operations Playbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --accent: #06448E;
    --navy: #051B42;
    --orange: #FF9B36;
    --bg: #F6F6F6;
    --white: #FFFFFF;
    --border: #E4E4E4;
    --text: #1A1A1A;
    --muted: #5A6378;
    --soft: #EEF2F7;
    --mes: #4A5568;
    --success: #2E7D5B;
    --warn: #C56A1A;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.55;
  }
  h1, h2, h3, h4 { font-family: 'Inter', -apple-system, sans-serif; font-weight: 700; color: var(--navy); line-height: 1.2; margin: 0; }
  p { margin: 0 0 1em 0; }
  a { color: var(--accent); text-decoration: none; }
  .container { max-width: 1100px; margin: 0 auto; padding: 0 32px; }
  .narrow { max-width: 820px; }

  .hero { background: var(--navy); color: var(--white); padding: 64px 0 80px 0; border-bottom: 4px solid var(--orange); }
  .hero-logos { display: flex; align-items: center; gap: 28px; margin-bottom: 40px; }
  .hero-logo-svg { height: 38px; width: auto; display: block; }
  .hero-logo-img { height: 42px; width: auto; display: block; margin-left: -18px; }
  .hero-divider { display: block; width: 1px; height: 32px; background: rgba(255,255,255,0.25); }
  .hero-mes-badge { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18); border-radius: 6px; padding: 7px 14px; }
  .hero-mes-badge .mes-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.5); font-weight: 600; }
  .hero-mes-badge .mes-name { font-size: 15px; font-weight: 700; color: var(--white); letter-spacing: 0.3px; }
  .hero h1 { color: var(--white); font-size: 44px; line-height: 1.15; margin-bottom: 20px; max-width: 880px; }
  .hero-sub { font-size: 19px; line-height: 1.55; color: rgba(255,255,255,0.82); max-width: 760px; margin: 0; font-weight: 300; }

  section { padding: 80px 0; }
  section.alt { background: var(--white); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .section-eyebrow { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); font-weight: 500; margin-bottom: 16px; }
  .section-title { font-size: 32px; margin-bottom: 16px; }
  .section-lede { font-size: 17px; color: var(--muted); max-width: 720px; margin-bottom: 40px; line-height: 1.6; }

  .thesis-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 8px; }
  .thesis-card { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 28px; }
  .thesis-card.accent { border-left: 3px solid var(--accent); }
  .thesis-card.navy { border-left: 3px solid var(--navy); }
  .thesis-card.orange { border-left: 3px solid var(--orange); }
  .thesis-card .label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .thesis-card h3 { font-size: 19px; margin-bottom: 10px; }
  .thesis-card p { font-size: 15px; color: var(--text); margin: 0; line-height: 1.55; }

  .why-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-top: 8px; }
  .why-item { background: var(--white); padding: 22px 24px; display: flex; gap: 16px; align-items: flex-start; }
  .why-num { font-size: 13px; color: var(--accent); font-weight: 600; min-width: 28px; }
  .why-text { font-size: 15px; color: var(--text); line-height: 1.5; }

  .timeline-wrap { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 32px; margin-top: 8px; }
  .hphase-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 28px; }
  .hphase { background: var(--soft); border: 1px solid var(--border); border-radius: 8px; padding: 16px 14px; cursor: pointer; text-align: left; font-family: inherit; transition: all 0.15s ease; color: var(--muted); display: flex; flex-direction: column; gap: 4px; }
  .hphase:hover { background: #E6EBF2; border-color: #CFD7E2; }
  .hphase.active { background: var(--navy); border-color: var(--navy); color: var(--white); }
  .hphase-name { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; opacity: 0.7; }
  .hphase.active .hphase-name { color: var(--orange); opacity: 1; }
  .hphase-label { font-size: 14px; font-weight: 600; color: var(--navy); line-height: 1.3; }
  .hphase.active .hphase-label { color: var(--white); }
  .hphase-months { font-size: 11px; color: var(--muted); font-weight: 500; margin-top: 2px; }
  .hphase.active .hphase-months { color: rgba(255,255,255,0.65); }
  .timeline-detail-wide { border-left: 3px solid var(--accent); padding: 4px 0 4px 24px; }
  .detail-eyebrow { font-size: 12px; color: var(--accent); margin-bottom: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  .detail-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 36px; align-items: start; }
  .detail-title { font-size: 26px; margin-bottom: 14px; }
  .detail-desc { font-size: 15px; color: var(--muted); line-height: 1.6; margin: 0; }
  .detail-right { background: var(--soft); border-radius: 8px; padding: 18px 20px; }
  .detail-deliverables-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
  .detail-deliverables-text { font-size: 15px; color: var(--text); font-weight: 500; line-height: 1.5; }

  .stepper-layout { display: grid; grid-template-columns: 280px 1fr; gap: 32px; background: var(--white); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; min-height: 560px; }
  .stepper-nav { background: var(--soft); border-right: 1px solid var(--border); padding: 20px 0; }
  .stepper-nav button { display: flex; align-items: center; width: 100%; background: transparent; border: none; text-align: left; padding: 14px 24px; cursor: pointer; font-family: inherit; font-size: 14px; color: var(--muted); border-left: 3px solid transparent; transition: all 0.15s ease; line-height: 1.35; }
  .stepper-nav button:hover { background: rgba(6,68,142,0.04); color: var(--text); }
  .stepper-nav button.active { background: var(--white); color: var(--navy); border-left-color: var(--orange); font-weight: 600; }
  .stepper-nav .step-num { font-size: 12px; color: var(--accent); margin-right: 12px; font-weight: 600; min-width: 22px; }
  .stepper-nav button.active .step-num { color: var(--orange); }
  .stepper-content { padding: 36px 40px; }
  .stepper-content .step-eyebrow { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; font-weight: 500; }
  .stepper-content h3 { font-size: 26px; margin-bottom: 20px; }
  .stepper-content .step-desc { font-size: 15px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
  .step-block { margin-bottom: 22px; }
  .step-block-title { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--navy); font-weight: 600; margin-bottom: 10px; }
  .step-block ul { margin: 0; padding: 0; list-style: none; display: grid; grid-template-columns: 1fr 1fr; gap: 6px 24px; }
  .step-block ul.single { grid-template-columns: 1fr; }
  .step-block li { font-size: 14px; color: var(--text); padding-left: 14px; position: relative; line-height: 1.5; }
  .step-block li::before { content: ""; position: absolute; left: 0; top: 9px; width: 5px; height: 5px; background: var(--accent); border-radius: 50%; }
  .step-block.deferred li::before { background: var(--muted); }
  .step-block.avoid li::before { background: var(--warn); }
  .step-pager { margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .step-pager button { background: transparent; border: 1px solid var(--border); padding: 8px 16px; border-radius: 6px; font-family: inherit; font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.15s ease; }
  .step-pager button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .step-pager button:disabled { opacity: 0.4; cursor: not-allowed; }
  .step-pager .progress { font-size: 12px; color: var(--muted); }

  .sor-wrap { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 36px; margin-top: 8px; }
  .sor-tabs { display: flex; margin-bottom: 32px; border-bottom: 1px solid var(--border); }
  .sor-tabs button { background: transparent; border: none; padding: 14px 22px; cursor: pointer; font-family: inherit; font-size: 14px; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; font-weight: 500; transition: all 0.15s ease; }
  .sor-tabs button:hover { color: var(--text); }
  .sor-tabs button.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  .sor-tabs .phase-num { font-size: 11px; color: var(--muted); margin-right: 8px; }
  .sor-tabs button.active .phase-num { color: var(--accent); }
  .sor-diagram { display: grid; grid-template-columns: 1fr 120px 1fr; align-items: stretch; min-height: 300px; }
  .sor-side { border-radius: 10px; padding: 24px; display: flex; flex-direction: column; }
  .sor-side.mes { background: #F0F2F6; border: 1px solid #D6DBE3; }
  .sor-side.covalent { background: #EAF1FA; border: 1px solid #C8DAEF; }
  .sor-side .sor-name { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; font-weight: 600; }
  .sor-side.mes .sor-name { color: var(--mes); }
  .sor-side.covalent .sor-name { color: var(--accent); }
  .sor-side h4 { font-size: 18px; margin-bottom: 16px; }
  .sor-side ul { margin: 0; padding: 0; list-style: none; }
  .sor-side li { font-size: 14px; color: var(--text); padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.05); line-height: 1.4; }
  .sor-side li:last-child { border-bottom: none; }
  .sor-flow { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 0 8px; }
  .sor-arrow { width: 100%; background: var(--soft); border-radius: 6px; padding: 10px 8px; text-align: center; font-size: 11px; color: var(--muted); line-height: 1.3; transition: all 0.25s ease; border: 1px solid var(--border); }
  .sor-arrow.active { background: var(--accent); color: var(--white); border-color: var(--accent); transform: scale(1.02); box-shadow: 0 4px 12px rgba(6,68,142,0.18); }
  .sor-arrow .arrow-icon { display: block; margin-bottom: 4px; font-size: 14px; }
  .sor-caption { margin-top: 24px; padding: 18px 22px; background: var(--soft); border-left: 3px solid var(--accent); border-radius: 6px; font-size: 14px; color: var(--text); line-height: 1.55; }

  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-top: 8px; }
  .kpi-col { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 24px; }
  .kpi-col .kpi-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; font-weight: 600; }
  .kpi-col h4 { font-size: 18px; margin-bottom: 16px; }
  .kpi-col ul { margin: 0; padding: 0; list-style: none; }
  .kpi-col li { font-size: 14px; color: var(--text); padding: 10px 0; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .kpi-col li::before { content: "□"; color: var(--accent); font-size: 16px; line-height: 1; }
  .kpi-baseline { margin-top: 24px; background: var(--white); border-left: 3px solid var(--orange); padding: 16px 22px; border-radius: 4px; font-size: 14px; color: var(--text); }
  .kpi-baseline strong { color: var(--navy); }

  .uc-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 8px; }
  .uc-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 28px; display: flex; flex-direction: column; }
  .uc-card .uc-num { font-size: 12px; color: var(--orange); letter-spacing: 1px; margin-bottom: 8px; font-weight: 600; }
  .uc-card h3 { font-size: 18px; margin-bottom: 16px; }
  .uc-block { margin-bottom: 14px; }
  .uc-block-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .uc-block p { font-size: 14px; color: var(--text); line-height: 1.5; margin: 0; }
  .uc-examples { margin-bottom: 14px; }
  .uc-examples-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .uc-examples ul { margin: 0; padding: 0; list-style: none; }
  .uc-examples li { font-size: 13px; color: var(--muted); padding: 3px 0 3px 12px; position: relative; line-height: 1.4; font-style: italic; }
  .uc-examples li::before { content: ""; position: absolute; left: 0; top: 9px; width: 4px; height: 4px; background: var(--border); border-radius: 50%; }
  .uc-outcomes { margin-top: auto; padding-top: 14px; border-top: 1px solid var(--border); }
  .uc-outcomes ul { margin: 0; padding: 0; list-style: none; }
  .uc-outcomes li { font-size: 13px; color: var(--text); padding: 4px 0 4px 14px; position: relative; line-height: 1.4; }
  .uc-outcomes li::before { content: "→"; position: absolute; left: 0; color: var(--success); font-weight: 600; }

  .closing { background: var(--navy); color: var(--white); padding: 80px 0; border-top: 4px solid var(--orange); }
  .closing .section-eyebrow { color: var(--orange); }
  .closing h2 { color: var(--white); font-size: 30px; margin-bottom: 24px; }
  .closing p { color: rgba(255,255,255,0.85); font-size: 17px; line-height: 1.7; max-width: 760px; }
  .closing .pull { border-left: 3px solid var(--orange); padding: 12px 0 12px 24px; margin-top: 32px; font-size: 19px; line-height: 1.55; color: var(--white); font-style: italic; max-width: 760px; }

  footer { background: #030F26; color: rgba(255,255,255,0.5); padding: 28px 0; font-size: 13px; text-align: center; letter-spacing: 0.5px; }

  @media (max-width: 880px) {
    .hero h1 { font-size: 32px; }
    .thesis-grid, .why-grid, .kpi-grid, .uc-grid { grid-template-columns: 1fr; }
    .stepper-layout { grid-template-columns: 1fr; }
    .stepper-nav { border-right: none; border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; padding: 8px; }
    .stepper-nav button { white-space: nowrap; padding: 10px 14px; border-left: none; border-bottom: 2px solid transparent; }
    .stepper-nav button.active { border-left-color: transparent; border-bottom-color: var(--orange); }
    .hphase-row { grid-template-columns: 1fr 1fr; }
    .detail-grid { grid-template-columns: 1fr; gap: 20px; }
    .sor-diagram { grid-template-columns: 1fr; gap: 16px; }
    .step-block ul { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const STEPS = [
  {
    n: 1, name: "Establish Executive Alignment",
    desc: "Bring the right cross-functional leaders together early. Define the core problem: the MES is live, but there is no programmatic way to confirm operators are actually trained to use it. Set success criteria before any deployment begins.",
    blocks: [
      { title: "Recommended participants", items: ["VP Manufacturing", "Digital Transformation leadership", "Training and L&D leadership", "Plant and operations leadership", "MES program manager", "IT leadership"] },
      { title: "Workshop topics", items: ["Which MES tasks require trained operators", "How training is assigned and tracked today", "Who currently knows who is qualified for what", "Audit and compliance exposure from undocumented training", "Cost of MES underutilization post go-live", "Manual tracking burden on supervisors and trainers"] },
      { title: "Primary deliverables", items: ["Executive problem statement", "Initial KPI targets", "Budgetary framing", "Transformation charter"] }
    ]
  },
  {
    n: 2, name: "Map Your MES Rollout State",
    desc: "Before deploying Covalent, document exactly which MES tasks require trained operators and how training is being handled today. The output is a role-to-task training map, not a technical audit.",
    blocks: [
      { title: "What to document", items: ["Which MES modules and tasks are live", "Which roles are expected to perform each task", "What training currently exists for each task", "How training completion is tracked", "Where the adoption gaps are largest", "What workarounds operators are using"] },
      { title: "Avoid", items: ["Skipping this step to move faster to deployment", "Assuming MES go-live equals operator readiness", "Building training content before mapping role-to-task requirements"], style: "avoid" },
      { title: "Output", items: ["MES adoption gap analysis", "Role-to-task training map", "Current baseline metrics", "Priority list for Covalent deployment"] }
    ]
  },
  {
    n: 3, name: "Conduct Workforce Operations Discovery",
    desc: "Three structured workshops to map current state, systems, and the future operating model before building anything.",
    blocks: [
      { title: "Session 1: Current-state workflows", items: ["How training is currently assigned", "How completion is tracked and signed off", "How qualifications are approved", "How requalification is managed", "How audit evidence is generated today"] },
      { title: "Session 2: Systems architecture", items: ["MES task and role data structure", "HRIS data sources", "LMS dependencies and integrations", "Existing databases and spreadsheets", "Badge and access systems"] },
      { title: "Session 3: Future operating model", items: ["Role-based training path design", "Task-level qualification structure", "Digital signoff and approval workflows", "Supervisor visibility requirements", "Deadline and escalation policy"] },
      { title: "Primary deliverables", items: ["Current-state process maps", "Integration blueprint", "Task-qualification hierarchy", "Future-state workflow architecture"] }
    ]
  },
  {
    n: 4, name: "Define Pilot Success Metrics",
    desc: "Baseline every KPI before deployment. Without baselines, ROI is asserted, not proven. The most important metric: what percentage of operators required to perform a given MES task are actually qualified to do it today.",
    blocks: [
      { title: "Adoption KPIs", items: ["% of operators qualified per MES task", "Training completion rate by role", "Time to qualified status", "Operators with outstanding or overdue training"] },
      { title: "Operations KPIs", items: ["Supervisor time spent on training administration", "Time-to-productivity for new hires", "Training throughput per trainer per week", "Requalification cycle time"] },
      { title: "Compliance KPIs", items: ["Audit readiness score", "Expired or lapsing qualifications", "Training-related non-conformances", "Documentation completeness rate"] },
      { title: "Approach", items: ["Baseline all KPIs before deployment. Post-deployment delta is the ROI story."], style: "single" }
    ]
  },
  {
    n: 5, name: "Deploy Foundational Covalent Capabilities",
    desc: "Stand up the core workforce operations layer. Resist the temptation to deploy everything at once. The goal at this stage is to replace the spreadsheet and prove the model.",
    blocks: [
      { title: "Initial capabilities", items: ["Role-based training assignment by MES task", "Task-level objective and evaluation structure", "Digital signoffs: trainee, trainer, supervisor", "Completion tracking with deadlines", "Escalation notifications for overdue training", "Qualification expiration tracking", "Audit trail generation"] },
      { title: "Intentionally deferred", items: ["MES system integrations", "Enterprise governance rollout", "Historical data migration", "Multi-site standardization"], style: "deferred" }
    ]
  },
  {
    n: 6, name: "Connect Covalent to Your MES",
    desc: "Define ownership cleanly. The MES is the system of record for work execution; Covalent is the system of record for who is qualified to perform each task. Integration makes that qualification data visible where decisions get made.",
    blocks: [
      { title: "MES owns", items: ["Work execution and routing", "Manufacturing genealogy", "Quality workflows", "Production records", "Task and role data"] },
      { title: "Covalent owns", items: ["Training assignments and completion", "Task-level qualification status", "Signoff and approval records", "Qualification expiration tracking"] },
      { title: "Phase 1: Foundation", items: ["Employee master data sync from MES or HRIS", "Qualification status published from Covalent into MES", "Supervisors can see training status without leaving the MES"] },
      { title: "Phase 2: Activity visibility", items: ["MES task activity data flows into Covalent", "Teams see who is actively performing trained tasks on the floor", "Recency data surfaces operators who may need requalification"] }
    ]
  },
  {
    n: 7, name: "Scale to Enterprise",
    desc: "Take what worked at the pilot site and turn it into enterprise infrastructure. The deliverables shift from training completion to governance and standards.",
    blocks: [
      { title: "Enterprise scaling activities", items: ["Establish enterprise-wide task qualification standards", "Define governance ownership by role and site", "Standardize training KPIs across facilities", "Roll out by site complexity and MES maturity", "Build cross-site visibility into qualification coverage"] },
      { title: "Long-term outcome", items: ["Operator qualification for every MES task, across every site, becomes a documented and managed operational fact, not an assumption"], style: "single" }
    ]
  }
];

const PHASES = [
  {
    id: 0, name: "Phase 0", label: "Evaluation and alignment", months: "Months 0-2",
    desc: "Establish executive alignment, map the current MES adoption state, and build the business case. Define which roles need training on which MES tasks before any deployment begins.",
    deliverables: "Business case, role-to-task training map, pilot site selection"
  },
  {
    id: 1, name: "Phase 1", label: "Pilot deployment", months: "Months 2-6",
    desc: "Run discovery workshops, baseline success metrics, and deploy foundational Covalent capabilities. Stand up role-based training assignments, digital signoffs, and supervisor dashboards at one site.",
    deliverables: "Task-level training assignments, digital signoffs, completion tracking, audit trail"
  },
  {
    id: 2, name: "Phase 2", label: "MES integration", months: "Months 6-12",
    desc: "Connect Covalent to the MES. Sync employee data, publish qualification status, and begin pulling task activity data to track which operators are actively using their trained skills.",
    deliverables: "Employee sync, qualification status in MES, task activity visibility"
  },
  {
    id: 3, name: "Phase 3", label: "Enterprise scale", months: "Months 12-18",
    desc: "Take the pilot model and scale it across sites. Establish governance, standardize qualification requirements by role, and build cross-site visibility into where training gaps exist.",
    deliverables: "Enterprise governance model, cross-site qualification standards, KPI benchmarking"
  }
];

const SOR_PHASES = [
  {
    id: 0, name: "Phase 1: Foundation",
    arrows: [
      { active: true, label: "Employee master data", dir: "→" },
      { active: true, label: "Qualification status", dir: "←" },

          </div>
        </div>
      </div>
    </section>
  );
}

              <div className="uc-block">
