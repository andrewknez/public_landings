// === Walkthrough component (inlined from scoring_walkthrough.jsx) ===


// ============================================================
// EXAMPLE DATASET — kept small so every number is traceable
// 4 objectives, 5 workers, all on one shift
//
// Baseline designed to show a spectrum of resilience states:
//   • Job A: req 3, eligible Alice+Bob → under-covered (a gap)
//   • Job B: req 1, eligible Bob only  → met, but Bob is sole-eligible
//   • Job C: req 2, eligible Calvin+Derrick → met, tight
//   • Job D: req 2, eligible Calvin+Derrick+Eric → met, with slack
//
// Baseline absenteeism story:
//   • If Alice is out → Job A loses coverage; Bob has to cover alone
//   • If Bob is out   → Job A drops further AND Job B goes to zero
//   • If Calvin is out → Job C falls below requirement
//   • If Derrick is out → Job C falls below requirement
//   • If Eric is out    → nothing changes (Job D still met)
// ============================================================

const OBJECTIVES = [
  { id: 'A', name: 'Objective A', required: 3 },
  { id: 'B', name: 'Objective B', required: 1 },
  { id: 'C', name: 'Objective C', required: 2 },
  { id: 'D', name: 'Objective D', required: 2 },
];

const WORKERS = [
  { id: 'alice',   name: 'Alice',   initials: 'AL' },
  { id: 'bob',     name: 'Bob',     initials: 'BO' },
  { id: 'calvin',  name: 'Calvin',  initials: 'CA' },
  { id: 'derrick', name: 'Derrick', initials: 'DE' },
  { id: 'eric',    name: 'Eric',    initials: 'ER' },
];

// Baseline eligibility: who is Active on which objective
const BASELINE = {
  A: ['alice', 'bob'],                     // req 3, eligible 2 → gap -1
  B: ['bob'],                              // req 1, eligible 1 → met, sole-eligible
  C: ['calvin', 'derrick'],                // req 2, eligible 2 → met, tight
  D: ['calvin', 'derrick', 'eric'],        // req 2, eligible 3 → met, +1 slack
};

// ============================================================
// SCORING — same formulas as the dashboard, isolated for clarity
// ============================================================

function computeScores(assignments, objectives) {
  const objState = {};
  objectives.forEach(o => {
    const active = assignments[o.id] || [];
    const activeCount = active.length;
    const gap = activeCount - o.required;
    const isGap = gap < 0;
    const gapSeverity = isGap ? Math.min(1, (o.required - activeCount) / o.required) : 0;
    const eligibleCount = activeCount;
    objState[o.id] = {
      ...o,
      active,
      activeCount,
      gap,
      isGap,
      gapSeverity,
      eligibleCount,
      isSPoF: isGap && eligibleCount === 1,
    };
  });

  // Worker Risk: Σ (gap_severity × 1/eligible) across gap jobs the worker is active on
  const workerRisk = {};
  WORKERS.forEach(w => { workerRisk[w.id] = { total: 0, contributions: [] }; });
  Object.values(objState).forEach(o => {
    if (!o.isGap || o.eligibleCount === 0) return;
    const depFactor = 1 / o.eligibleCount;
    const contribution = o.gapSeverity * depFactor;
    o.active.forEach(wid => {
      workerRisk[wid].total += contribution;
      workerRisk[wid].contributions.push({
        objectiveId: o.id,
        gapSeverity: o.gapSeverity,
        eligibleCount: o.eligibleCount,
        depFactor,
        contribution,
      });
    });
  });

  // Job Risk: (required/eligible) × avg(worker_risk of eligible pool)
  Object.values(objState).forEach(o => {
    if (o.eligibleCount === 0) {
      o.scarcity = Infinity;
      o.avgWorkerRisk = 0;
      o.jobRisk = Infinity;
      return;
    }
    o.scarcity = o.required / o.eligibleCount;
    const sum = o.active.reduce((acc, wid) => acc + workerRisk[wid].total, 0);
    o.avgWorkerRisk = sum / o.eligibleCount;
    o.jobRisk = o.scarcity * o.avgWorkerRisk;
  });

  return { objState, workerRisk };
}

// ============================================================
// SCENARIOS — each transforms the baseline assignments
// ============================================================

const SCENARIOS = [
  {
    id: 'baseline',
    label: 'Baseline',
    description: 'The starting state.',
    transform: (a) => a,
  },
  {
    id: 'cross-train-eric',
    label: 'Cross-train Eric for A',
    description: "Eric has slack on D — training him on A closes the gap and spreads coverage.",
    transform: (a) => ({ ...a, A: [...a.A, 'eric'] }),
  },
  {
    id: 'widen-c',
    label: 'Objective C grows to require 3',
    description: "Demand rises on C without new staff. A fresh gap appears — and Calvin and Derrick suddenly carry concentration risk they didn't before.",
    transform: (a, o) => ({ assignments: a, objectives: o.map(x => x.id === 'C' ? { ...x, required: 3 } : x) }),
  },
  {
    id: 'bob-leaves',
    label: 'Bob leaves',
    description: 'Alice becomes sole-eligible on A; Job B loses its only worker. A cascading failure emerges.',
    transform: (a) => ({
      ...a,
      A: a.A.filter(w => w !== 'bob'),
      B: a.B.filter(w => w !== 'bob'),
    }),
  },
];

function applyScenario(scenarioId) {
  const scenario = SCENARIOS.find(s => s.id === scenarioId);
  if (!scenario || scenario.id === 'baseline') {
    return { assignments: BASELINE, objectives: OBJECTIVES };
  }
  const result = scenario.transform(BASELINE, OBJECTIVES);
  // transforms can return either a new assignments-object OR an { assignments, objectives } wrapper
  if (result && result.assignments) return { assignments: result.assignments, objectives: result.objectives };
  return { assignments: result, objectives: OBJECTIVES };
}

// ============================================================
// FRACTION HELPERS — display math as human-readable
// ============================================================

function fmt(n, digits = 3) {
  if (!isFinite(n)) return '∞';
  if (n === 0) return '0';
  return n.toFixed(digits).replace(/\.?0+$/, '');
}

// Proper fraction algebra so the diagrams can render math in fraction form
// (1/6 instead of 0.167). Fractions are auto-simplified via GCD.
function gcd(a, b) {
  a = Math.abs(a); b = Math.abs(b);
  while (b !== 0) { const t = b; b = a % b; a = t; }
  return a || 1;
}

function frac(num, den = 1) {
  if (den === 0) return { num: 1, den: 0, kind: 'infinite' };
  if (num === 0) return { num: 0, den: 1, kind: 'zero' };
  const sign = (num < 0) !== (den < 0) ? -1 : 1;
  const a = Math.abs(num);
  const b = Math.abs(den);
  const g = gcd(a, b);
  return { num: (a / g) * sign, den: b / g, kind: 'normal' };
}

function mulFrac(a, b) {
  if (a.kind === 'infinite' || b.kind === 'infinite') return frac(1, 0);
  if (a.kind === 'zero' || b.kind === 'zero') return frac(0);
  return frac(a.num * b.num, a.den * b.den);
}

function sumFracs(fracs) {
  if (fracs.length === 0) return frac(0);
  if (fracs.some(f => f.kind === 'infinite')) return frac(1, 0);
  const filtered = fracs.filter(f => f.kind !== 'zero');
  if (filtered.length === 0) return frac(0);
  const cd = filtered.reduce((acc, f) => acc * f.den, 1);
  const totalNum = filtered.reduce((sum, f) => sum + f.num * (cd / f.den), 0);
  return frac(totalNum, cd);
}

function avgFracs(fracs) {
  if (fracs.length === 0) return frac(0);
  const total = sumFracs(fracs);
  if (total.kind === 'infinite' || total.kind === 'zero') return total;
  return frac(total.num, total.den * fracs.length);
}

function fracToStr(f) {
  if (f.kind === 'infinite') return '∞';
  if (f.kind === 'zero') return '0';
  if (f.den === 1) return String(f.num);
  return `${f.num}/${f.den}`;
}

// ============================================================
// SHARED STYLE TOKENS
// ============================================================

const COVALENT_BLUE = '#05448E';
const CREAM        = '#FAF6EF';   // warm editorial background
const INK          = '#1C1A16';   // off-black for body
const MUTED        = '#6B6357';   // warm gray

const baseStyle = {
  fontFamily: "'IBM Plex Sans', system-ui, sans-serif",
  color: INK,
};

// ============================================================
// SVG FRACTION DISPLAY — renders a fraction as stacked numerator/denominator
// ============================================================

function FracSVG({ f, cx = 0, cy = 0, size = 18, color = INK, bold = true }) {
  const weight = bold ? '600' : '400';
  const fontFamily = "'IBM Plex Mono', monospace";

  // Single-character cases (zero, infinity, integer) — visually centered on (cx, cy)
  if (f.kind === 'zero' || f.kind === 'infinite' || f.den === 1) {
    const text = f.kind === 'zero' ? '0' : f.kind === 'infinite' ? '∞' : String(f.num);
    const finalSize = f.kind === 'infinite' ? size * 1.2 : size;
    return (
      <text
        x={cx} y={cy}
        textAnchor="middle"
        dominantBaseline="central"
        fontSize={finalSize}
        fontFamily={fontFamily}
        fontWeight={weight}
        fill={color}
      >
        {text}
      </text>
    );
  }

  // Fraction: bar at cy, numerator above, denominator below
  // Layout math: bar at y=0, each digit center is `gap` away from the bar
  const partSize = size * 0.9;
  const gap = size * 0.55;
  const widestDigit = String(Math.max(Math.abs(f.num), f.den)).length;
  const halfWidth = Math.max(size * 0.5, widestDigit * partSize * 0.38);

  return (
    <g transform={`translate(${cx}, ${cy})`}>
      <text
        x="0" y={-gap}
        textAnchor="middle"
        dominantBaseline="central"
        fontSize={partSize}
        fontFamily={fontFamily}
        fontWeight={weight}
        fill={color}
      >
        {f.num}
      </text>
      <line
        x1={-halfWidth} x2={halfWidth}
        y1={0} y2={0}
        stroke={color}
        strokeWidth={Math.max(1.25, size * 0.07)}
        strokeLinecap="round"
      />
      <text
        x="0" y={gap}
        textAnchor="middle"
        dominantBaseline="central"
        fontSize={partSize}
        fontFamily={fontFamily}
        fontWeight={weight}
        fill={color}
      >
        {f.den}
      </text>
    </g>
  );
}

// ============================================================
// WORKER RISK DIAGRAM — node visualization of the formula
//   worker → gap jobs → contributions → sum → Risk
// ============================================================

function WorkerRiskDiagram({ worker, contributions }) {
  // Convert each contribution to fractional form (using the source ints)
  const rows = contributions.map(c => {
    const obj = c.obj;
    const severityNum = obj.required - obj.activeCount;
    const severity   = frac(severityNum, obj.required);
    const dep        = frac(1, obj.eligibleCount);
    const contrib    = mulFrac(severity, dep);
    return { obj, severity, dep, contrib };
  });
  const totalRisk = sumFracs(rows.map(r => r.contrib));

  // Layout
  const rowH = 96;
  const padTop = 30;
  const padBottom = 30;
  const minHeight = 200;
  const height = Math.max(minHeight, padTop + Math.max(1, rows.length) * rowH + padBottom);

  const workerCx = 75;
  const workerR  = 38;
  const workerCy = height / 2;

  // X coordinates for math chain
  const jobX = 138;       // left edge of job rect
  const jobW = 138;
  const jobH = 64;
  const sevX = 330;       // severity fraction center
  const timesX = 365;     // ×
  const depX = 395;       // dep center
  const eqX = 430;        // =
  const contribCx = 480;  // contribution center
  const bracketX = 540;
  const arrowEndX = 595;
  const resultCx = 660;

  const rowY = (i) => padTop + i * rowH + rowH / 2;
  const noContrib = rows.length === 0;

  return (
    <div className="w-full">
      <svg viewBox={`0 0 720 ${height}`} preserveAspectRatio="xMidYMid meet" className="w-full" style={{ maxHeight: height + 20 }}>
        {/* Background rule for visual rhythm */}
        {rows.map((_, i) => (
          <rect key={i} x="0" y={padTop + i * rowH + 4} width="720" height={rowH - 8} fill={i % 2 === 0 ? '#FBF9F3' : 'transparent'} rx="8" />
        ))}

        {/* Worker node */}
        <circle cx={workerCx} cy={workerCy} r={workerR} fill={COVALENT_BLUE} />
        <text x={workerCx} y={workerCy - 4} textAnchor="middle" fontSize="14" fontWeight="700" fill="white" fontFamily="'IBM Plex Sans', sans-serif" letterSpacing="0.05em">{worker.initials}</text>
        <text x={workerCx} y={workerCy + 14} textAnchor="middle" fontSize="11" fontWeight="500" fill="rgba(255,255,255,0.85)" fontFamily="'IBM Plex Sans', sans-serif">{worker.name}</text>

        {noContrib ? (
          <>
            {/* No-contributions state */}
            <line x1={workerCx + workerR + 4} x2={420} y1={workerCy} y2={workerCy} stroke="#CBD5E1" strokeWidth="1.5" strokeDasharray="5 5" />
            <text x={285} y={workerCy - 8} textAnchor="middle" fontSize="13" fill={MUTED} fontStyle="italic" fontFamily="'IBM Plex Serif', serif">no gap jobs to contribute to</text>
            <text x={285} y={workerCy + 14} textAnchor="middle" fontSize="11" fill={MUTED} fontFamily="'IBM Plex Sans', sans-serif">{worker.name} has no concentration risk</text>
            <line x1={425} x2={arrowEndX - 6} y1={workerCy} y2={workerCy} stroke="#94A3B8" strokeWidth="1.5" />
            <polygon points={`${arrowEndX - 6},${workerCy - 5} ${arrowEndX - 6},${workerCy + 5} ${arrowEndX + 2},${workerCy}`} fill="#94A3B8" />
            <ResultBlock cx={resultCx} cy={workerCy} risk={frac(0)} muted />
          </>
        ) : (
          <>
            {rows.map((r, i) => {
              const y = rowY(i);
              return (
                <g key={r.obj.id}>
                  {/* Curve worker → job */}
                  <path
                    d={`M ${workerCx + workerR} ${workerCy} C ${jobX - 24} ${workerCy}, ${jobX - 24} ${y}, ${jobX} ${y}`}
                    fill="none"
                    stroke="#94A3B8"
                    strokeWidth="1.5"
                  />
                  {/* Job node */}
                  <rect x={jobX} y={y - jobH/2} width={jobW} height={jobH} rx="8" fill="#F8F4EB" stroke="#D6CFB8" strokeWidth="1.25" />
                  <text x={jobX + jobW/2} y={y - 6} textAnchor="middle" fontSize="14" fontWeight="600" fill={INK} fontFamily="'IBM Plex Serif', serif">{r.obj.name}</text>
                  <text x={jobX + jobW/2} y={y + 14} textAnchor="middle" fontSize="11" fill={MUTED} fontFamily="'IBM Plex Mono', monospace">Req {r.obj.required} · Elig {r.obj.eligibleCount}</text>

                  {/* Connector job → math chain */}
                  <line x1={jobX + jobW} x2={sevX - 22} y1={y} y2={y} stroke="#CBD5E1" strokeWidth="1.5" />

                  {/* Severity × dependency = contribution */}
                  <FracSVG f={r.severity} cx={sevX} cy={y} size={18} color={INK} />
                  <text x={timesX} y={y} textAnchor="middle" dominantBaseline="central" fontSize="20" fill="#94A3B8" fontFamily="'IBM Plex Mono', monospace">×</text>
                  <FracSVG f={r.dep} cx={depX} cy={y} size={18} color={INK} />
                  <text x={eqX} y={y} textAnchor="middle" dominantBaseline="central" fontSize="20" fill="#94A3B8" fontFamily="'IBM Plex Mono', monospace">=</text>
                  {/* Contribution pill */}
                  <rect x={contribCx - 34} y={y - 25} width={68} height={50} rx="8" fill="#EFF4FB" stroke="#D3E2F5" strokeWidth="1.25" />
                  <FracSVG f={r.contrib} cx={contribCx} cy={y} size={20} color={COVALENT_BLUE} />

                  {/* Tail to bracket */}
                  <line x1={contribCx + 34} x2={bracketX} y1={y} y2={y} stroke="#94A3B8" strokeWidth="1.5" />
                </g>
              );
            })}

            {/* Vertical bracket + arrow to result */}
            {(() => {
              const firstY = rowY(0);
              const lastY  = rowY(rows.length - 1);
              const midY   = (firstY + lastY) / 2;
              return (
                <>
                  {rows.length > 1 && (
                    <line x1={bracketX} x2={bracketX} y1={firstY} y2={lastY} stroke="#94A3B8" strokeWidth="1.5" />
                  )}
                  <line x1={bracketX} x2={arrowEndX - 6} y1={midY} y2={midY} stroke="#94A3B8" strokeWidth="1.5" />
                  <polygon points={`${arrowEndX - 6},${midY - 5} ${arrowEndX - 6},${midY + 5} ${arrowEndX + 2},${midY}`} fill="#94A3B8" />
                  <ResultBlock cx={resultCx} cy={midY} risk={totalRisk} />
                </>
              );
            })()}

            {/* Column labels (top) */}
            <text x={sevX} y={padTop - 8} textAnchor="middle" fontSize="9" fontWeight="600" letterSpacing="0.08em" fill={MUTED} fontFamily="'IBM Plex Sans', sans-serif">SEVERITY</text>
            <text x={depX} y={padTop - 8} textAnchor="middle" fontSize="9" fontWeight="600" letterSpacing="0.08em" fill={MUTED} fontFamily="'IBM Plex Sans', sans-serif">DEPENDENCY</text>
            <text x={contribCx} y={padTop - 8} textAnchor="middle" fontSize="9" fontWeight="600" letterSpacing="0.08em" fill={COVALENT_BLUE} fontFamily="'IBM Plex Sans', sans-serif">CONTRIBUTION</text>
          </>
        )}
      </svg>
    </div>
  );
}

// Reusable terminal "RISK" block used by both diagrams
function ResultBlock({ cx, cy, risk, label = 'RISK', muted = false }) {
  const color = muted ? MUTED : COVALENT_BLUE;
  const boxW = 100, boxH = 80;
  return (
    <g>
      <rect
        x={cx - boxW / 2} y={cy - boxH / 2}
        width={boxW} height={boxH} rx="10"
        fill={muted ? '#F1EEE6' : '#EFF4FB'}
        stroke={color} strokeWidth="1.5"
      />
      <text
        x={cx} y={cy - 22}
        textAnchor="middle" dominantBaseline="central"
        fontSize="10" fontWeight="600" letterSpacing="0.1em"
        fill={color}
        fontFamily="'IBM Plex Sans', sans-serif"
      >
        {label}
      </text>
      <FracSVG f={risk} cx={cx} cy={cy + 10} size={24} color={color} />
    </g>
  );
}

// ============================================================
// JOB RISK DIAGRAM — mirror of Worker Risk
//   eligible workers' risks → avg ──┐
//                                    × → Job Risk
//                  scarcity ─────────┘
// ============================================================

function JobRiskDiagram({ job, eligibleWorkerData }) {
  // eligibleWorkerData: [{ worker, riskFrac }]
  const riskFracs = eligibleWorkerData.map(d => d.riskFrac);
  const avgFrac = avgFracs(riskFracs);
  const scarcityFrac = job.eligibleCount > 0 ? frac(job.required, job.eligibleCount) : frac(1, 0);
  const jobRiskFrac = mulFrac(scarcityFrac, avgFrac);

  // Layout
  const workerCount = Math.max(1, eligibleWorkerData.length);
  const workerRowH = 60;
  const workerStart = 40;
  const scarcityRowY = workerStart + workerCount * workerRowH + 30;
  const height = Math.max(240, scarcityRowY + 80);

  // X coordinates
  const workerCx = 75;
  const workerR  = 22;
  const riskFracX = 150;
  const bracketX  = 215;
  const avgCx     = 290;
  const mulCx     = 410;
  const scarcityCx = 290;  // beneath avg
  const arrowEndX = 470;
  const resultCx  = 565;

  const workerY = (i) => workerStart + i * workerRowH + workerRowH / 2;
  const noEligible = eligibleWorkerData.length === 0;

  // Convergence point — the multiplication
  const firstWorkerY = noEligible ? scarcityRowY : workerY(0);
  const lastWorkerY  = noEligible ? scarcityRowY : workerY(workerCount - 1);
  const workerMidY   = (firstWorkerY + lastWorkerY) / 2;
  const mulCy        = (workerMidY + scarcityRowY) / 2;

  return (
    <div className="w-full">
      <svg viewBox={`0 0 720 ${height}`} preserveAspectRatio="xMidYMid meet" className="w-full" style={{ maxHeight: height + 20 }}>
        {/* Job context box at bottom-left */}
        <g>
          <rect x="20" y={scarcityRowY - 28} width="160" height="56" rx="8" fill="#F8F4EB" stroke="#D6CFB8" strokeWidth="1.25" />
          <text x="100" y={scarcityRowY - 8} textAnchor="middle" fontSize="14" fontWeight="600" fill={INK} fontFamily="'IBM Plex Serif', serif">{job.name}</text>
          <text x="100" y={scarcityRowY + 12} textAnchor="middle" fontSize="11" fill={MUTED} fontFamily="'IBM Plex Mono', monospace">Req {job.required} · Elig {job.eligibleCount}</text>
        </g>

        {noEligible ? (
          <>
            {/* Zero-eligible: undefined / infinite risk */}
            <line x1="185" x2="380" y1={scarcityRowY} y2={scarcityRowY} stroke="#CBD5E1" strokeWidth="1.5" strokeDasharray="5 5" />
            <text x="285" y={scarcityRowY - 8} textAnchor="middle" fontSize="13" fontStyle="italic" fill={MUTED} fontFamily="'IBM Plex Serif', serif">no eligible workers</text>
            <text x="285" y={scarcityRowY + 14} textAnchor="middle" fontSize="11" fill={MUTED} fontFamily="'IBM Plex Sans', sans-serif">scarcity is undefined → maximum risk</text>
            <line x1="385" x2={arrowEndX - 6} y1={scarcityRowY} y2={scarcityRowY} stroke="#94A3B8" strokeWidth="1.5" />
            <polygon points={`${arrowEndX - 6},${scarcityRowY - 5} ${arrowEndX - 6},${scarcityRowY + 5} ${arrowEndX + 2},${scarcityRowY}`} fill="#94A3B8" />
            <ResultBlock cx={resultCx} cy={scarcityRowY} risk={frac(1, 0)} label="JOB RISK" />
          </>
        ) : (
          <>
            {/* Workers stacked */}
            {eligibleWorkerData.map((d, i) => {
              const y = workerY(i);
              return (
                <g key={d.worker.id}>
                  {/* Worker circle */}
                  <circle cx={workerCx} cy={y} r={workerR} fill={COVALENT_BLUE} />
                  <text x={workerCx} y={y - 2} textAnchor="middle" fontSize="11" fontWeight="700" fill="white" fontFamily="'IBM Plex Sans', sans-serif">{d.worker.initials}</text>
                  <text x={workerCx} y={y + 12} textAnchor="middle" fontSize="9" fill="rgba(255,255,255,0.85)" fontFamily="'IBM Plex Sans', sans-serif">{d.worker.name}</text>

                  {/* Risk label */}
                  <line x1={workerCx + workerR + 2} x2={riskFracX - 16} y1={y} y2={y} stroke="#94A3B8" strokeWidth="1.25" />
                  <text x={riskFracX - 16} y={y - 14} textAnchor="end" dominantBaseline="central" fontSize="9" letterSpacing="0.08em" fontWeight="600" fill={MUTED} fontFamily="'IBM Plex Sans', sans-serif">RISK</text>
                  <FracSVG f={d.riskFrac} cx={riskFracX + 10} cy={y} size={18} color={INK} />

                  {/* Tail to bracket */}
                  <line x1={riskFracX + 40} x2={bracketX} y1={y} y2={y} stroke="#94A3B8" strokeWidth="1.5" />
                </g>
              );
            })}

            {/* Bracket for workers + arrow to avg */}
            {workerCount > 1 && (
              <line x1={bracketX} x2={bracketX} y1={firstWorkerY} y2={lastWorkerY} stroke="#94A3B8" strokeWidth="1.5" />
            )}
            <line x1={bracketX} x2={avgCx - 32} y1={workerMidY} y2={workerMidY} stroke="#94A3B8" strokeWidth="1.5" />

            {/* AVG pill */}
            <rect x={avgCx - 34} y={workerMidY - 25} width={68} height={50} rx="8" fill="#EFF4FB" stroke="#D3E2F5" strokeWidth="1.25" />
            <text x={avgCx} y={workerMidY - 36} textAnchor="middle" dominantBaseline="central" fontSize="9" fontWeight="600" letterSpacing="0.08em" fill={COVALENT_BLUE} fontFamily="'IBM Plex Sans', sans-serif">AVG</text>
            <FracSVG f={avgFrac} cx={avgCx} cy={workerMidY} size={18} color={COVALENT_BLUE} />

            {/* Curve from avg to multiplication */}
            <path
              d={`M ${avgCx + 32} ${workerMidY} C ${avgCx + 60} ${workerMidY}, ${mulCx - 28} ${mulCy}, ${mulCx - 20} ${mulCy}`}
              fill="none" stroke="#94A3B8" strokeWidth="1.5"
            />

            {/* Connector job box → scarcity */}
            <line x1="180" x2={scarcityCx - 36} y1={scarcityRowY} y2={scarcityRowY} stroke="#94A3B8" strokeWidth="1.5" />

            {/* Scarcity pill */}
            <rect x={scarcityCx - 38} y={scarcityRowY - 25} width={76} height={50} rx="8" fill="#EFF4FB" stroke="#D3E2F5" strokeWidth="1.25" />
            <text x={scarcityCx} y={scarcityRowY - 36} textAnchor="middle" dominantBaseline="central" fontSize="9" fontWeight="600" letterSpacing="0.08em" fill={COVALENT_BLUE} fontFamily="'IBM Plex Sans', sans-serif">SCARCITY</text>
            <FracSVG f={scarcityFrac} cx={scarcityCx} cy={scarcityRowY} size={18} color={COVALENT_BLUE} />

            {/* Curve from scarcity to multiplication */}
            <path
              d={`M ${scarcityCx + 36} ${scarcityRowY} C ${scarcityCx + 80} ${scarcityRowY}, ${mulCx - 28} ${mulCy}, ${mulCx - 20} ${mulCy}`}
              fill="none" stroke="#94A3B8" strokeWidth="1.5"
            />

            {/* × operator */}
            <text x={mulCx} y={mulCy} textAnchor="middle" dominantBaseline="central" fontSize="26" fill={MUTED} fontFamily="'IBM Plex Mono', monospace">×</text>

            {/* Arrow from × to result */}
            <line x1={mulCx + 14} x2={arrowEndX - 6} y1={mulCy} y2={mulCy} stroke="#94A3B8" strokeWidth="1.5" />
            <polygon points={`${arrowEndX - 6},${mulCy - 5} ${arrowEndX - 6},${mulCy + 5} ${arrowEndX + 2},${mulCy}`} fill="#94A3B8" />

            <ResultBlock cx={resultCx} cy={mulCy} risk={jobRiskFrac} label="JOB RISK" />
          </>
        )}
      </svg>
    </div>
  );
}

function Hero({ scenarioId }) {
  return (

          style={{ borderColor: '#E4DCC8', color: MUTED }}>

        </div>
      </div>

        className="mx-auto mb-6 max-w-3xl text-center leading-[1.1] font-semibold"
        style={{
          fontFamily: "'IBM Plex Serif', Georgia, serif",

        }}
      >

        <br />
        <span style={{ color: COVALENT_BLUE }}>Resilience</span> tells you how fragile that coverage is.
      </h1>
      <p className="mx-auto mb-12 max-w-2xl text-center text-lg leading-relaxed" style={{ color: MUTED, fontFamily: "'IBM Plex Serif', Georgia, serif" }}>
        Five workers, four objectives — all staffed on paper. Hover a worker below to see what happens when they're not.
      </p>

      <ConcentrationGraph scenarioId={scenarioId} />

      <p className="mx-auto mt-8 max-w-2xl text-center text-sm" style={{ color: MUTED }}>

// The graph: workers on the left, objectives on the right, lines showing
// eligibility. Hovering a worker simulates their absence, re-coloring
// affected objectives and dashing their connection lines.
function ConcentrationGraph({ scenarioId }) {
  const [absentWorkerId, setAbsentWorkerId] = useState(null);
  const { assignments, objectives } = applyScenario(scenarioId);

  // Clear hover state when scenario changes — old caption would be misleading
  useEffect(() => {
    setAbsentWorkerId(null);
  }, [scenarioId]);

  // Effective assignments when a worker is absent
  const effectiveAssignments = useMemo(() => {
    if (!absentWorkerId) return assignments;
    const out = {};
    for (const [jobId, workerList] of Object.entries(assignments)) {
      out[jobId] = workerList.filter(w => w !== absentWorkerId);
    }
    return out;
  }, [absentWorkerId, assignments]);

  // Per-job state derived from effective coverage
  const jobStates = objectives.map(obj => {
    const origActive = assignments[obj.id]?.length || 0;
    const effActive = effectiveAssignments[obj.id]?.length || 0;
    const origGap = origActive - obj.required;
    const effGap = effActive - obj.required;

    // Classify the effective status
    let status; // 'healthy' | 'met' | 'gap' | 'zero'
    if (effActive === 0) status = 'zero';
    else if (effGap < 0) status = 'gap';
    else if (effGap === 0) status = 'met';
    else status = 'healthy';

    // Did this job change because of the hover?
    const changed = absentWorkerId && origActive !== effActive;
    const worsened = changed && effGap < origGap;

    return { ...obj, origActive, effActive, origGap, effGap, status, changed, worsened };
  });

  // Layout math
  const containerHeight = 480;
  const workerColWidth = 220;
  const jobColWidth = 260;
  const workerRowH = WORKERS.length > 0 ? (containerHeight - 40) / WORKERS.length : 80;
  const jobRowH    = objectives.length > 0 ? (containerHeight - 40) / objectives.length : 100;
  const padding = 20;

  const workerY = (i) => padding + i * workerRowH + workerRowH / 2;
  const jobY    = (i) => padding + i * jobRowH + jobRowH / 2;

  // Measure container width for SVG coordinates
  const containerRef = React.useRef(null);
  const [containerWidth, setContainerWidth] = useState(900);

  useEffect(() => {
    if (!containerRef.current) return;
    const ro = new ResizeObserver(entries => {
      for (const e of entries) setContainerWidth(e.contentRect.width);
    });
    ro.observe(containerRef.current);
    return () => ro.disconnect();
  }, []);

  // SVG anchor points
  const workerAnchorX = workerColWidth - 12;                  // right edge of worker card
  const jobAnchorX    = containerWidth - jobColWidth + 12;    // left edge of job card
  const gap = Math.max(jobAnchorX - workerAnchorX, 1);

  // Build edge list
  const edges = [];
  objectives.forEach((obj, ji) => {
    const eligibleList = assignments[obj.id] || [];
    eligibleList.forEach(workerId => {
      const wi = WORKERS.findIndex(w => w.id === workerId);
      if (wi === -1) return;
      edges.push({ workerId, objectiveId: obj.id, wi, ji });
    });
  });

  // Caption generation
  const caption = useMemo(() => {
    if (!absentWorkerId) {
      return { title: 'Hover a worker to simulate their absence.', detail: 'Each connection line is an eligibility. The job turns color based on whether its coverage still holds.' };
    }
    const w = WORKERS.find(x => x.id === absentWorkerId);
    const affected = jobStates.filter(j => j.changed);
    const gone    = affected.filter(j => j.status === 'zero');
    const gapped  = affected.filter(j => j.status === 'gap');

    if (affected.length === 0) {
      return {
        title: `${w.name} is absent — no impact.`,
        detail: `Every objective remains covered without ${w.name}. ${w.name} contributes to a job that already has enough other qualified workers.`,
      };
    }

    const parts = [];
    if (gone.length > 0) parts.push(`${gone.map(j => j.name).join(', ')} loses all coverage`);
    if (gapped.length > 0) parts.push(`${gapped.map(j => j.name).join(', ')} falls below requirement`);
    const detail = parts.join('; ') + '.';

    return {
      title: `If ${w.name} is absent:`,
      detail,
    };
  }, [absentWorkerId, jobStates]);

  return (
    <div className="rounded-2xl border p-6" style={{ borderColor: '#E4DCC8', backgroundColor: 'white' }}>
      <div
        ref={containerRef}
        className="relative"
        style={{ height: containerHeight }}
      >
        {/* SVG edges */}
        {containerWidth > 0 && (
          <svg
            className="absolute inset-0"
            width={containerWidth}
            height={containerHeight}
            style={{ pointerEvents: 'none' }}
          >
            {edges.map((e, i) => {
              const y1 = workerY(e.wi);
              const y2 = jobY(e.ji);
              const cx1 = workerAnchorX + gap * 0.5;
              const cx2 = jobAnchorX - gap * 0.5;
              const isAbsent = e.workerId === absentWorkerId;
              const affectedJob = jobStates.find(j => j.id === e.objectiveId);
              const jobWorsened = affectedJob && affectedJob.worsened;

              let stroke = '#CBD5E1';      // baseline slate-300
              let strokeWidth = 1.5;
              let strokeOpacity = 0.7;
              let dashArray = undefined;

              if (isAbsent) {
                // This is the "broken" connection
                dashArray = '5 4';
                strokeWidth = 1.5;
                strokeOpacity = 0.3;
                // Color based on consequence
                if (affectedJob?.status === 'zero') stroke = '#E11D48';   // rose
                else if (affectedJob?.status === 'gap') stroke = '#D97706'; // amber
                else stroke = '#94A3B8';
              } else if (absentWorkerId) {
                // Someone else is hovered — dim our line
                strokeOpacity = 0.25;
              }

              return (
                <path
                  key={i}
                  d={`M ${workerAnchorX} ${y1} C ${cx1} ${y1}, ${cx2} ${y2}, ${jobAnchorX} ${y2}`}
                  fill="none"
                  stroke={stroke}
                  strokeWidth={strokeWidth}
                  strokeOpacity={strokeOpacity}
                  strokeDasharray={dashArray}
                  strokeLinecap="round"
                  style={{ transition: 'stroke 0.25s, stroke-opacity 0.25s' }}
                />
              );
            })}
          </svg>
        )}

        {/* Worker column — left */}
        <div className="absolute top-0 left-0" style={{ width: workerColWidth, height: containerHeight }}>
          {WORKERS.map((w, i) => {
            const isAbsent = w.id === absentWorkerId;
            const someoneElseAbsent = absentWorkerId && !isAbsent;
            return (
              <div
                key={w.id}
                className="absolute"
                style={{
                  top: padding + i * workerRowH,
                  height: workerRowH - 8,
                  width: workerColWidth - 12,
                  left: 0,
                }}
                onMouseEnter={() => setAbsentWorkerId(w.id)}
                onMouseLeave={() => setAbsentWorkerId(cur => (cur === w.id ? null : cur))}
              >
                <button
                  className="group flex h-full w-full items-center gap-3 rounded-lg border px-3 py-2 text-left transition-all"
                  style={{
                    borderColor: isAbsent ? '#E11D48' : '#E4DCC8',
                    backgroundColor: isAbsent ? '#FEF2F2' : 'white',
                    opacity: someoneElseAbsent ? 0.55 : 1,
                    boxShadow: isAbsent ? '0 2px 8px rgba(225, 29, 72, 0.15)' : 'none',
                  }}
                >
                  <div
                    className="flex h-10 w-10 shrink-0 items-center justify-center rounded-full text-xs font-bold transition-all"
                    style={{
                      backgroundColor: isAbsent ? '#FCA5A5' : COVALENT_BLUE,
                      color: 'white',
                      textDecoration: isAbsent ? 'line-through' : 'none',
                      textDecorationColor: '#991B1B',
                    }}
                  >
                    {w.initials}
                  </div>
                  <div className="min-w-0 flex-1">
                    <div className="truncate text-sm font-semibold" style={{ color: INK, fontFamily: "'IBM Plex Serif', Georgia, serif" }}>
                      {w.name}
                    </div>
                    <div className="text-[11px]" style={{ color: isAbsent ? '#991B1B' : MUTED }}>
                      {isAbsent ? 'absent today' : `eligible for ${(Object.entries(assignments).filter(([, ids]) => ids.includes(w.id)).length)} obj`}
                    </div>
                  </div>
                </button>
              </div>
            );
          })}
        </div>

        {/* Job column — right */}
        <div className="absolute top-0 right-0" style={{ width: jobColWidth, height: containerHeight }}>
          {jobStates.map((j, i) => {
            const statusStyle = getStatusStyle(j.status);
            return (
              <div
                key={j.id}
                className="absolute"
                style={{
                  top: padding + i * jobRowH,
                  height: jobRowH - 12,
                  width: jobColWidth - 12,
                  right: 0,
                }}
              >
                <div
                  className="flex h-full flex-col justify-center rounded-lg border-2 px-4 py-3 transition-all"
                  style={{
                    borderColor: statusStyle.border,
                    backgroundColor: statusStyle.bg,
                    transform: j.changed ? 'scale(1.01)' : 'scale(1)',
                  }}
                >
                  <div className="flex items-center justify-between">
                    <span className="text-sm font-semibold" style={{ color: INK, fontFamily: "'IBM Plex Serif', Georgia, serif" }}>
                      {j.name}
                    </span>
                    <span className="text-[10px] font-semibold tracking-wider uppercase" style={{ color: statusStyle.label }}>
                      {statusStyle.labelText}
                    </span>
                  </div>
                  <div className="mt-2 flex items-baseline gap-2">
                    <span
                      className="text-2xl font-bold tabular-nums transition-colors"
                      style={{ color: statusStyle.numberColor, fontFamily: "'IBM Plex Mono', ui-monospace, monospace" }}
                    >
                      {j.effActive}
                    </span>
                    <span className="text-sm" style={{ color: MUTED, fontFamily: "'IBM Plex Mono', ui-monospace, monospace" }}>
                      / {j.required}
                    </span>
                    <span className="ml-auto text-[11px]" style={{ color: MUTED }}>
                      {j.status === 'zero' ? 'no coverage' :
                       j.status === 'gap' ? `${j.effGap} short` :
                       j.status === 'met' ? 'met' :
                       `+${j.effGap} slack`}
                    </span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Caption */}
      <div
        className="mt-6 rounded-lg border-l-4 px-4 py-3 transition-all"
        style={{
          borderLeftColor: absentWorkerId ? '#E11D48' : '#E4DCC8',
          backgroundColor: absentWorkerId ? '#FEF2F2' : '#FBF9F3',
          minHeight: '72px',
        }}
      >
        <div className="text-sm font-semibold" style={{ color: INK, fontFamily: "'IBM Plex Serif', Georgia, serif" }}>
          {caption.title}
        </div>
        <div className="mt-1 text-sm leading-relaxed" style={{ color: MUTED }}>
          {caption.detail}
        </div>
      </div>

      {/* Legend */}
      <div className="mt-4 flex flex-wrap items-center justify-center gap-4 text-[11px]" style={{ color: MUTED }}>
        <LegendItem color="#ECF8F0" borderColor="#BFE5CC" label="Healthy (slack)" />
        <LegendItem color="#F1EEE6" borderColor="#D6CFB8" label="Met (exact)" />
        <LegendItem color="#FDF6E3" borderColor="#F3E1B0" label="Gap (short)" />
        <LegendItem color="#FEF2F2" borderColor="#FCA5A5" label="Zero coverage" />
      </div>
    </div>
  );
}

function LegendItem({ color, borderColor, label }) {
  return (
    <div className="flex items-center gap-2">
      <div className="h-4 w-4 rounded border-2" style={{ backgroundColor: color, borderColor }} />
      <span>{label}</span>
    </div>
  );
}

// Visual styling per job-status
function getStatusStyle(status) {
  switch (status) {
    case 'zero':    return { bg: '#FEF2F2', border: '#FCA5A5', label: '#991B1B', labelText: 'no coverage', numberColor: '#991B1B' };
    case 'gap':     return { bg: '#FDF6E3', border: '#F3E1B0', label: '#A16207', labelText: 'under req',    numberColor: '#A16207' };
    case 'met':     return { bg: '#F1EEE6', border: '#D6CFB8', label: '#6B6357', labelText: 'met',          numberColor: '#1C1A16' };
    case 'healthy': return { bg: '#ECF8F0', border: '#BFE5CC', label: '#166534', labelText: 'healthy',      numberColor: '#166534' };
    default:        return { bg: 'white',   border: '#E4DCC8', label: '#6B6357', labelText: '',             numberColor: '#1C1A16' };
  }
}

function Act2Dataset({ scenarioId }) {
  const { assignments, objectives } = applyScenario(scenarioId);
  const { objState } = computeScores(assignments, objectives);

  return (

function Act3WorkerRisk({ scenarioId }) {
  const { assignments, objectives } = applyScenario(scenarioId);
  const { objState, workerRisk } = computeScores(assignments, objectives);

  const aliceRisk = workerRisk.alice;

  return (
    <Section number="02" title="Worker Concentration Risk">
      <Prose>
        A worker's risk score captures <em>how much they're being leaned on</em> across gap jobs. The question: if this person calls out, how much coverage collapses?
      </Prose>

      <div className="mt-8">
        <h3 className="mb-3 text-sm font-semibold tracking-wider uppercase" style={{ color: MUTED }}>The formula</h3>
        <Formula>
          <div className="text-sm leading-relaxed" style={{ color: INK }}>
            <span className="font-bold">risk</span>(worker) = <span style={{ color: COVALENT_BLUE }}>Σ</span>
            <sub className="text-[10px]" style={{ color: MUTED }}>gap jobs</sub>
            {' '}
            ( gap_severity <span style={{ color: MUTED }}>×</span> 1 / eligible )
          </div>
        </Formula>
        <p className="mt-2 text-sm" style={{ color: MUTED }}>
          For every gap job the worker is active on, multiply how bad the gap is by how few alternatives exist. Sum across all such jobs.
        </p>
      </div>

      {/* Worked example for Alice — node diagram */}
      <div className="mt-10">
        <h3 className="mb-4 text-sm font-semibold tracking-wider uppercase" style={{ color: MUTED }}>Let's compute Alice's risk</h3>

        <div className="rounded-xl border p-4" style={{ backgroundColor: 'white', borderColor: '#E4DCC8' }}>
          <WorkerRiskDiagram
            worker={WORKERS.find(w => w.id === 'alice')}
            contributions={aliceRisk.contributions.map(c => ({ ...c, obj: objState[c.objectiveId] }))}
          />
        </div>

        {aliceRisk.contributions.length === 0 && (
          <div className="mt-3 text-sm leading-relaxed" style={{ color: MUTED, fontFamily: "'IBM Plex Serif', Georgia, serif" }}>
            Alice's risk is <strong style={{ color: INK }}>0</strong> because none of the objectives she's active on are currently under-covered. The formula only sums over gap jobs — and there are none for her right now.
          </div>
        )}
      </div>

      {/* All workers comparison */}
      <div className="mt-10">
        <h3 className="mb-4 text-sm font-semibold tracking-wider uppercase" style={{ color: MUTED }}>Every worker, same method</h3>
        <div className="overflow-hidden rounded-xl border" style={{ borderColor: '#E4DCC8', backgroundColor: 'white' }}>
          <table className="w-full text-sm">
            <thead>
              <tr className="border-b" style={{ borderColor: '#E4DCC8', backgroundColor: '#F8F4EB' }}>
                <th className="px-4 py-3 text-left text-[11px] font-semibold tracking-wider uppercase" style={{ color: MUTED }}>Worker</th>
                <th className="px-4 py-3 text-left text-[11px] font-semibold tracking-wider uppercase" style={{ color: MUTED }}>Active on gap jobs</th>
                <th className="px-4 py-3 text-right text-[11px] font-semibold tracking-wider uppercase" style={{ color: MUTED }}>Risk</th>
              </tr>
            </thead>
            <tbody>
              {WORKERS.map(w => {
                const risk = workerRisk[w.id];
                const gapObjs = risk.contributions.map(c => objState[c.objectiveId]);
                return (
                  <tr key={w.id} className="border-b last:border-b-0" style={{ borderColor: '#F0E8D5' }}>
                    <td className="px-4 py-3">
                      <WorkerChip worker={w} active={true} size="sm" />
                    </td>
                    <td className="px-4 py-3 text-sm" style={{ color: MUTED }}>
                      {gapObjs.length === 0 ? (
                        <span className="italic">none</span>
                      ) : (
                        gapObjs.map(o => o.name).join(', ')
                      )}
                    </td>
                    <td className="px-4 py-3 text-right">
                      <span
                        className="text-base font-semibold tabular-nums"
                        style={{
                          color: risk.total >= 0.4 ? '#991B1B' : risk.total > 0 ? '#A16207' : MUTED,
                          fontFamily: "'IBM Plex Mono', ui-monospace, monospace",

                      >
                        {fmt(risk.total)}

          </table>

      </div>

      <div className="mt-6 space-y-3">
        <Callout tone="info">
          <strong>Why this formula works:</strong> dividing by eligible count means a worker is "punished" more when they're one of few. And multiplying by severity means the risk is proportional to how badly the job needs help. Both signals matter — a worker active on 10 gap jobs with 10 alternatives each is less exposed than one sole-eligible for even a single job.
        </Callout>
        <Callout tone="warning">
          <strong>A subtlety worth noting:</strong> the formula sums over <em>currently-gapped</em> jobs only. In the baseline, Bob is sole-eligible for Objective B — if he's out, B loses all coverage — yet his worker-risk score is no higher than Alice's. That's because B is technically "met" today, so it contributes nothing to the sum. The <em>Job Risk</em> formula coming up next catches this kind of hidden fragility through the scarcity term. The two metrics are designed to be read together.
        </Callout>
      </div>
    </Section>
  );
}

function Act4JobRisk({ scenarioId }) {
  const { assignments, objectives } = applyScenario(scenarioId);
  const { objState, workerRisk } = computeScores(assignments, objectives);

  const jobA = objState.A;

  return (
    <Section number="03" title="Job Resilience Risk">
      <Prose>
        Worker risk answers "whose absence would hurt us?" Job risk answers the same question from the other direction: "which objectives are fragile?" The trick is that a job can look fine on paper while quietly depending on already-stretched people.
      </Prose>

      <div className="mt-8">
        <h3 className="mb-3 text-sm font-semibold tracking-wider uppercase" style={{ color: MUTED }}>The formula</h3>
        <Formula>
          <div className="text-sm leading-relaxed" style={{ color: INK }}>
            <span className="font-bold">risk</span>(job) = ( required / eligible ) <span style={{ color: MUTED }}>×</span> avg( worker_risk<sub className="text-[10px]">eligible</sub> )
          </div>
        </Formula>
        <p className="mt-2 text-sm" style={{ color: MUTED }}>
          Two pieces: <strong>scarcity</strong> — how tight the eligible pool is relative to requirement — and <strong>average worker risk</strong> of whoever's eligible. Multiplied together, they catch jobs that are either understaffed or staffed by already-stretched people, or both.
        </p>
      </div>

      {/* Worked example for Job A — node diagram */}
      <div className="mt-10">
        <h3 className="mb-4 text-sm font-semibold tracking-wider uppercase" style={{ color: MUTED }}>Let's compute Objective A's risk</h3>

        <div className="rounded-xl border p-4" style={{ backgroundColor: 'white', borderColor: '#E4DCC8' }}>
          <JobRiskDiagram
            job={jobA}
            eligibleWorkerData={jobA.active.map(wid => {
              const worker = WORKERS.find(w => w.id === wid);
              // Derive each eligible worker's risk as a Fraction (sum of their gap-job contributions)
              const wRisk = workerRisk[wid];
              const contribFracs = wRisk.contributions.map(c => {
                const ob = objState[c.objectiveId];
                const sev = frac(ob.required - ob.activeCount, ob.required);
                const dep = frac(1, ob.eligibleCount);
                return mulFrac(sev, dep);
              });
              const riskFrac = sumFracs(contribFracs);
              return { worker, riskFrac };
            })}
          />
        </div>

        {jobA.eligibleCount === 0 && (
          <div className="mt-3 text-sm leading-relaxed" style={{ color: MUTED, fontFamily: "'IBM Plex Serif', Georgia, serif" }}>
            Objective A has <strong style={{ color: INK }}>zero eligible workers</strong>. Scarcity divides by zero — the formula is undefined here, so we treat this as maximum risk. The objective literally cannot be covered by anyone on the current roster.
          </div>
        )}
      </div>

      {/* All jobs comparison */}
      <div className="mt-10">
        <h3 className="mb-4 text-sm font-semibold tracking-wider uppercase" style={{ color: MUTED }}>Every objective, same method</h3>
        <div className="overflow-hidden rounded-xl border" style={{ borderColor: '#E4DCC8', backgroundColor: 'white' }}>
          <table className="w-full text-sm">
            <thead>
              <tr className="border-b" style={{ borderColor: '#E4DCC8', backgroundColor: '#F8F4EB' }}>
                <th className="px-4 py-3 text-left text-[11px] font-semibold tracking-wider uppercase" style={{ color: MUTED }}>Objective</th>
                <th className="px-4 py-3 text-center text-[11px] font-semibold tracking-wider uppercase" style={{ color: MUTED }}>Scarcity</th>
                <th className="px-4 py-3 text-center text-[11px] font-semibold tracking-wider uppercase" style={{ color: MUTED }}>Avg Risk</th>
                <th className="px-4 py-3 text-right text-[11px] font-semibold tracking-wider uppercase" style={{ color: MUTED }}>Job Risk</th>
              </tr>
            </thead>
            <tbody>
              {objectives.map(o => {
                const s = objState[o.id];
                return (
                  <tr key={o.id} className="border-b last:border-b-0" style={{ borderColor: '#F0E8D5' }}>
                    <td className="px-4 py-3" style={{ fontFamily: "'IBM Plex Serif', Georgia, serif" }}>
                      <span className="font-semibold">{o.name}</span>
                    </td>
                    <td className="px-4 py-3 text-center tabular-nums" style={{ fontFamily: "'IBM Plex Mono', ui-monospace, monospace", color: MUTED }}>
                      {fmt(s.scarcity)}
                    </td>
                    <td className="px-4 py-3 text-center tabular-nums" style={{ fontFamily: "'IBM Plex Mono', ui-monospace, monospace", color: MUTED }}>
                      {fmt(s.avgWorkerRisk)}
                    </td>
                    <td className="px-4 py-3 text-right">
                      <span
                        className="text-base font-semibold tabular-nums"
                        style={{
                          color: !isFinite(s.jobRisk) || s.jobRisk >= 1 ? '#991B1B' : s.jobRisk >= 0.3 ? '#A16207' : s.jobRisk > 0 ? MUTED : '#166534',
                          fontFamily: "'IBM Plex Mono', ui-monospace, monospace",
                        }}
                      >
                        {fmt(s.jobRisk)}
                      </span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      <div className="mt-6 space-y-3">
        <Callout tone="info">
          <strong>Why normalize by requirement?</strong> Without it, a job needing 6 workers always looks "safer" than a job needing 2. Scarcity (<code style={{ fontFamily: "'IBM Plex Mono', monospace" }}>required / eligible</code>) captures tightness of coverage — fair across jobs of any size.
        </Callout>
        <Callout tone="success">
          <strong>Look at Objective B's score.</strong> It's "met" on paper, no gap — yet it carries a non-zero risk score. The scarcity term (<code style={{ fontFamily: "'IBM Plex Mono', monospace" }}>1/1 = 1.0</code>) and the fact that Bob is also active on a gap job gives it away. This is the hidden fragility that worker risk alone missed.
        </Callout>
      </div>
    </Section>
  );
}

      </div>
      <h2
        className="mb-8 leading-tight font-semibold"
        style={{
          fontFamily: "'IBM Plex Serif', Georgia, serif",
          fontSize: 'clamp(1.75rem, 3vw, 2.5rem)',
          color: INK,
          letterSpacing: '-0.015em',
        }}
      >
        {title}
      </h2>
      {children}
    </section>
  );
}

function Prose({ children }) {
  return (
    <p
      className="text-lg leading-relaxed"
      style={{
        fontFamily: "'IBM Plex Serif', Georgia, serif",
        color: INK,
      }}
    >
      {children}
    </p>
  );
}

function StepRow({ index, children }) {
  return (
    <div className="rounded-lg border p-4" style={{ backgroundColor: '#FBF9F3', borderColor: '#E4DCC8' }}>
      <div className="mb-2 flex items-center gap-2">
        <div
          className="flex h-6 w-6 items-center justify-center rounded-full text-[11px] font-semibold"
          style={{ backgroundColor: COVALENT_BLUE, color: 'white' }}
        >
          {index}
        </div>
      </div>
      <div>{children}</div>
    </div>
  );
}

// ============================================================
// MAIN
// ============================================================

function ScoringWalkthrough() {
  const [scenarioId, setScenarioId] = useState('baseline');

  useEffect(() => {
    const id = 'ibm-plex-link';
    if (!document.getElementById(id)) {
      const link = document.createElement('link');
      link.id = id;
      link.rel = 'stylesheet';
      link.href = 'https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap';
      document.head.appendChild(link);
    }
  }, []);

  return (
    <div style={{ ...baseStyle, backgroundColor: CREAM, minHeight: '100vh' }}>
      <ScenariosBar scenarioId={scenarioId} setScenarioId={setScenarioId} />
      <Hero scenarioId={scenarioId} />
      <Act2Dataset scenarioId={scenarioId} />
      <Act3WorkerRisk scenarioId={scenarioId} />
      <Act4JobRisk scenarioId={scenarioId} />
      <Act5Scenarios scenarioId={scenarioId} setScenarioId={setScenarioId} />
      <Closing />
      <footer className="border-t py-8 text-center text-xs"
        style={{ borderColor: '#E4DCC8', color: MUTED }}>
        Resilience scoring walkthrough · A companion document to the Workforce Resilience dashboard
      </footer>
    </div>
  );
}

// Mount
ReactDOM.createRoot(document.getElementById('root')).render(<ScoringWalkthrough />);
  </script>
</body>
</html>
