<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Covalent + Solumina: Workforce Operations Playbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --accent: #06448E;
    --navy: #051B42;
    --orange: #FF9B36;
    --bg: #F6F6F6;
    --white: #FFFFFF;
    --border: #E4E4E4;
    --text: #1A1A1A;
    --muted: #5A6378;
    --soft: #EEF2F7;
    --solumina: #4A5568;
    --success: #2E7D5B;
    --warn: #C56A1A;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.55;
  }
  h1, h2, h3, h4 {
    font-family: 'Inter', -apple-system, sans-serif;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.2;
    margin: 0;
  }
  p { margin: 0 0 1em 0; }
  a { color: var(--accent); text-decoration: none; }
  .container { max-width: 1100px; margin: 0 auto; padding: 0 32px; }
  .narrow { max-width: 820px; }

  /* Hero */
  .hero {
    background: var(--navy);
    color: var(--white);
    padding: 64px 0 80px 0;
    border-bottom: 4px solid var(--orange);
  }
  .hero-logos {
    display: flex;
    align-items: center;
    gap: 28px;
    margin-bottom: 40px;
  }
  .hero-logo-covalent {
    height: 36px;
    width: auto;
    display: block;
  }
  .hero-logo-ibaset {
    height: 32px;
    width: auto;
    display: block;
  }
  .hero-divider {
    display: block;
    width: 1px;
    height: 32px;
    background: rgba(255,255,255,0.25);
  }
  .hero h1 {
    color: var(--white);
    font-size: 44px;
    line-height: 1.15;
    margin-bottom: 20px;
    max-width: 880px;
  }
  .hero-sub {
    font-size: 19px;
    line-height: 1.55;
    color: rgba(255,255,255,0.82);
    max-width: 760px;
    margin: 0;
    font-weight: 300;
  }

  /* Section */
  section { padding: 80px 0; }
  section.tight { padding: 56px 0; }
  section.alt { background: var(--white); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .section-eyebrow {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 32px;
    margin-bottom: 16px;
  }
  .section-lede {
    font-size: 17px;
    color: var(--muted);
    max-width: 720px;
    margin-bottom: 40px;
    line-height: 1.6;
  }

  /* Thesis */
  .thesis-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    margin-top: 8px;
  }
  .thesis-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px;
    position: relative;
  }
  .thesis-card.accent { border-left: 3px solid var(--accent); }
  .thesis-card.navy { border-left: 3px solid var(--navy); }
  .thesis-card.orange { border-left: 3px solid var(--orange); }
  .thesis-card .label {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .thesis-card h3 {
    font-size: 19px;
    margin-bottom: 10px;
  }
  .thesis-card p {
    font-size: 15px;
    color: var(--text);
    margin: 0;
    line-height: 1.55;
  }

  /* Why grid */
  .why-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-top: 8px;
  }
  .why-item {
    background: var(--white);
    padding: 22px 24px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  .why-num {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    min-width: 28px;
  }
  .why-text {
    font-size: 15px;
    color: var(--text);
    line-height: 1.5;
  }


  /* Timeline */
  .timeline-wrap {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    margin-top: 8px;
  }
  .hphase-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-bottom: 28px;
  }
  .hphase {
    background: var(--soft);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 14px;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    transition: all 0.15s ease;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .hphase:hover {
    background: #E6EBF2;
    border-color: #CFD7E2;
  }
  .hphase.active {
    background: var(--navy);
    border-color: var(--navy);
    color: var(--white);
  }
  .hphase-name {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 600;
    opacity: 0.7;
  }
  .hphase.active .hphase-name {
    color: var(--orange);
    opacity: 1;
  }
  .hphase-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--navy);
    line-height: 1.3;
  }
  .hphase.active .hphase-label {
    color: var(--white);
  }
  .hphase-months {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    margin-top: 2px;
  }
  .hphase.active .hphase-months {
    color: rgba(255,255,255,0.65);
  }
  .timeline-detail-wide {
    border-left: 3px solid var(--accent);
    padding: 4px 0 4px 24px;
  }
  .detail-eyebrow {
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .detail-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 36px;
    align-items: start;
  }
  .detail-title {
    font-size: 26px;
    margin-bottom: 14px;
  }
  .detail-desc {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.6;
    margin: 0;
  }
  .detail-right {
    background: var(--soft);
    border-radius: 8px;
    padding: 18px 20px;
  }
  .detail-deliverables-label {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .detail-deliverables-text {
    font-size: 15px;
    color: var(--text);
    font-weight: 500;
    line-height: 1.5;
  }

  /* Stepper */
  .stepper-layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 32px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    min-height: 560px;
  }
  .stepper-nav {
    background: var(--soft);
    border-right: 1px solid var(--border);
    padding: 20px 0;
  }
  .stepper-nav button {
    display: flex;
    align-items: center;
    width: 100%;
    background: transparent;
    border: none;
    text-align: left;
    padding: 14px 24px;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    color: var(--muted);
    border-left: 3px solid transparent;
    transition: all 0.15s ease;
    line-height: 1.35;
  }
  .stepper-nav button:hover { background: rgba(6,68,142,0.04); color: var(--text); }
  .stepper-nav button.active {
    background: var(--white);
    color: var(--navy);
    border-left-color: var(--orange);
    font-weight: 600;
  }
  .stepper-nav .step-num {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 12px;
    color: var(--accent);
    margin-right: 12px;
    font-weight: 600;
    min-width: 22px;
  }
  .stepper-nav button.active .step-num { color: var(--orange); }
  .stepper-content {
    padding: 36px 40px;
  }
  .stepper-content .step-eyebrow {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    font-weight: 500;
  }
  .stepper-content h3 {
    font-size: 26px;
    margin-bottom: 20px;
  }
  .stepper-content .step-desc {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 24px;
    line-height: 1.6;
  }
  .step-block {
    margin-bottom: 22px;
  }
  .step-block-title {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--navy);
    font-weight: 600;
    margin-bottom: 10px;
  }
  .step-block ul {
    margin: 0;
    padding: 0;
    list-style: none;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 24px;
  }
  .step-block ul.single { grid-template-columns: 1fr; }
  .step-block li {
    font-size: 14px;
    color: var(--text);
    padding-left: 14px;
    position: relative;
    line-height: 1.5;
  }
  .step-block li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 9px;
    width: 5px;
    height: 5px;
    background: var(--accent);
    border-radius: 50%;
  }
  .step-block.deferred li::before { background: var(--muted); }
  .step-block.avoid li::before { background: var(--warn); }
  .step-pager {
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .step-pager button {
    background: transparent;
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .step-pager button:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
  }
  .step-pager button:disabled { opacity: 0.4; cursor: not-allowed; }
  .step-pager .progress {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 12px;
    color: var(--muted);
  }

  /* System of record diagram */
  .sor-wrap {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 36px;
    margin-top: 8px;
  }
  .sor-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }
  .sor-tabs button {
    background: transparent;
    border: none;
    padding: 14px 22px;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    font-weight: 500;
    transition: all 0.15s ease;
  }
  .sor-tabs button:hover { color: var(--text); }
  .sor-tabs button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }
  .sor-tabs .phase-num {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 11px;
    color: var(--muted);
    margin-right: 8px;
  }
  .sor-tabs button.active .phase-num { color: var(--accent); }
  .sor-diagram {
    display: grid;
    grid-template-columns: 1fr 120px 1fr;
    gap: 0;
    align-items: stretch;
    min-height: 300px;
  }
  .sor-side {
    border-radius: 10px;
    padding: 24px;
    display: flex;
    flex-direction: column;
  }
  .sor-side.solumina {
    background: #F0F2F6;
    border: 1px solid #D6DBE3;
  }
  .sor-side.covalent {
    background: #EAF1FA;
    border: 1px solid #C8DAEF;
  }
  .sor-side .sor-name {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .sor-side.solumina .sor-name { color: var(--solumina); }
  .sor-side.covalent .sor-name { color: var(--accent); }
  .sor-side h4 {
    font-size: 18px;
    margin-bottom: 16px;
  }
  .sor-side ul {
    margin: 0;
    padding: 0;
    list-style: none;
  }
  .sor-side li {
    font-size: 14px;
    color: var(--text);
    padding: 8px 0;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    line-height: 1.4;
  }
  .sor-side li:last-child { border-bottom: none; }
  .sor-flow {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 0 8px;
  }
  .sor-arrow {
    width: 100%;
    background: var(--soft);
    border-radius: 6px;
    padding: 10px 8px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.3;
    transition: all 0.25s ease;
    border: 1px solid var(--border);
  }
  .sor-arrow.active {
    background: var(--accent);
    color: var(--white);
    border-color: var(--accent);
    transform: scale(1.02);
    box-shadow: 0 4px 12px rgba(6,68,142,0.18);
  }
  .sor-arrow .arrow-icon {
    display: block;
    margin-bottom: 4px;
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 14px;
  }
  .sor-caption {
    margin-top: 24px;
    padding: 18px 22px;
    background: var(--soft);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    font-size: 14px;
    color: var(--text);
    line-height: 1.55;
  }

  /* Gating workflow animation */
  .gating-wrap {
    background: var(--navy);
    border-radius: 12px;
    padding: 40px;
    margin-top: 8px;
    color: var(--white);
  }
  .gating-wrap .section-eyebrow { color: var(--orange); }
  .gating-wrap h3 { color: var(--white); font-size: 22px; margin-bottom: 8px; }
  .gating-wrap .gating-sub {
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    margin-bottom: 28px;
  }
  .gating-stages {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    position: relative;
  }
  .gating-stage {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 18px 14px;
    transition: all 0.4s ease;
    position: relative;
  }
  .gating-stage.active {
    background: var(--orange);
    border-color: var(--orange);
    transform: translateY(-4px);
  }
  .gating-stage.complete {
    background: rgba(255,155,54,0.15);
    border-color: rgba(255,155,54,0.4);
  }
  .gating-stage .stage-num {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .gating-stage.active .stage-num { color: rgba(0,0,0,0.5); }
  .gating-stage .stage-name {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.35;
    color: var(--white);
  }
  .gating-stage.active .stage-name { color: var(--navy); }
  .gating-stage .stage-system {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    margin-top: 8px;
    letter-spacing: 0.5px;
  }
  .gating-stage.active .stage-system { color: rgba(0,0,0,0.5); }
  .gating-controls {
    margin-top: 28px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .gating-controls button {
    background: var(--orange);
    color: var(--navy);
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: filter 0.15s ease;
  }
  .gating-controls button:hover { filter: brightness(1.08); }
  .gating-controls button.secondary {
    background: transparent;
    color: rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.2);
  }
  .gating-status {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
  }

  /* KPI grid */
  .kpi-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-top: 8px;
  }
  .kpi-col {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
  }
  .kpi-col .kpi-label {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    font-weight: 600;
  }
  .kpi-col h4 {
    font-size: 18px;
    margin-bottom: 16px;
  }
  .kpi-col ul {
    margin: 0;
    padding: 0;
    list-style: none;
  }
  .kpi-col li {
    font-size: 14px;
    color: var(--text);
    padding: 10px 0;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .kpi-col li::before {
    content: "□";
    color: var(--accent);
    font-size: 16px;
    line-height: 1;
  }
  .kpi-baseline {
    margin-top: 24px;
    background: var(--white);
    border-left: 3px solid var(--orange);
    padding: 16px 22px;
    border-radius: 4px;
    font-size: 14px;
    color: var(--text);
  }
  .kpi-baseline strong { color: var(--navy); }

  /* Use cases */
  .uc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    margin-top: 8px;
  }
  .uc-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    display: flex;
    flex-direction: column;
  }
  .uc-card .uc-num {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 12px;
    color: var(--orange);
    letter-spacing: 1px;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .uc-card h3 {
    font-size: 18px;
    margin-bottom: 16px;
  }
  .uc-block {
    margin-bottom: 14px;
  }
  .uc-block-label {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .uc-block p {
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
    margin: 0;
  }
  .uc-outcomes {
    margin-top: auto;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .uc-outcomes ul { margin: 0; padding: 0; list-style: none; }
  .uc-outcomes li {
    font-size: 13px;
    color: var(--text);
    padding: 4px 0 4px 14px;
    position: relative;
    line-height: 1.4;
  }
  .uc-outcomes li::before {
    content: "→";
    position: absolute;
    left: 0;
    color: var(--success);
    font-weight: 600;
  }

  /* Closing recommendation */
  .closing {
    background: var(--navy);
    color: var(--white);
    padding: 80px 0;
    border-top: 4px solid var(--orange);
  }
  .closing .section-eyebrow { color: var(--orange); }
  .closing h2 { color: var(--white); font-size: 30px; margin-bottom: 24px; }
  .closing p {
    color: rgba(255,255,255,0.85);
    font-size: 17px;
    line-height: 1.7;
    max-width: 760px;
  }
  .closing .pull {
    border-left: 3px solid var(--orange);
    padding: 12px 0 12px 24px;
    margin-top: 32px;
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 19px;
    line-height: 1.55;
    color: var(--white);
    font-style: italic;
    max-width: 760px;
  }

function GatingWorkflow() {
  const [stage, setStage] = useState(-1);
  const [playing, setPlaying] = useState(false);
  const intervalRef = useRef(null);

  useEffect(() => {
    if (playing) {
      intervalRef.current = setInterval(() => {
        setStage(prev => {
          if (prev >= GATING_STAGES.length - 1) {
            setPlaying(false);
            return prev;
          }
          return prev + 1;
        });
      }, 1100);
    } else {
      clearInterval(intervalRef.current);
    }
    return () => clearInterval(intervalRef.current);
  }, [playing]);

  const handlePlay = () => {
    if (stage >= GATING_STAGES.length - 1) setStage(-1);
    setPlaying(true);
  };
  const handleReset = () => {
    setPlaying(false);
    setStage(-1);
  };

  return (
    <section>
      <div className="container">
        <div className="section-eyebrow">Workflow in motion</div>
        <h2 className="section-title">Qualification gating, end to end</h2>
        <p className="section-lede">
          Qualification gating is where Covalent and Solumina close the loop operationally. Covalent owns who is eligible; Solumina enforces eligibility at the work step. Press play to walk through the full sequence.
        </p>

        <div className="gating-wrap">
          <h3>From OJT completion to enforced execution</h3>
          <p className="gating-sub">Operator → Covalent → Integration → Solumina → Floor</p>

          <div className="gating-stages">
            {GATING_STAGES.map((s, i) => {
              let cls = '';
              if (i === stage) cls = 'active';
              else if (i < stage) cls = 'complete';
              return (
                <div className={`gating-stage ${cls}`} key={i} onClick={() => { setPlaying(false); setStage(i); }} style={{cursor: 'pointer'}}>
                  <div className="stage-num">STAGE {s.num}</div>
                  <div className="stage-name">{s.name}</div>
                  <div className="stage-system">{s.system}</div>
                </div>
              );
            })}
          </div>

          <div className="gating-controls">
            <button onClick={handlePlay} disabled={playing}>
              {stage >= GATING_STAGES.length - 1 ? 'Replay' : (playing ? 'Playing...' : 'Play sequence')}
            </button>
            <button className="secondary" onClick={handleReset}>Reset</button>
            <span className="gating-status">
              {stage < 0 ? 'Ready' : stage >= GATING_STAGES.length - 1 ? 'Complete · ineligible workers blocked' : `Stage ${String(stage + 1).padStart(2, '0')} of 05`}
            </span>
          </div>
        </div>
      </div>
    </section>
  );
}
