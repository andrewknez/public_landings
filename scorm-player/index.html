// =============================================================================

class SimulatedSCORMAdapter {
  constructor(config, onApiCall) {
    this.config = config;
    this.onApiCall = onApiCall;
    this.initialized = false;
    this.finished = false;
    this.sessionStart = null;
    this.interactionCount = 0;
    
    this.data = {
      'cmi.core.student_id': config.learnerId,
      'cmi.core.student_name': config.learnerName,
      'cmi.core.lesson_status': 'not attempted',
      'cmi.core.lesson_location': '',
      'cmi.core.entry': 'ab-initio',
      'cmi.core.credit': config.playbackMode === 'REVIEW' ? 'no-credit' : 'credit',
      'cmi.core.lesson_mode': config.playbackMode === 'REVIEW' ? 'review' : 'normal',
      'cmi.core.score.raw': '',
      'cmi.core.score.min': 0,
      'cmi.core.score.max': 100,
      'cmi.core.session_time': '0000:00:00.00',
      'cmi.core.total_time': '0000:00:00.00',
      'cmi.core.exit': '',
      'cmi.suspend_data': '',
      'cmi.student_data.mastery_score': config.masteryScore || '',
      'cmi.interactions._count': 0,
    };
  }

  log(method, args, result) {
    this.onApiCall({
      timestamp: new Date().toISOString(),
      method,
      args,
      result,
      dataSnapshot: { ...this.data },
    });
  }

  LMSInitialize(param) {
    this.initialized = true;
    this.sessionStart = Date.now();
    this.log('LMSInitialize', [param], 'true');
    return 'true';
  }

  LMSFinish(param) {
    if (!this.initialized) return 'false';
    const sessionMs = Date.now() - this.sessionStart;
    this.data['cmi.core.session_time'] = this.msToScormTime(sessionMs);
    this.finished = true;
    this.initialized = false;
    this.log('LMSFinish', [param], 'true');
    return 'true';
  }

  LMSGetValue(element) {
    const value = this.data[element] ?? '';
    this.log('LMSGetValue', [element], String(value));
    return String(value);
  }

  LMSSetValue(element, value) {
    if (!this.initialized) return 'false';
    const interactionMatch = element.match(/^cmi\.interactions\.(\d+)\./);
    if (interactionMatch) {
      const idx = parseInt(interactionMatch[1]);
      if (idx >= this.interactionCount) {
        this.interactionCount = idx + 1;
        this.data['cmi.interactions._count'] = this.interactionCount;
      }
    }
    this.data[element] = value;
    this.log('LMSSetValue', [element, value], 'true');
    return 'true';
  }

  LMSCommit(param) {
    this.log('LMSCommit', [param], 'true');
    return 'true';
  }

  LMSGetLastError() { return '0'; }
  LMSGetErrorString(code) { return code === '0' ? 'No error' : 'Error'; }
  LMSGetDiagnostic(code) { return ''; }

  msToScormTime(ms) {
    const totalSeconds = Math.floor(ms / 1000);
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    const centiseconds = Math.floor((ms % 1000) / 10);
    return hours.toString().padStart(4, '0') + ':' + minutes.toString().padStart(2, '0') + ':' + seconds.toString().padStart(2, '0') + '.' + centiseconds.toString().padStart(2, '0');
  }

  getSessionTimeMs() {
    if (!this.sessionStart) return 0;
    return Date.now() - this.sessionStart;
  }
}

const ApiCallLog = ({ calls }) => {
  const logRef = useRef(null);
  
  useEffect(() => {
    if (logRef.current) {
      logRef.current.scrollTop = logRef.current.scrollHeight;
    }
  }, [calls]);

  const getMethodColor = (method) => {
    switch (method) {
      case 'LMSInitialize': return theme.success;
      case 'LMSFinish': return theme.danger;
      case 'LMSSetValue': return theme.blue;
      case 'LMSGetValue': return '#6f42c1';
      case 'LMSCommit': return '#fd7e14';
      default: return theme.gray600;
    }
  };

  return (
    <div ref={logRef} style={{
      flex: 1,
      overflowY: 'auto',
      fontFamily: "'Consolas', 'Monaco', monospace",
      fontSize: '10px',
      lineHeight: '1.5',
      background: theme.gray50,
    }}>
      {calls.length === 0 && (
        <div style={{ color: theme.gray500, padding: '12px', fontStyle: 'italic', fontSize: '11px' }}>
          Waiting for SCORM API calls...
        </div>
      )}
      {calls.map((call, idx) => (
        <div key={idx} style={{
          padding: '6px 10px',
          borderBottom: '1px solid ' + theme.gray200,
          background: idx % 2 === 0 ? theme.white : theme.gray50,
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '2px' }}>
            <span style={{ color: theme.gray400, fontSize: '9px' }}>
              {new Date(call.timestamp).toLocaleTimeString()}
            </span>
            <span style={{ color: getMethodColor(call.method), fontWeight: 600 }}>
              {call.method}
            </span>
          </div>
          <div style={{ color: theme.gray600, paddingLeft: '4px', wordBreak: 'break-all' }}>
            {call.args.map((arg, i) => (
              <span key={i}>
                {i > 0 && <span style={{ color: theme.gray400 }}>, </span>}
                <span style={{ color: '#d63384' }}>"{arg}"</span>
              </span>
            ))}
            <span style={{ color: theme.gray400 }}> → </span>
            <span style={{ color: theme.success }}>"{call.result}"</span>
          </div>
        </div>
      ))}
    </div>
  );
};

const TextModule = ({ module, onComplete, isCompleted }) => {
  const [hasScrolledToBottom, setHasScrolledToBottom] = useState(isCompleted);
  const contentRef = useRef(null);
  
  const handleScroll = (e) => {
    const { scrollTop, scrollHeight, clientHeight } = e.target;
    if (scrollTop + clientHeight >= scrollHeight - 20) {
      if (!hasScrolledToBottom) {
        setHasScrolledToBottom(true);
        onComplete();
      }
    }
  };
  
  useEffect(() => {
    if (contentRef.current) {
      const { scrollHeight, clientHeight } = contentRef.current;
      if (scrollHeight <= clientHeight && !isCompleted) {
        setTimeout(() => {
          setHasScrolledToBottom(true);
          onComplete();
        }, 1000);
      }
    }
  }, [isCompleted, onComplete]);

  return (
    <div 
      ref={contentRef}
      onScroll={handleScroll}
      style={{
        flex: 1,
        overflowY: 'auto',
        padding: '32px 48px',
        background: theme.white,
      }}
    >
      <h1 style={{
        fontSize: '26px',
        fontWeight: 700,
        color: theme.navy,
        marginBottom: '24px',
        paddingBottom: '16px',
        borderBottom: '2px solid ' + theme.gray200,
      }}>
        {module.content.heading}
      </h1>
      
      {module.content.sections.map((section, idx) => (
        <div key={idx} style={{ marginBottom: '28px' }}>
          {section.title && (
            <h2 style={{
              fontSize: '18px',
              fontWeight: 600,
              color: theme.gray800,
              marginBottom: '12px',
            }}>
              {section.title}
            </h2>
          )}
          
          {section.body && (
            <p style={{
              fontSize: '15px',
              color: theme.gray700,
              lineHeight: 1.7,
              marginBottom: section.bullets || section.numbered ? '12px' : '0',
            }}>
              {section.body}
            </p>
          )}
          
          {section.bullets && (
            <ul style={{
              paddingLeft: '24px',
              margin: '12px 0',
            }}>
              {section.bullets.map((bullet, bIdx) => (
                <li key={bIdx} style={{
                  fontSize: '14px',
                  color: section.warning ? theme.danger : theme.gray700,
                  marginBottom: '8px',
                  lineHeight: 1.5,
                }}>
                  {bullet}
                </li>
              ))}
            </ul>
          )}
          
          {section.numbered && (
            <ol style={{
              paddingLeft: '24px',
              margin: '12px 0',
            }}>
              {section.numbered.map((item, nIdx) => (
                <li key={nIdx} style={{
                  fontSize: '14px',
                  color: theme.gray700,
                  marginBottom: '8px',
                  lineHeight: 1.5,
                }}>
                  {item}
                </li>
              ))}
            </ol>
          )}
          
          {section.warning && (
            <div style={{
              marginTop: '12px',
              padding: '12px 16px',
              background: theme.dangerLight,
              borderLeft: '4px solid ' + theme.danger,
              borderRadius: '4px',
              fontSize: '13px',
              color: theme.danger,
            }}>
              ⚠️ These items pose a serious safety hazard and are strictly prohibited.
            </div>
          )}
        </div>
      ))}
      
      {!hasScrolledToBottom && (
        <div style={{
          textAlign: 'center',
          padding: '20px',
          color: theme.gray500,
          fontSize: '13px',
        }}>
          ↓ Scroll to continue ↓
        </div>
      )}
    </div>
  );
};

  const [hasRead, setHasRead] = useState(isCompleted);
  const contentRef = useRef(null);
  
  const handleScroll = (e) => {
    const { scrollTop, scrollHeight, clientHeight } = e.target;
    if (scrollTop + clientHeight >= scrollHeight - 20) {
      if (!hasRead) {
        setHasRead(true);
        onComplete();
      }

  };
  
  useEffect(() => {
    if (contentRef.current) {
      const { scrollHeight, clientHeight } = contentRef.current;
      if (scrollHeight <= clientHeight && !isCompleted) {
        setTimeout(() => {
          setHasRead(true);
          onComplete();
        }, 1000);
      }

const VideoModule = ({ module, onComplete, isCompleted }) => {
  const [isPlaying, setIsPlaying] = useState(false);
  const [progress, setProgress] = useState(isCompleted ? 100 : 0);
  
  useEffect(() => {
    let interval;
    if (isPlaying && progress < 100) {
      interval = setInterval(() => {
        setProgress(prev => {
          if (prev >= 100) {
            setIsPlaying(false);
            return 100;
          }
          return prev + 0.5;
        });
      }, 50);
    }
    return () => clearInterval(interval);
  }, [isPlaying, progress]);
  
  useEffect(() => {
    if (progress >= 100 && !isCompleted) {

  }, [progress, isCompleted, onComplete]);

const AssessmentModule = ({ module, adapter, onComplete, onResponse }) => {
  const [currentQuestion, setCurrentQuestion] = useState(0);
  const [answers, setAnswers] = useState({});
  const [questionStartTime, setQuestionStartTime] = useState(Date.now());
  
  const question = module.questions[currentQuestion];
  
  const handleAnswer = (optionId) => {
    const latency = Date.now() - questionStartTime;
    const isCorrect = optionId === question.correctAnswer;
    
    const idx = currentQuestion;
    adapter.LMSSetValue('cmi.interactions.' + idx + '.id', question.id);
    adapter.LMSSetValue('cmi.interactions.' + idx + '.type', 'choice');
    adapter.LMSSetValue('cmi.interactions.' + idx + '.student_response', optionId);
    adapter.LMSSetValue('cmi.interactions.' + idx + '.correct_responses.0.pattern', question.correctAnswer);
    adapter.LMSSetValue('cmi.interactions.' + idx + '.result', isCorrect ? 'correct' : 'wrong');
    adapter.LMSSetValue('cmi.interactions.' + idx + '.latency', '0000:00:' + Math.floor(latency/1000).toString().padStart(2,'0') + '.' + Math.floor((latency%1000)/10).toString().padStart(2,'0'));
    adapter.LMSSetValue('cmi.interactions.' + idx + '.weighting', String(question.weight));
    adapter.LMSCommit('');
    
    onResponse({
      questionId: question.id,
      studentResponse: optionId,
      result: isCorrect ? 'correct' : 'wrong',
      latency,
    });
    
    setAnswers({ ...answers, [question.id]: optionId });
    
    if (currentQuestion < module.questions.length - 1) {
      setCurrentQuestion(currentQuestion + 1);
      setQuestionStartTime(Date.now());
    } else {
      const newAnswers = { ...answers, [question.id]: optionId };
      let correct = 0;
      module.questions.forEach(q => {
        if (newAnswers[q.id] === q.correctAnswer) correct++;
      });
      const score = Math.round((correct / module.questions.length) * 100);
      onComplete(score, correct, module.questions.length);
    }
  };

  return (
    <div style={{
      flex: 1,
      display: 'flex',
      flexDirection: 'column',
      background: theme.white,
      padding: '32px',
    }}>
      <div style={{ display: 'flex', gap: '6px', marginBottom: '32px' }}>
        {module.questions.map((_, idx) => (
          <div key={idx} style={{
            flex: 1,
            height: '6px',
            borderRadius: '3px',
            background: idx < currentQuestion ? theme.success : idx === currentQuestion ? theme.blue : theme.gray300,
          }} />
        ))}
      </div>
      
      <div style={{ marginBottom: '8px', color: theme.gray500, fontSize: '13px' }}>
        Question {currentQuestion + 1} of {module.questions.length}
      </div>
      <h2 style={{
        fontSize: '20px',
        fontWeight: 600,
        color: theme.gray900,
        marginBottom: '24px',
        lineHeight: 1.4,
      }}>
        {question.text}
      </h2>
      
      <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
        {question.options.map((option) => (
          <button
            key={option.id}
            onClick={() => handleAnswer(option.id)}
            style={{
              padding: '14px 16px',
              background: theme.white,
              border: '1px solid ' + theme.gray300,
              borderRadius: '6px',
              textAlign: 'left',
              cursor: 'pointer',
              display: 'flex',
              alignItems: 'center',
              gap: '12px',
              transition: 'all 0.15s ease',
            }}
            onMouseEnter={(e) => {
              e.currentTarget.style.borderColor = theme.blue;
              e.currentTarget.style.background = theme.gray50;
            }}
            onMouseLeave={(e) => {
              e.currentTarget.style.borderColor = theme.gray300;
              e.currentTarget.style.background = theme.white;
            }}
          >
            <div style={{
              width: '28px',
              height: '28px',
              borderRadius: '50%',
              background: theme.navy,
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              fontSize: '12px',
              fontWeight: 600,
              color: theme.white,
              flexShrink: 0,
            }}>
              {option.id.toUpperCase()}
            </div>
            <span style={{ color: theme.gray800, fontSize: '14px' }}>
              {option.text}
            </span>
          </button>
        ))}
      </div>
    </div>
  );
};

const SimulatedPlayer = ({ course, playbackMode, onExit }) => {
  const [apiCalls, setApiCalls] = useState([]);
  const [responses, setResponses] = useState([]);
  const [currentModuleIndex, setCurrentModuleIndex] = useState(0);
  const [completedModules, setCompletedModules] = useState([]);
  const [showResults, setShowResults] = useState(false);
  const [results, setResults] = useState(null);
  const [sessionTimeMs, setSessionTimeMs] = useState(0);
  const [debugTab, setDebugTab] = useState('calls');
  
  const adapterRef = useRef(null);
  
  useEffect(() => {
    const adapter = new SimulatedSCORMAdapter({
      learnerId: 'EMP-2847',
      learnerName: 'Garcia, Maria',
      playbackMode,
      masteryScore: course.masteryScore,
    }, (call) => {
      setApiCalls(prev => [...prev, call]);
    });
    
    adapterRef.current = adapter;
    adapter.LMSInitialize('');
    adapter.LMSSetValue('cmi.core.lesson_status', 'incomplete');
    
    const timer = setInterval(() => {
      setSessionTimeMs(adapter.getSessionTimeMs());
    }, 1000);
    
    return () => {
      clearInterval(timer);
      if (adapterRef.current && !adapterRef.current.finished) {
        adapterRef.current.LMSFinish('');
      }
    };
  }, [course.masteryScore, playbackMode]);
  
  const handleModuleComplete = () => {
    const adapter = adapterRef.current;
    if (!completedModules.includes(currentModuleIndex)) {
      setCompletedModules([...completedModules, currentModuleIndex]);
      adapter.LMSSetValue('cmi.core.lesson_location', course.modules[currentModuleIndex].id);
      adapter.LMSCommit('');
    }
  };
  
  const handleSelectModule = (idx) => {
    const canSelect = idx <= Math.max(...completedModules, 0) + 1 && idx <= completedModules.length;
    if (canSelect || idx === 0) {
      setCurrentModuleIndex(idx);
      adapterRef.current.LMSSetValue('cmi.core.lesson_location', course.modules[idx].id);
      adapterRef.current.LMSCommit('');
    }
  };
  
  const handlePrevious = () => {
    if (currentModuleIndex > 0) {
      handleSelectModule(currentModuleIndex - 1);
    }
  };
  
  const handleNext = () => {
    if (currentModuleIndex < course.modules.length - 1) {
      handleSelectModule(currentModuleIndex + 1);
    }
  };
  
  const handleResponse = (response) => {
    setResponses(prev => [...prev, response]);
  };
  
  const handleAssessmentComplete = (score, correct, total) => {
    const adapter = adapterRef.current;
    const passed = score >= course.masteryScore;
    
    adapter.LMSSetValue('cmi.core.score.raw', String(score));
    adapter.LMSSetValue('cmi.core.score.min', '0');
    adapter.LMSSetValue('cmi.core.score.max', '100');
    adapter.LMSSetValue('cmi.core.lesson_status', passed ? 'passed' : 'failed');
    adapter.LMSCommit('');
    adapter.LMSFinish('');
    
    setResults({ score, correct, total, passed });
    setShowResults(true);
  };
  
  const currentModule = course.modules[currentModuleIndex];
  const latestData = apiCalls.length > 0 ? apiCalls[apiCalls.length - 1].dataSnapshot : {};
  const contentModules = course.modules.filter(m => m.type !== 'assessment');
  const allContentComplete = contentModules.every((_, idx) => completedModules.includes(idx));
  const isCurrentModuleComplete = completedModules.includes(currentModuleIndex);
  const isLastContentModule = currentModuleIndex === contentModules.length - 1;

  const renderModule = () => {
    if (showResults) {
      return (
        <ResultsScreen
          score={results.score}
          correct={results.correct}
          total={results.total}
          masteryScore={course.masteryScore}
          onBackToDashboard={onExit}
        />
      );
    }
    
    switch (currentModule.type) {
      case 'text':
        return (
          <TextModule 
            module={currentModule} 
            onComplete={handleModuleComplete}
            isCompleted={isCurrentModuleComplete}
          />
        );
      case 'text-image':
        return (
          <TextImageModule 
            module={currentModule} 
            onComplete={handleModuleComplete}
            isCompleted={isCurrentModuleComplete}
          />
        );
      case 'video':
        return (
          <VideoModule 
            module={currentModule} 
            onComplete={handleModuleComplete}
            isCompleted={isCurrentModuleComplete}
          />
        );
      case 'assessment':
        return (
          <AssessmentModule
            module={currentModule}
            adapter={adapterRef.current}
            onComplete={handleAssessmentComplete}
            onResponse={handleResponse}
          />
        );
      default:
        return null;
    }
  };

  return (
    <div style={{
      display: 'flex',
      height: '100vh',
      background: theme.gray100,

          <button
            onClick={onExit}
            style={{
              background: 'rgba(255,255,255,0.1)',

              const isAssessment = mod.type === 'assessment';
              const assessmentLocked = isAssessment && !allContentComplete;
              
              return (
                <div
                  key={mod.id}
                  onClick={() => !isLocked && !assessmentLocked && handleSelectModule(idx)}
                  style={{
                    padding: '12px 14px',
                    display: 'flex',
                    alignItems: 'center',
                    gap: '12px',
                    cursor: isLocked || assessmentLocked ? 'not-allowed' : 'pointer',
                    background: isCurrent ? theme.gray50 : theme.white,
                    borderBottom: '1px solid ' + theme.gray100,
                    borderLeft: isCurrent ? '3px solid ' + theme.blue : '3px solid transparent',
                    opacity: isLocked || assessmentLocked ? 0.5 : 1,
                  }}
                >
                  <div style={{
                    width: '28px',
                    height: '28px',
                    borderRadius: '50%',
                    background: isCompleted ? theme.success : isCurrent ? theme.blue : theme.gray200,
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    fontSize: '11px',
                    fontWeight: 600,
                    color: isCompleted || isCurrent ? theme.white : theme.gray500,
                    flexShrink: 0,
                  }}>
                    {isCompleted ? '✓' : isAssessment ? '📝' : idx + 1}
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{
                      fontSize: '13px',
                      fontWeight: isCurrent ? 600 : 400,
                      color: theme.gray800,
                      marginBottom: '2px',
                    }}>
                      {mod.title}
                    </div>
                    <div style={{ fontSize: '11px', color: theme.gray500, display: 'flex', alignItems: 'center', gap: '4px' }}>
                      {mod.type === 'text' && <span>📄</span>}
                      {mod.type === 'text-image' && <span>🖼️</span>}
                      {mod.type === 'video' && <span>🎬</span>}
                      {mod.type === 'assessment' && <span>📝</span>}
                      <span>{mod.duration}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: '180px', borderTop: '1px solid ' + theme.gray200 }}>
          <div style={{
            padding: '8px 14px',
            background: theme.navyLight,
            display: 'flex',
            alignItems: 'center',
            gap: '6px',
          }}>
            <span style={{ fontSize: '11px' }}>🔧</span>
            <span style={{ color: theme.white, fontWeight: 600, fontSize: '10px' }}>SCORM Debug</span>
          </div>
          
          <div style={{ display: 'flex', borderBottom: '1px solid ' + theme.gray200 }}>
            {[
              { id: 'calls', label: 'API Calls' },
              { id: 'data', label: 'CMI Data' },
              { id: 'responses', label: 'Responses' },
            ].map(tab => (
              <button
                key={tab.id}
                onClick={() => setDebugTab(tab.id)}
                style={{
                  flex: 1,
                  padding: '6px 4px',
                  border: 'none',
                  borderBottom: debugTab === tab.id ? '2px solid ' + theme.blue : '2px solid transparent',
                  fontSize: '9px',
                  fontWeight: 500,
                  cursor: 'pointer',
                  background: theme.white,
                  color: debugTab === tab.id ? theme.blue : theme.gray500,
                }}
              >
                {tab.label}
              </button>
            ))}
          </div>
          
          <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
            {debugTab === 'calls' && <ApiCallLog calls={apiCalls} />}
            {debugTab === 'data' && <DataModelPanel data={latestData} sessionTimeMs={sessionTimeMs} />}
            {debugTab === 'responses' && <ResponsesPanel responses={responses} />}
          </div>
          
          <div style={{
            padding: '6px 10px',
            borderTop: '1px solid ' + theme.gray200,
            display: 'flex',
            justifyContent: 'space-between',
            fontSize: '9px',
            color: theme.gray500,
            background: theme.gray50,
          }}>
            <span>Calls: {apiCalls.length}</span>
            <span>Responses: {responses.length}</span>
            <span>SCORM {course.scormVersion}</span>
          </div>
        </div>
      </div>
    </div>
  );
};

function SCORMPrototype() {
  const [view, setView] = useState('dashboard');
  const [playbackMode, setPlaybackMode] = useState('ASSIGNMENT');
  
  return (
    <React.Fragment>
      {view === 'dashboard' && (
        <Dashboard onLaunchCourse={(mode) => {
          setPlaybackMode(mode);
          setView('player');
        }} />
      )}
      
      {view === 'player' && (
        <SimulatedPlayer
          course={mockCourse}
          playbackMode={playbackMode}
          onExit={() => setView('dashboard')}
        />
      )}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<SCORMPrototype />);
