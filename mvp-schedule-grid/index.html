  const myAssignments = assignments.filter((a) => a.workerId === worker.id);
  const unscheduled = myAssignments
    .map((a) => ({
      assignment: a,
      objective: OBJECTIVES.find((o) => o.id === a.objectiveId),
      schedulingStatus: deriveSchedulingStatus(sessions, a.workerId, a.objectiveId),
    }))
    .filter((opt) => opt.objective && opt.schedulingStatus === 'Unscheduled');

  // Objectives the worker doesn't have yet (any status)
  const myObjectiveIds = new Set(myAssignments.map((a) => a.objectiveId));
  const availableObjectives = OBJECTIVES.filter((o) => !myObjectiveIds.has(o.id));

  const [tab, setTab] = useState(unscheduled.length > 0 ? 'existing' : 'new');

  return (
    <div className="qmvp-modal-backdrop" onClick={onClose}>
      <div className="qmvp-detail" onClick={(e) => e.stopPropagation()} style={{ maxWidth: 520 }}>
        <div className="qmvp-detail-header">
          <h2>Schedule training for {worker.name}</h2>
          <button className="qmvp-close-btn" onClick={onClose}>×</button>
        </div>

        <div style={{ padding: '12px 20px 0', fontSize: 12, color: 'var(--ink-500)', fontFamily: 'IBM Plex Mono, monospace' }}>
          {fmtDateFull(date)}
        </div>

        <div className="qmvp-entry-tabs" style={{ marginTop: 12 }}>
          <button
            className={'qmvp-entry-tab' + (tab === 'existing' ? ' active' : '')}
            onClick={() => setTab('existing')}
          >
            Existing assignments
            <span className="qmvp-entry-tab-count">{unscheduled.length}</span>
          </button>
          <button
            className={'qmvp-entry-tab' + (tab === 'new' ? ' active' : '')}
            onClick={() => setTab('new')}
          >
            Assign new objective
            <span className="qmvp-entry-tab-count">{availableObjectives.length}</span>
          </button>
        </div>

        <div className="qmvp-picker-list">
          {tab === 'existing' && (
            unscheduled.length === 0 ? (
              <div className="qmvp-picker-empty">
                {worker.name} has no unscheduled assignments.<br />
                Switch to "Assign new objective" to add one.
              </div>
            ) : (
              unscheduled.map((opt) => (
                <div
                  key={opt.objective.id}
                  className="qmvp-picker-item"
                  onClick={() => onPick(opt.objective)}
                >
                  <div className="qmvp-picker-item-icon">{opt.objective.id.toUpperCase()}</div>
                  <div className="qmvp-picker-item-meta">
                    <div className="qmvp-picker-item-title">{opt.objective.name}</div>
                    <div className="qmvp-picker-item-sub">
                      {opt.objective.duration} {opt.objective.duration === 1 ? 'shift' : 'shifts'}
                      {' · '}{ASSIGNMENT_LABEL[opt.assignment.status]}
                    </div>
                  </div>
                </div>
              ))
            )
          )}

          {tab === 'new' && (
            availableObjectives.length === 0 ? (
              <div className="qmvp-picker-empty">
                {worker.name} is already assigned to every objective in the catalog.
              </div>
            ) : (
              availableObjectives.map((o) => (
                <div
                  key={o.id}
                  className="qmvp-picker-item"
                  onClick={() => onAssignAndPick(o)}
                >
                  <div className="qmvp-picker-item-icon" style={{ background: 'var(--amber-bg)', color: 'var(--amber)' }}>
                    {o.id.toUpperCase()}
                  </div>
                  <div className="qmvp-picker-item-meta">
                    <div className="qmvp-picker-item-title">{o.name}</div>
                    <div className="qmvp-picker-item-sub">
                      {o.duration} {o.duration === 1 ? 'shift' : 'shifts'}
                      {' · Will be assigned + scheduled'}
                    </div>
                  </div>
                </div>
              ))
            )
          )}
        </div>

        <div className="qmvp-detail-actions">
          <div />
          <div className="qmvp-detail-actions-right">
            <button className="qmvp-btn qmvp-btn-secondary qmvp-btn-sm" onClick={onClose}>Close</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================================================================
   SCHEDULER MODAL
   Create / Edit / Cancel / Complete a Training Window. Receives `row` shape:
     { worker, objective, activeSession }
   onSave outcomes: 'scheduled' | 'saved' | 'cancelled' | 'completed'
   ========================================================================== */

function SchedulerModal({ row, sessions, onClose, onSave }) {
  const { worker, objective, activeSession } = row;
  const isEdit = Boolean(activeSession);

  if (!worker || !objective) {
    return (
      <div className="qmvp-modal-backdrop" onClick={onClose}>
        <div className="qmvp-modal" onClick={(e) => e.stopPropagation()} style={{ padding: 24 }}>
          <h2 style={{ margin: '0 0 8px', fontSize: 16, color: 'var(--red)' }}>Seed data error</h2>
          <p style={{ fontSize: 13, color: 'var(--ink-700)' }}>Worker or Objective lookup failed.</p>
          <button className="qmvp-btn qmvp-btn-secondary" onClick={onClose}>Close</button>
        </div>
      </div>
    );
  }

  const initialMode = activeSession?.durationHours
    ? 'hours'
    : (objective.duration === 1 ? 'hours' : 'shifts');

  const initialDate = activeSession
    ? toInputDate(activeSession.start)
    : toInputDate(new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate() + 7));

  const initialShifts = activeSession && !activeSession.durationHours
    ? Math.max(1, Math.round((activeSession.end - activeSession.start) / (1000 * 60 * 60 * 24)))
    : objective.duration;

  const [durationMode, setDurationMode] = useState(initialMode);
  const [startDate, setStartDate]       = useState(initialDate);
  const [startTime, setStartTime]       = useState(activeSession?.startTime || '08:00');
  const [durationShifts, setDurationShifts] = useState(initialShifts);
  const [durationHours, setDurationHours]   = useState(activeSession?.durationHours || 4);
  const [trainerId, setTrainerId]       = useState(activeSession?.trainerId || '');
  const [workstationId, setWorkstationId] = useState(activeSession?.workstationId || '');
  const [shift, setShift]               = useState(activeSession?.shift || worker.shift);
  const [comment, setComment]           = useState('');

  const plannedStartDateObj = startDate ? parseInputDate(startDate) : null;
  const plannedEndDateObj = useMemo(() => {
    if (!plannedStartDateObj) return null;
    if (durationMode === 'hours') {
      const parts = (startTime || '08:00').split(':').map(Number);
      const start = new Date(plannedStartDateObj);
      start.setHours(parts[0], parts[1], 0, 0);
      return addHours(start, Number(durationHours) || 0);
    }
    return addDaysEod(plannedStartDateObj, (Number(durationShifts) || 1) - 1);
  }, [plannedStartDateObj, durationMode, startTime, durationShifts, durationHours]);

  const certifiedTrainers = useMemo(
    () => WORKERS.filter((w) => w.canTrain && w.certifiedObjectives && w.certifiedObjectives.indexOf(objective.id) !== -1),
    [objective.id]
  );

  const availableWorkstations = useMemo(
    () => WORKSTATIONS.filter((ws) => objective.workstationIds.indexOf(ws.id) !== -1),
    [objective]
  );

  const trainer = WORKERS.find((w) => w.id === trainerId);
  const trainerLoad = trainer
    ? trainerConcurrentLoad(sessions, trainerId, plannedStartDateObj, plannedEndDateObj, activeSession?.id)
    : 0;
  const trainerLevel = trainer ? loadLevel(trainerLoad, trainer.trainingCapacity) : null;

  const workstation = WORKSTATIONS.find((ws) => ws.id === workstationId);
  const wsLoad = workstation
    ? workstationConcurrentLoad(sessions, workstationId, plannedStartDateObj, plannedEndDateObj, objective.id, activeSession?.id)
    : 0;
  const wsLevel = workstation ? loadLevel(wsLoad, workstation.maxConcurrentObjectives) : null;

  const canSave = Boolean(startDate && trainerId && workstationId && (
    durationMode === 'shifts' ? durationShifts > 0 : durationHours > 0
  ));

  const warnings = [];
  if (trainerLevel === 'amber') warnings.push({ label: 'Trainer at capacity',     detail: trainer.name + ' will be at max (' + trainer.trainingCapacity + ') concurrent trainees.' });
  if (trainerLevel === 'red')   warnings.push({ label: 'Trainer over capacity',   detail: trainer.name + ' will exceed max (' + trainer.trainingCapacity + ').' });
  if (wsLevel === 'amber')      warnings.push({ label: 'Workstation at capacity', detail: workstation.name + ' will be at max (' + workstation.maxConcurrentObjectives + ') distinct objectives.' });
  if (wsLevel === 'red')        warnings.push({ label: 'Workstation over capacity', detail: workstation.name + ' will exceed max (' + workstation.maxConcurrentObjectives + ').' });

  const sessionStatusLabel = activeSession ? SESSION_LABEL[activeSession.status] : null;

  return (
    <div className="qmvp-modal-backdrop" onClick={onClose}>
      <div className="qmvp-modal" onClick={(e) => e.stopPropagation()}>
        <div className="qmvp-modal-header">
          <h2>{isEdit ? 'Edit Training Window' : 'Schedule Training Window'}</h2>
          {isEdit && (
            <span className={'qmvp-modal-status-chip ' + activeSession.status}>{sessionStatusLabel}</span>
          )}
        </div>

        <div className="qmvp-modal-body">
          <div className="qmvp-context-card">
            <Avatar worker={worker} size={36} />
            <div className="qmvp-context-text">
              <div className="qmvp-context-line1">{worker.name} · {objective.name}</div>
              <div className="qmvp-context-line2">
                {worker.role} · {worker.shift} shift · Default duration {objective.duration} {objective.duration === 1 ? 'shift' : 'shifts'}
              </div>
            </div>
          </div>

          {warnings.map((w, i) => (
            <div key={i} className="qmvp-warn">
              <span className="qmvp-warn-icon">!</span>
              <div>
                <strong>{w.label}</strong>
                <div className="qmvp-warn-sub">{w.detail}</div>
              </div>
            </div>
          ))}

          <div className="qmvp-field">
            <label className="qmvp-field-label">Duration Mode</label>
            <div className="qmvp-toggle">
              <button
                className={'qmvp-toggle-btn' + (durationMode === 'shifts' ? ' active' : '')}
                onClick={() => setDurationMode('shifts')}
              >Shifts (multi-day)</button>
              <button
                className={'qmvp-toggle-btn' + (durationMode === 'hours' ? ' active' : '')}
                onClick={() => setDurationMode('hours')}
              >Hours (single-day)</button>
            </div>
          </div>

          <div className="qmvp-row-2col">
            <div className="qmvp-field">
              <label className="qmvp-field-label qmvp-field-required">Planned Start Date</label>
              <input type="date" className="qmvp-input" value={startDate} onChange={(e) => setStartDate(e.target.value)} />
            </div>
            {durationMode === 'hours' ? (
              <div className="qmvp-field">
                <label className="qmvp-field-label qmvp-field-required">Start Time</label>
                <input type="time" className="qmvp-input" value={startTime} onChange={(e) => setStartTime(e.target.value)} />
              </div>
            ) : (
              <div className="qmvp-field">
                <label className="qmvp-field-label qmvp-field-required">Duration (shifts)</label>
                <input type="number" min="1" className="qmvp-input" value={durationShifts} onChange={(e) => setDurationShifts(e.target.value)} />
              </div>
            )}
          </div>

          {durationMode === 'hours' && (
            <div className="qmvp-field">
              <label className="qmvp-field-label qmvp-field-required">Duration (hours)</label>
              <input type="number" min="0.5" step="0.5" className="qmvp-input" value={durationHours} onChange={(e) => setDurationHours(e.target.value)} />
            </div>
          )}

          <div className="qmvp-field">
            <div className="qmvp-derived-card">
              <span className="qmvp-derived-label">
                {durationMode === 'hours' ? 'Planned End (Time)' : 'Planned End (Date)'}
              </span>
              <span className="qmvp-derived-val">
                {durationMode === 'hours'
                  ? (plannedEndDateObj ? plannedEndDateObj.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '—')
                  : (plannedEndDateObj ? plannedEndDateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—')}
              </span>
            </div>
          </div>

          <div className="qmvp-field">
            <label className="qmvp-field-label qmvp-field-required">Trainer</label>
            <div className="qmvp-select-with-badge">
              <select className="qmvp-select" value={trainerId} onChange={(e) => setTrainerId(e.target.value)}>
                <option value="">Select certified trainer…</option>
                {certifiedTrainers.map((t) => {
                  const load = trainerConcurrentLoad(sessions, t.id, plannedStartDateObj, plannedEndDateObj, activeSession?.id);
                  const level = loadLevel(load, t.trainingCapacity);
                  const suffix = level === 'green' ? '' : level === 'amber' ? '(at cap)' : '(over)';
                  return (
                    <option key={t.id} value={t.id}>
                      {t.name} — {load}/{t.trainingCapacity} {suffix}
                    </option>
                  );
                })}
              </select>
              {trainer && (
                <span className={'qmvp-load-badge qmvp-load-' + trainerLevel}>
                  {trainerLoad}/{trainer.trainingCapacity}
                </span>
              )}
            </div>
          </div>

          <div className="qmvp-field">
            <label className="qmvp-field-label qmvp-field-required">Workstation</label>
            <div className="qmvp-select-with-badge">
              <select className="qmvp-select" value={workstationId} onChange={(e) => setWorkstationId(e.target.value)}>
                <option value="">Select workstation…</option>
                {availableWorkstations.map((ws) => {
                  const load = workstationConcurrentLoad(sessions, ws.id, plannedStartDateObj, plannedEndDateObj, objective.id, activeSession?.id);
                  const level = loadLevel(load, ws.maxConcurrentObjectives);
                  const suffix = level === 'green' ? '' : level === 'amber' ? '(at cap)' : '(over)';
                  return (
                    <option key={ws.id} value={ws.id}>
                      {ws.name} ({ws.zone}) — {load}/{ws.maxConcurrentObjectives} {suffix}
                    </option>
                  );
                })}
              </select>
              {workstation && (
                <span className={'qmvp-load-badge qmvp-load-' + wsLevel}>
                  {wsLoad}/{workstation.maxConcurrentObjectives}
                </span>
              )}
            </div>
          </div>

          <div className="qmvp-field">
            <label className="qmvp-field-label qmvp-field-required">Shift</label>
            <div className="qmvp-toggle">
              <button
                className={'qmvp-toggle-btn' + (shift === 'Day' ? ' active' : '')}
                onClick={() => setShift('Day')}
              >Day</button>
              <button
                className={'qmvp-toggle-btn' + (shift === 'Night' ? ' active' : '')}
                onClick={() => setShift('Night')}
              >Night</button>
            </div>
          </div>

          <div className="qmvp-field">
            <label className="qmvp-field-label">
              {isEdit ? 'Add Comment (optional)' : 'Instructions / Comment'}
            </label>
            <textarea
              className="qmvp-textarea"
              placeholder={isEdit ? 'Append a note to the audit thread…' : 'Optional notes to the trainer and trainee…'}
              value={comment}
              onChange={(e) => setComment(e.target.value)}
            />
          </div>
        </div>

        <div className="qmvp-modal-footer">
          <div className="qmvp-footer-actions-left">
            {isEdit && activeSession.status === 'scheduled' && (
              <button className="qmvp-btn qmvp-btn-danger" onClick={() => onSave('cancelled')}>
                Cancel Window
              </button>
            )}
          </div>
          <div className="qmvp-footer-actions-right">
            <button className="qmvp-btn qmvp-btn-secondary" onClick={onClose}>Close</button>
            {isEdit && activeSession.status === 'scheduled' && (
              <button className="qmvp-btn qmvp-btn-complete" onClick={() => onSave('completed')}>
                Mark Complete
              </button>
            )}
            <button
              className="qmvp-btn qmvp-btn-primary"
              disabled={!canSave}
              onClick={() => onSave(isEdit ? 'saved' : 'scheduled')}
            >
              {isEdit ? 'Save Changes' : 'Schedule Window'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================================================================
   FILTER DRAWER
   Slide-out panel for filtering both Backlog and Grid views.
   Filters split into two scopes:
     - Row-level: Role, Employee, Shift (control which workers/rows appear)
     - Record-level: Objective, Status (control which records/bars appear)
   Live updates — no Apply button. Each toggle commits immediately.
   ========================================================================== */

function FilterDrawer({ filters, onChange, onClose, onClearAll, activeFilterCount }) {
  // Toggle a value in a multi-select array. If present, remove; if absent, add.
  const toggle = (key, value) => {
    const current = filters[key] || [];
    const next = current.indexOf(value) === -1
      ? [...current, value]
      : current.filter((v) => v !== value);
    onChange({ ...filters, [key]: next });
  };

  const isChecked = (key, value) => (filters[key] || []).indexOf(value) !== -1;

  // Available values for each filter
  const allEmployees = WORKERS;
  const allObjectives = OBJECTIVES;

  return (
    <>
      <div className="qmvp-panel-overlay" onClick={onClose} />
      <div className="qmvp-filter-drawer" onClick={(e) => e.stopPropagation()}>
        <div className="qmvp-filter-drawer-header">
          <h2 className="qmvp-filter-drawer-title">Filters</h2>
          <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
            <button
              className="qmvp-filter-clear-link"
              onClick={onClearAll}
              disabled={activeFilterCount === 0}
            >Clear all</button>
            <button className="qmvp-panel-close" onClick={onClose} aria-label="Close filters" style={{ position: 'static' }}>×</button>
          </div>
        </div>

        <div className="qmvp-filter-drawer-body">
          {/* Role — row-level */}
          <div className="qmvp-filter-section">
            <div className="qmvp-filter-section-header">
              <span className="qmvp-filter-section-title">Role</span>
              <span className="qmvp-filter-section-scope">Row filter</span>
            </div>
            <label className="qmvp-filter-checkbox">
              <input
                type="checkbox"
                checked={isChecked('roles', 'trainer')}
                onChange={() => toggle('roles', 'trainer')}
              />
              <span>Trainer</span>
              <span className="qmvp-filter-checkbox-meta">{WORKERS.filter((w) => w.canTrain).length}</span>
            </label>
            <label className="qmvp-filter-checkbox">
              <input
                type="checkbox"
                checked={isChecked('roles', 'trainee')}
                onChange={() => toggle('roles', 'trainee')}
              />
              <span>Trainee</span>
              <span className="qmvp-filter-checkbox-meta">{WORKERS.filter((w) => !w.canTrain).length}</span>
            </label>
          </div>

          {/* Shift — row-level */}
          <div className="qmvp-filter-section">
            <div className="qmvp-filter-section-header">
              <span className="qmvp-filter-section-title">Shift</span>
              <span className="qmvp-filter-section-scope">Row filter</span>
            </div>
            <label className="qmvp-filter-checkbox">
              <input
                type="checkbox"
                checked={isChecked('shifts', 'Day')}
                onChange={() => toggle('shifts', 'Day')}
              />
              <span>Day</span>
              <span className="qmvp-filter-checkbox-meta">{WORKERS.filter((w) => w.shift === 'Day').length}</span>
            </label>
            <label className="qmvp-filter-checkbox">
              <input
                type="checkbox"
                checked={isChecked('shifts', 'Night')}
                onChange={() => toggle('shifts', 'Night')}
              />
              <span>Night</span>
              <span className="qmvp-filter-checkbox-meta">{WORKERS.filter((w) => w.shift === 'Night').length}</span>
            </label>
          </div>

          {/* Employee — row-level */}
          <div className="qmvp-filter-section">
            <div className="qmvp-filter-section-header">
              <span className="qmvp-filter-section-title">Employee</span>
              <span className="qmvp-filter-section-scope">Row filter</span>
            </div>
            {allEmployees.map((w) => (
              <label key={w.id} className="qmvp-filter-checkbox">
                <input
                  type="checkbox"
                  checked={isChecked('employees', w.id)}
                  onChange={() => toggle('employees', w.id)}
                />
                <span>{w.name}</span>
                <span className="qmvp-filter-checkbox-meta">{w.shift}</span>
              </label>
            ))}
          </div>

          {/* Objective — record-level */}
          <div className="qmvp-filter-section">
            <div className="qmvp-filter-section-header">
              <span className="qmvp-filter-section-title">Objective</span>
              <span className="qmvp-filter-section-scope">Record filter</span>
            </div>
            {allObjectives.map((o) => (
              <label key={o.id} className="qmvp-filter-checkbox">
                <input
                  type="checkbox"
                  checked={isChecked('objectives', o.id)}
                  onChange={() => toggle('objectives', o.id)}
                />
                <span>{o.name}</span>
              </label>
            ))}
          </div>

          {/* Status — record-level */}
          <div className="qmvp-filter-section">
            <div className="qmvp-filter-section-header">
              <span className="qmvp-filter-section-title">Scheduling Status</span>
              <span className="qmvp-filter-section-scope">Record filter</span>
            </div>
            <label className="qmvp-filter-checkbox">
              <input
                type="checkbox"
                checked={isChecked('statuses', 'unscheduled')}
                onChange={() => toggle('statuses', 'unscheduled')}
              />
              <span>Unscheduled</span>
              <span className="qmvp-filter-checkbox-meta">Backlog only</span>
            </label>
            <label className="qmvp-filter-checkbox">
              <input
                type="checkbox"
                checked={isChecked('statuses', 'scheduled')}
                onChange={() => toggle('statuses', 'scheduled')}
              />
              <span>Scheduled</span>
            </label>
            <label className="qmvp-filter-checkbox">
              <input
                type="checkbox"
                checked={isChecked('statuses', 'completed')}
                onChange={() => toggle('statuses', 'completed')}
              />
              <span>Completed</span>
            </label>
          </div>
        </div>
      </div>
    </>
  );
}


/* ============================================================================
   ASSIGN OBJECTIVE PICKER
   Lighter-weight modal opened from "+ Assign Objective" in the profile panel.
   Just lists objectives the worker doesn't have yet, click → assigned + toast.
   No date / scheduling step — adds to backlog as Unscheduled.
   ========================================================================== */

function AssignObjectivePicker({ worker, assignments, onAssign, onClose }) {
  const myObjectiveIds = new Set(
    assignments.filter((a) => a.workerId === worker.id).map((a) => a.objectiveId)
  );
  const available = OBJECTIVES.filter((o) => !myObjectiveIds.has(o.id));

  return (
    <div className="qmvp-modal-backdrop" onClick={onClose}>
      <div className="qmvp-assign-modal" onClick={(e) => e.stopPropagation()}>
        <div className="qmvp-detail-header">
          <h2>Assign objective to {worker.name}</h2>
          <button className="qmvp-close-btn" onClick={onClose}>×</button>
        </div>

        <div className="qmvp-picker-list">
          {available.length === 0 ? (
            <div className="qmvp-picker-empty">
              {worker.name} is already assigned to every objective in the catalog.
            </div>
          ) : (
            available.map((o) => (
              <div
                key={o.id}
                className="qmvp-picker-item"
                onClick={() => onAssign(o)}
              >
                <div className="qmvp-picker-item-icon" style={{ background: 'var(--amber-bg)', color: 'var(--amber)' }}>
                  {o.id.toUpperCase()}
                </div>
                <div className="qmvp-picker-item-meta">
                  <div className="qmvp-picker-item-title">{o.name}</div>
                  <div className="qmvp-picker-item-sub">
                    {o.duration} {o.duration === 1 ? 'shift' : 'shifts'}
                    {' · Will be added as Unscheduled'}
                  </div>
                </div>
              </div>
            ))
          )}
        </div>

        <div className="qmvp-detail-actions">
          <div />
          <div className="qmvp-detail-actions-right">
            <button className="qmvp-btn qmvp-btn-secondary qmvp-btn-sm" onClick={onClose}>Close</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================================================================
   PROFILE PANEL
   Slide-out panel triggered by clicking a worker's row header.
   Sections:
     - Header: avatar, name, role, shift, badges
     - Quick stats
     - Focus toggle
     - Schedule as Trainee CTA
     - Assigned Objectives mini-table + "+ Assign Objective"
     - Scheduled Sessions (as Trainee)
     - Scheduled Sessions (as Trainer) — only if trainer
   ========================================================================== */

function ProfilePanel({
  worker,
  assignments,
  sessions,
  focusedWorkerId,
  onClose,
  onToggleFocus,
  onScheduleAsTrainee,
  onAssignObjective,
  onObjectiveRowClick,
  onSessionClick,
}) {
  if (!worker) return null;

  const myAssignments = assignments.filter((a) => a.workerId === worker.id);
  const assignedRows = myAssignments.map((a) => ({
    assignment: a,
    objective: OBJECTIVES.find((o) => o.id === a.objectiveId),
    schedulingStatus: deriveSchedulingStatus(sessions, a.workerId, a.objectiveId),
    activeSession: findActiveSession(sessions, a.workerId, a.objectiveId),
  })).filter((r) => r.objective);

  const traineeSessions = sessions.filter(
    (s) => s.traineeId === worker.id && s.status !== 'cancelled'
  ).sort((a, b) => a.start - b.start);

  const trainerSessions = worker.canTrain
    ? sessions.filter((s) => s.trainerId === worker.id && s.status !== 'cancelled').sort((a, b) => a.start - b.start)
    : [];

  // Open objectives = anything that isn't completed (active assignment status).
  const openObjectives = assignedRows.filter((r) => r.assignment.status !== 'active').length;
  const scheduledWindows = traineeSessions.filter((s) => ACTIVE_SESSION_STATUSES.has(s.status)).length;

  const isFocused = focusedWorkerId === worker.id;

  const tagClassFor = (raw) => raw === 'in_progress' ? 'qmvp-tag-inprogress'
    : raw === 'renewal' ? 'qmvp-tag-renewal'
    : raw === 'active'  ? 'qmvp-tag-active'
    : 'qmvp-tag-assigned';

  const schedulingCellFor = (r) => {
    if (r.assignment.status === 'active') {
      const completed = findCompletedSession(sessions, r.assignment.workerId, r.assignment.objectiveId);
      const completedDate = completed ? (completed.completedAt || completed.end) : null;
      return (
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 2 }}>
          <span style={{ fontSize: 12, color: 'var(--green)', fontWeight: 500 }}>Completed</span>
          {completedDate && (
            <span style={{ fontSize: 10, color: 'var(--ink-500)', fontFamily: 'IBM Plex Mono, monospace' }}>
              {completedDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}
            </span>
          )}
        </div>
      );
    }
    return r.schedulingStatus === 'Scheduled'
      ? <span className="qmvp-tag qmvp-tag-scheduled">Scheduled</span>
      : <span className="qmvp-tag qmvp-tag-unscheduled">Unscheduled</span>;
  };

  return (
    <>
      {/* Outside-click catcher (z-49). Modal backdrops sit at z-100 so when a
          modal is open over the panel, this overlay does NOT intercept its clicks. */}
      <div className="qmvp-panel-overlay" onClick={onClose} />

      <div className="qmvp-panel" onClick={(e) => e.stopPropagation()}>
        <button className="qmvp-panel-close" onClick={onClose} aria-label="Close panel">×</button>

        <div className="qmvp-panel-header">
          <div className="qmvp-panel-header-top">
            <Avatar worker={worker} size={56} />
            <div className="qmvp-panel-header-meta">
              <h2 className="qmvp-panel-header-name">{worker.name}</h2>
              <div className="qmvp-panel-header-role">{worker.role}</div>
              <div className="qmvp-panel-header-badges">
                <span className="qmvp-panel-badge qmvp-panel-badge-shift">{worker.shift} shift</span>
                {worker.canTrain && (
                  <span className="qmvp-panel-badge qmvp-panel-badge-trainer">Certified Trainer</span>
                )}
              </div>
            </div>
          </div>

          <div className="qmvp-panel-stats">
            <div className="qmvp-panel-stat">
              <div className="qmvp-panel-stat-label">Open Obj</div>
              <div className="qmvp-panel-stat-val">{openObjectives}</div>
            </div>
            <div className="qmvp-panel-stat">
              <div className="qmvp-panel-stat-label">Windows</div>
              <div className="qmvp-panel-stat-val">{scheduledWindows}</div>
            </div>
            {worker.canTrain && (
              <div className="qmvp-panel-stat">
                <div className="qmvp-panel-stat-label">As Trainer</div>
                <div className="qmvp-panel-stat-val">{trainerSessions.filter((s) => ACTIVE_SESSION_STATUSES.has(s.status)).length}</div>
              </div>
            )}
          </div>

          {/* Focus toggle */}
          <div className={'qmvp-focus-row' + (isFocused ? ' active' : '')}>
            <div className="qmvp-focus-icon" />
            <span className="qmvp-focus-text">
              {isFocused ? 'Calendar focused on this employee' : 'Focus on calendar'}
            </span>
            <button className="qmvp-focus-toggle-btn" onClick={() => onToggleFocus(worker.id)}>
              {isFocused ? 'Clear focus' : 'Focus'}
            </button>
          </div>

          <button
            className="qmvp-btn qmvp-btn-primary qmvp-panel-cta"
            onClick={() => onScheduleAsTrainee(worker)}
          >+ Schedule as Trainee</button>
        </div>

        <div className="qmvp-panel-body">
          {/* Assigned Objectives */}
          <div className="qmvp-panel-section">
            <div className="qmvp-panel-section-header">
              <span className="qmvp-panel-section-title">
                Assigned Objectives ({assignedRows.length})
              </span>
              <button
                className="qmvp-panel-section-add"
                onClick={() => onAssignObjective(worker)}
              >+ Assign Objective</button>
            </div>
            {assignedRows.length === 0 ? (
              <div className="qmvp-mini-table-empty">No objectives assigned.</div>
            ) : (
              <table className="qmvp-mini-table">
                <thead>
                  <tr>
                    <th>Objective</th>
                    <th style={{ textAlign: 'right' }}>Status</th>
                  </tr>
                </thead>
                <tbody>
                  {assignedRows.map((r) => {
                    const clickable = r.assignment.status !== 'active';
                    return (
                      <tr
                        key={r.objective.id}
                        className={clickable ? 'clickable' : ''}
                        onClick={() => clickable && onObjectiveRowClick(worker, r.objective, r.activeSession)}
                      >
                        <td>
                          <div style={{ fontWeight: 500, color: 'var(--ink-900)' }}>{r.objective.name}</div>
                          <div style={{ fontSize: 11, color: 'var(--ink-500)', marginTop: 2, fontFamily: 'IBM Plex Mono, monospace' }}>
                            {r.objective.duration} {r.objective.duration === 1 ? 'shift' : 'shifts'}
                            {' · '}
                            <span className={'qmvp-tag ' + tagClassFor(r.assignment.status)} style={{ fontSize: 10, padding: '1px 6px' }}>
                              {ASSIGNMENT_LABEL[r.assignment.status]}
                            </span>
                          </div>
                        </td>
                        <td style={{ textAlign: 'right' }}>
                          {schedulingCellFor(r)}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            )}
          </div>

          {/* Scheduled Sessions (as Trainee) */}
          <div className="qmvp-panel-section">
            <div className="qmvp-panel-section-header">
              <span className="qmvp-panel-section-title">
                Sessions as Trainee ({traineeSessions.length})
              </span>
            </div>
            {traineeSessions.length === 0 ? (
              <div className="qmvp-section-empty">No scheduled sessions as trainee.</div>
            ) : (
              traineeSessions.map((s) => {
                const obj = OBJECTIVES.find((o) => o.id === s.objectiveId);
                const trainer = WORKERS.find((w) => w.id === s.trainerId);
                const workstation = WORKSTATIONS.find((ws) => ws.id === s.workstationId);
                return (
                  <div
                    key={s.id}
                    className="qmvp-session-card"
                    onClick={() => onSessionClick(s)}
                  >
                    <div className={'qmvp-session-card-stripe ' + s.status} />
                    <div className="qmvp-session-card-meta">
                      <div className="qmvp-session-card-title">{obj ? obj.name : '—'}</div>
                      <div className="qmvp-session-card-sub">
                        {fmtDate(s.start)} → {fmtDate(s.end)}
                        {trainer && ' · Trainer: ' + trainer.name}
                        {workstation && ' · ' + workstation.name}
                      </div>
                    </div>
                    <span className={'qmvp-session-card-status ' + s.status}>
                      {SESSION_LABEL[s.status]}
                    </span>
                  </div>
                );
              })
            )}
          </div>

          {/* Scheduled Sessions (as Trainer) — only if trainer */}
          {worker.canTrain && (
            <div className="qmvp-panel-section" style={{ paddingBottom: 32 }}>
              <div className="qmvp-panel-section-header">
                <span className="qmvp-panel-section-title">
                  Sessions as Trainer ({trainerSessions.length})
                </span>
              </div>
              {trainerSessions.length === 0 ? (
                <div className="qmvp-section-empty">Not currently teaching any sessions.</div>
              ) : (
                trainerSessions.map((s) => {
                  const obj = OBJECTIVES.find((o) => o.id === s.objectiveId);
                  const trainee = WORKERS.find((w) => w.id === s.traineeId);
                  const workstation = WORKSTATIONS.find((ws) => ws.id === s.workstationId);
                  return (
                    <div
                      key={s.id}
                      className="qmvp-session-card"
                      onClick={() => onSessionClick(s)}
                    >
                      <div className={'qmvp-session-card-stripe ' + s.status} />
                      <div className="qmvp-session-card-meta">
                        <div className="qmvp-session-card-title">{obj ? obj.name : '—'}</div>
                        <div className="qmvp-session-card-sub">
                          {fmtDate(s.start)} → {fmtDate(s.end)}
                          {trainee && ' · Trainee: ' + trainee.name}
                          {workstation && ' · ' + workstation.name}
                        </div>
                      </div>
                      <span className={'qmvp-session-card-status ' + s.status}>
                        {SESSION_LABEL[s.status]}
                      </span>
                    </div>
                  );
                })
              )}
            </div>
          )}
        </div>
      </div>
    </>
  );
}

/* ============================================================================
   ROOT
   ========================================================================== */

function QmvpTrainingV2() {
  const [tab, setTab] = useState('grid'); // 'grid' | 'backlog'

  // Mutable state
  const [assignments, setAssignments] = useState(INIT_ASSIGNMENTS);
  const [sessions, setSessions] = useState(INIT_SESSIONS);

  // Grid frame controls
  const [zoom, setZoom] = useState('week');
  const [frameStart, setFrameStart] = useState(() => startOfWeek(TODAY));

  // Modal & panel states (only one at a time)
  const [detailSession, setDetailSession] = useState(null);
  const [entryContext, setEntryContext] = useState(null);  // { worker, date }
  const [modalRow, setModalRow] = useState(null);          // { worker, objective, activeSession }
  const [toast, setToast] = useState(null);
  const [profileWorkerId, setProfileWorkerId] = useState(null);  // worker shown in profile panel
  const [focusedWorkerId, setFocusedWorkerId] = useState(null);  // worker with calendar focus
  const [assignPickerWorker, setAssignPickerWorker] = useState(null); // worker to assign new obj to

  // Filter state. Each is an array of selected values; empty array = no filter on that dimension.
  // Row-level filters (control which workers/rows appear): employees, shifts, roles
  // Record-level filters (control which records/bars appear within visible workers): objectives, statuses
  // Persistence: localStorage if available (silently no-ops in sandboxed artifact environments).
  const FILTER_STORAGE_KEY = 'qmvp-training-v2-filters-v2';
  const FILTER_DEFAULTS = { employees: [], objectives: [], shifts: [], statuses: [], roles: [] };
  const [filters, setFilters] = useState(() => {
    try {
      const stored = window.localStorage.getItem(FILTER_STORAGE_KEY);
      if (stored) return { ...FILTER_DEFAULTS, ...JSON.parse(stored) };
    } catch (e) { /* localStorage unavailable — ignore */ }
    return FILTER_DEFAULTS;
  });

  // Persist filter changes when state mutates.
  useEffect(() => {
    try {
      window.localStorage.setItem(FILTER_STORAGE_KEY, JSON.stringify(filters));
    } catch (e) { /* localStorage unavailable — ignore */ }
  }, [filters]);

  const [filtersOpen, setFiltersOpen] = useState(false);

  // Active filter count for the "Filters · N" button badge
  const activeFilterCount =
    filters.employees.length +
    filters.objectives.length +
    filters.shifts.length +
    filters.statuses.length +
    filters.roles.length;

  // Open Sessions column visibility. Persisted to localStorage; defaults to true so
  // the feature is discoverable and data is visible by default.
  const COUNTS_STORAGE_KEY = 'qmvp-training-v2-show-counts';
  const [showCounts, setShowCounts] = useState(() => {
    try {
      const stored = window.localStorage.getItem(COUNTS_STORAGE_KEY);
      if (stored !== null) return stored === 'true';
    } catch (e) { /* localStorage unavailable — ignore */ }
    return true;
  });

  useEffect(() => {
    try {
      window.localStorage.setItem(COUNTS_STORAGE_KEY, String(showCounts));
    } catch (e) { /* localStorage unavailable — ignore */ }
  }, [showCounts]);

  /* ---------- Frame nav ---------- */

  const numCols = zoom === 'day' ? 24 : zoom === 'week' ? 7 : 28;

  const shiftFrame = (direction) => {
    if (zoom === 'day') {
      setFrameStart(addDays(frameStart, 1 * direction));
    } else if (zoom === 'week') {
      setFrameStart(addDays(frameStart, 7 * direction));
    } else {
      setFrameStart(addDays(frameStart, 28 * direction));
    }
  };

  const handleZoomChange = (newZoom) => {
    if (newZoom === 'day') {
      setFrameStart(startOfDay(TODAY));
    } else if (newZoom === 'week') {
      setFrameStart(startOfWeek(TODAY));
    } else {
      setFrameStart(startOfDay(TODAY));
    }
    setZoom(newZoom);
  };

  const goToday = () => {
    if (zoom === 'day') setFrameStart(startOfDay(TODAY));
    else if (zoom === 'week') setFrameStart(startOfWeek(TODAY));
    else setFrameStart(startOfDay(TODAY));
  };

  const frameLabel = useMemo(() => {
    if (zoom === 'day') {
      return frameStart.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric', year: 'numeric' });
    }
    const end = addDays(frameStart, numCols - 1);
    return fmtDate(frameStart) + ' – ' + fmtDate(end) + ', ' + frameStart.getFullYear();
  }, [zoom, frameStart, numCols]);

  /* ---------- Filter logic ----------
     Two scopes:
     - Row-level filters reduce which workers/rows appear: employees, shifts, roles
     - Record-level filters reduce which records/bars appear within visible workers:
       objectives, statuses

     Empty array = no filter applied for that dimension. */

  // Does this worker pass row-level filters?
  const workerPassesRowFilters = (worker) => {
    if (filters.employees.length > 0 && filters.employees.indexOf(worker.id) === -1) return false;
    if (filters.shifts.length > 0 && filters.shifts.indexOf(worker.shift) === -1) return false;
    if (filters.roles.length > 0) {
      const isTrainer = !!worker.canTrain;
      const wantsTrainer = filters.roles.indexOf('trainer') !== -1;
      const wantsTrainee = filters.roles.indexOf('trainee') !== -1;
      // Worker must match at least one selected role group.
      if (isTrainer && !wantsTrainer) return false;
      if (!isTrainer && !wantsTrainee) return false;
    }
    return true;
  };

  // Does this session pass record-level filters?
  // statusForFilter: maps a session/assignment combination to the user-facing status filter buckets.
  const sessionPassesRecordFilters = (session) => {
    if (filters.objectives.length > 0 && filters.objectives.indexOf(session.objectiveId) === -1) return false;
    if (filters.statuses.length > 0) {
      // Status filter has 3 user-facing options: Unscheduled, Scheduled, Completed.
      // Sessions are only Scheduled or Completed (or Cancelled, which we exclude from grid).
      // Unscheduled sessions don't exist as session objects, so they can't pass record filters here.
      const sessionBucket = session.status === 'completed' ? 'completed' : 'scheduled';
      if (filters.statuses.indexOf(sessionBucket) === -1) return false;
    }
    return true;
  };

  // Does this backlog row pass all filters?
  // Backlog rows have an assignment + optional active session, so we check both
  // row-level (worker properties) and record-level (objective + scheduling status).
  const backlogRowPassesFilters = (row) => {
    if (!workerPassesRowFilters(row.worker)) return false;
    if (filters.objectives.length > 0 && filters.objectives.indexOf(row.objective.id) === -1) return false;
    if (filters.statuses.length > 0) {
      // Backlog status mapping:
      // - Unscheduled: row.schedulingStatus === 'Unscheduled' AND not active assignment
      // - Scheduled: row.schedulingStatus === 'Scheduled'
      // - Completed: row.assignment.status === 'active' (session was completed)
      let bucket;
      if (row.assignment.status === 'active') bucket = 'completed';
      else if (row.schedulingStatus === 'Scheduled') bucket = 'scheduled';
      else bucket = 'unscheduled';
      if (filters.statuses.indexOf(bucket) === -1) return false;
    }
    return true;
  };

  /* ---------- Toast helper ---------- */

  const showToast = (text) => {
    setToast(text);
    setTimeout(() => setToast(null), 2800);
  };

  /* ---------- Action handlers ---------- */

  // Apply a change to a session and toast.
  const applyOutcome = (outcome, targetSession, contextLabel) => {
    if (outcome === 'cancelled') {
      setSessions(sessions.map((s) =>
        s.id === targetSession.id ? { ...s, status: 'cancelled' } : s
      ));
      showToast('Window cancelled — ' + contextLabel + ' is now unscheduled');
    } else if (outcome === 'completed') {
      setSessions(sessions.map((s) =>
        s.id === targetSession.id ? { ...s, status: 'completed', completedAt: new Date() } : s
      ));
      // Completion of a session also moves the assignment to Active per PRD §A4.
      setAssignments(assignments.map((a) =>
        a.workerId === targetSession.traineeId && a.objectiveId === targetSession.objectiveId
          ? { ...a, status: 'active' }
          : a
      ));
      showToast('Window marked complete — ' + contextLabel);
    } else if (outcome === 'saved') {
      // Real impl writes form fields to the session.
      showToast('Changes saved — ' + contextLabel);
    }
  };

  // Detail panel quick action
  const handlePanelAction = (outcome, sess) => {
    const w = WORKERS.find((x) => x.id === sess.traineeId);
    const o = OBJECTIVES.find((x) => x.id === sess.objectiveId);
    const label = (w ? w.name : '?') + ' / ' + (o ? o.name : '?');
    applyOutcome(outcome, sess, label);
    setDetailSession(null);
  };

  // Detail panel "Edit" → close panel, open modal in edit mode
  const handleEditFromDetail = (sess) => {
    const w = WORKERS.find((x) => x.id === sess.traineeId);
    const o = OBJECTIVES.find((x) => x.id === sess.objectiveId);
    if (w && o) {
      setDetailSession(null);
      setModalRow({ worker: w, objective: o, activeSession: sess });
    }
  };

  // Modal save dispatch
  const handleModalSave = (outcome) => {
    const row = modalRow;
    if (!row) return;
    const label = row.worker.name + ' / ' + row.objective.name;

    if (row.activeSession) {
      applyOutcome(outcome, row.activeSession, label);
    } else if (outcome === 'scheduled') {
      // Create new session — stub fields. Real impl reads form state.
      const startMid = new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate() + 7, 0, 0, 0);
      const endMid   = new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate() + 7 + row.objective.duration - 1, 23, 59, 59);
      const trainerCandidate = WORKERS.find((w) =>
        w.canTrain && w.certifiedObjectives && w.certifiedObjectives.indexOf(row.objective.id) !== -1
      );
      const newSession = {
        id: 's' + (1000 + sessions.length),
        traineeId: row.worker.id,
        objectiveId: row.objective.id,
        trainerId: trainerCandidate ? trainerCandidate.id : 'w1',
        workstationId: row.objective.workstationIds[0],
        start: startMid,
        end: endMid,
        shift: row.worker.shift,
        status: 'scheduled',
      };
      setSessions([...sessions, newSession]);
      showToast('Window scheduled — ' + label);
    }

    setModalRow(null);
  };

  /* ---------- Click routers ---------- */

  // Backlog row click → open scheduler modal directly.
  const handleBacklogRowClick = (worker, objective, activeSession) => {
    setModalRow({ worker, objective, activeSession: activeSession || null });
  };

  // Grid empty cell click → open EntryModal.
  const handleGridCellClick = (worker, date) => {
    setEntryContext({ worker, date });
  };

  // EntryModal: pick existing assignment → SchedulerModal in Create mode
  const handleEntryPick = (objective) => {
    if (!entryContext) return;
    const { worker } = entryContext;
    setEntryContext(null);
    setModalRow({ worker, objective, activeSession: null });
  };

  // EntryModal: assign new objective → write assignment, then SchedulerModal
  const handleEntryAssignAndPick = (objective) => {
    if (!entryContext) return;
    const { worker } = entryContext;
    setAssignments([
      ...assignments,
      { workerId: worker.id, objectiveId: objective.id, status: 'assigned' },
    ]);
    setEntryContext(null);
    setModalRow({ worker, objective, activeSession: null });
    showToast(objective.name + ' assigned to ' + worker.name);
  };

  /* ---------- Profile panel handlers ---------- */

  // Toggle calendar focus on a worker. If already focused on them, clear focus.
  const handleToggleFocus = (workerId) => {
    if (focusedWorkerId === workerId) {
      setFocusedWorkerId(null);
    } else {
      setFocusedWorkerId(workerId);
    }
  };

  // "Schedule as Trainee" CTA inside the profile panel — opens EntryModal.
  const handleScheduleAsTrainee = (worker) => {
    setEntryContext({ worker, date: TODAY });
  };

  // "+ Assign Objective" inside the panel — opens lighter picker.
  const handleAssignObjective = (worker) => {
    setAssignPickerWorker(worker);
  };

  // Picker callback — write the assignment, toast, close.
  const handleAssignPicked = (objective) => {
    if (!assignPickerWorker) return;
    setAssignments([
      ...assignments,
      { workerId: assignPickerWorker.id, objectiveId: objective.id, status: 'assigned' },
    ]);
    showToast(objective.name + ' assigned to ' + assignPickerWorker.name);
    setAssignPickerWorker(null);
  };

  // Profile-panel objective row click → open scheduler modal in the right mode.
  const handlePanelObjectiveClick = (worker, objective, activeSession) => {
    setModalRow({ worker, objective, activeSession: activeSession || null });
  };

  // Profile-panel session card click → open detail panel for that session.
  const handlePanelSessionClick = (session) => {
    setDetailSession(session);
  };

  // Filter handlers
  const handleOpenFilters = () => {
    // Filters and profile panel are both right-side surfaces — only one at a time
    setProfileWorkerId(null);
    setFiltersOpen(true);
  };

  const handleClearAllFilters = () => {
    setFilters(FILTER_DEFAULTS);
  };

  // Remove a single filter value (used by chips' × button)
  const handleRemoveFilter = (key, value) => {
    setFilters({
      ...filters,
      [key]: (filters[key] || []).filter((v) => v !== value),
    });
  };

  // Active filter chips, with display labels and remove handles.
  // Order: roles → shifts → employees → objectives → statuses (matches drawer order)
  const activeFilterChips = useMemo(() => {
    const chips = [];
    filters.roles.forEach((r) => {
      chips.push({
        key: 'roles', value: r,
        label: r === 'trainer' ? 'Trainers only' : 'Trainees only',
      });
    });
    filters.shifts.forEach((s) => {
      chips.push({ key: 'shifts', value: s, label: s + ' shift' });
    });
    filters.employees.forEach((id) => {
      const w = WORKERS.find((x) => x.id === id);
      chips.push({ key: 'employees', value: id, label: w ? w.name : id });
    });
    filters.objectives.forEach((id) => {
      const o = OBJECTIVES.find((x) => x.id === id);
      chips.push({ key: 'objectives', value: id, label: o ? o.name : id });
    });
    filters.statuses.forEach((s) => {
      chips.push({
        key: 'statuses', value: s,
        label: s.charAt(0).toUpperCase() + s.slice(1),
      });
    });
    return chips;
  }, [filters]);

  // Tab change clears focus (focus is grid-only).
  const handleTabChange = (newTab) => {
    if (newTab !== 'grid') setFocusedWorkerId(null);
    setTab(newTab);
  };

  /* ---------- Counts for tab badges ---------- */

  const unscheduledCount = useMemo(() => {
    return assignments.filter((a) =>
      deriveSchedulingStatus(sessions, a.workerId, a.objectiveId) === 'Unscheduled'
    ).length;
  }, [assignments, sessions]);

  /* ---------- Render ---------- */

  return (
    <div className="qmvp-root">
      <style>{styles}</style>

      <div className="qmvp-topbar">
        <div className="qmvp-topbar-logo">COVALENT</div>

        <div className="qmvp-tabs">
          <button
            className={'qmvp-tab' + (tab === 'backlog' ? ' active' : '')}
            onClick={() => handleTabChange('backlog')}
          >
            Backlog
            <span className="qmvp-tab-count">{unscheduledCount}</span>
          </button>
          <button
            className={'qmvp-tab' + (tab === 'grid' ? ' active' : '')}
            onClick={() => handleTabChange('grid')}
          >
            Schedule Grid
          </button>
        </div>

        <div className="qmvp-topbar-user">
          <span className="qmvp-scope-tag">Q MVP · §9.1 + §9.2 + §9.3</span>
          <div className="qmvp-topbar-user-avatar" style={{ background: AVATARS[3] }}>
            {initials(CURRENT_USER.name)}
          </div>
          <span>{CURRENT_USER.name}</span>
        </div>
      </div>

      <div className="qmvp-container">

        {tab === 'backlog' && (
          <>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12, flexWrap: 'wrap' }}>
              <button
                className={'qmvp-filter-btn' + (activeFilterCount > 0 ? ' qmvp-filter-btn-active' : '')}
                onClick={handleOpenFilters}
              >
                Filters
                {activeFilterCount > 0 && (
                  <span className="qmvp-filter-btn-count">{activeFilterCount}</span>
                )}
              </button>

              {activeFilterChips.length > 0 && (
                <div className="qmvp-filter-chips">
                  {activeFilterChips.slice(0, 3).map((chip) => (
                    <span key={chip.key + ':' + chip.value} className="qmvp-filter-chip">
                      {chip.label}
                      <button
                        className="qmvp-filter-chip-clear"
                        onClick={() => handleRemoveFilter(chip.key, chip.value)}
                        aria-label={'Remove ' + chip.label + ' filter'}
                      >×</button>
                    </span>
                  ))}
                  {activeFilterChips.length > 3 && (
                    <button
                      className="qmvp-filter-chips-more"
                      onClick={handleOpenFilters}
                    >+{activeFilterChips.length - 3} more</button>
                  )}
                  <button
                    className="qmvp-filter-clear-link"
                    onClick={handleClearAllFilters}
                    style={{ marginLeft: 4 }}
                  >Clear all</button>
                </div>
              )}
            </div>

            <BacklogView
              assignments={assignments}
              sessions={sessions}
              filterFn={backlogRowPassesFilters}
              totalRowCount={assignments.length}
              onRowClick={handleBacklogRowClick}
              onClearFilters={activeFilterCount > 0 ? handleClearAllFilters : null}
            />
          </>
        )}

        {tab === 'grid' && (
          <>
            <div className="qmvp-grid-page-header">
              <div className="qmvp-grid-page-title">
                <h1>Training Calendar</h1>
                <span className="qmvp-grid-page-title-date">{frameLabel}</span>
              </div>

              <div className="qmvp-inline-legend">
                <div className="qmvp-inline-legend-item">
                  <span className="qmvp-inline-legend-swatch" style={{ background: '#2563eb' }} />
                  Scheduled
                </div>
                <div className="qmvp-inline-legend-item">
                  <span className="qmvp-inline-legend-swatch" style={{ background: '#15803d' }} />
                  Completed
                </div>
                <span className="qmvp-inline-legend-divider" />
                <div className="qmvp-inline-legend-item">
                  <span className="qmvp-inline-legend-swatch" style={{ background: 'var(--ink-500)' }} />
                  As trainee
                </div>
                <div className="qmvp-inline-legend-item">
                  <span
                    className="qmvp-inline-legend-swatch"
                    style={{
                      background: 'transparent',
                      boxShadow: 'inset 0 0 0 1px var(--ink-500)',
                    }}
                  />
                  As trainer
                </div>
                {zoom !== 'day' && (
                  <>
                    <span className="qmvp-inline-legend-divider" />
                    <div className="qmvp-inline-legend-item">
                      <span className="qmvp-inline-legend-swatch" style={{ background: 'var(--today-bg)', borderBottom: '2px solid var(--today-line)' }} />
                      Today
                    </div>
                  </>
                )}
              </div>

              <div className="qmvp-control-group">
                <div className="qmvp-toggle">
                  <button
                    className={'qmvp-toggle-btn' + (zoom === 'day' ? ' active' : '')}
                    onClick={() => handleZoomChange('day')}
                  >Day</button>
                  <button
                    className={'qmvp-toggle-btn' + (zoom === 'week' ? ' active' : '')}
                    onClick={() => handleZoomChange('week')}
                  >Week</button>
                  <button
                    className={'qmvp-toggle-btn' + (zoom === 'month' ? ' active' : '')}
                    onClick={() => handleZoomChange('month')}
                  >Month</button>
                </div>
              </div>

              <button
                className={'qmvp-filter-btn' + (activeFilterCount > 0 ? ' qmvp-filter-btn-active' : '')}
                onClick={handleOpenFilters}
              >
                Filters
                {activeFilterCount > 0 && (
                  <span className="qmvp-filter-btn-count">{activeFilterCount}</span>
                )}
              </button>

              <button
                className={'qmvp-nav-btn' + (showCounts ? ' qmvp-nav-btn-active' : '')}
                onClick={() => setShowCounts(!showCounts)}
                title={showCounts ? 'Hide Open Sessions counts' : 'Show Open Sessions counts'}
              >
                {showCounts ? '✓ Counts' : 'Counts'}
              </button>

              <div className="qmvp-frame-nav" style={{ marginLeft: 0 }}>
                <button className="qmvp-nav-btn" onClick={() => shiftFrame(-1)}>← Prev</button>
                <button className="qmvp-nav-btn" onClick={goToday}>Today</button>
                <button className="qmvp-nav-btn" onClick={() => shiftFrame(1)}>Next →</button>
              </div>
            </div>

            {/* Active filter chips strip — visible only when filters are active */}
            {activeFilterChips.length > 0 && (
              <div className="qmvp-filter-chips" style={{ marginBottom: 12 }}>
                {activeFilterChips.slice(0, 3).map((chip) => (
                  <span key={chip.key + ':' + chip.value} className="qmvp-filter-chip">
                    {chip.label}
                    <button
                      className="qmvp-filter-chip-clear"
                      onClick={() => handleRemoveFilter(chip.key, chip.value)}
                      aria-label={'Remove ' + chip.label + ' filter'}
                    >×</button>
                  </span>
                ))}
                {activeFilterChips.length > 3 && (
                  <button
                    className="qmvp-filter-chips-more"
                    onClick={handleOpenFilters}
                  >+{activeFilterChips.length - 3} more</button>
                )}
                <button
                  className="qmvp-filter-clear-link"
                  onClick={handleClearAllFilters}
                  style={{ marginLeft: 4 }}
                >Clear all</button>
              </div>
            )}

            <GridView
              sessions={sessions}
              frameStart={frameStart}
              zoom={zoom}
              focusedWorkerId={focusedWorkerId}
              showCounts={showCounts}
              workerFilterFn={workerPassesRowFilters}
              sessionFilterFn={sessionPassesRecordFilters}
              filtersActive={activeFilterCount > 0}
              onBarClick={(s) => setDetailSession(s)}
              onCellClick={handleGridCellClick}
              onRowHeaderClick={(workerId) => { setFiltersOpen(false); setProfileWorkerId(workerId); }}
              onClearFilters={activeFilterCount > 0 ? handleClearAllFilters : null}
            />

            {/* Footer status line: focus state + helpful tips */}
            <div style={{ marginTop: 12, display: 'flex', alignItems: 'center', gap: 16, flexWrap: 'wrap', fontSize: 11, color: 'var(--ink-500)', fontFamily: 'IBM Plex Mono, monospace' }}>
              <span>Concurrent windows stack in rows</span>
              <span>◀ ▶ Bar extends beyond this frame</span>
              <span>Click row header to open profile</span>
              {focusedWorkerId && (() => {
                const fw = WORKERS.find((w) => w.id === focusedWorkerId);
                return fw ? (
                  <span style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 8 }}>
                    <span className="qmvp-focus-chip">
                      Focused on {fw.name}
                      <button
                        className="qmvp-focus-chip-clear"
                        onClick={() => setFocusedWorkerId(null)}
                        aria-label="Exit focus"
                      >×</button>
                    </span>
                  </span>
                ) : null;
              })()}
            </div>
          </>
        )}
      </div>

      {profileWorkerId && (() => {
        const worker = WORKERS.find((w) => w.id === profileWorkerId);
        return worker ? (
          <ProfilePanel
            key={'panel-' + worker.id}
            worker={worker}
            assignments={assignments}
            sessions={sessions}
            focusedWorkerId={focusedWorkerId}
            onClose={() => setProfileWorkerId(null)}
            onToggleFocus={handleToggleFocus}
            onScheduleAsTrainee={handleScheduleAsTrainee}
            onAssignObjective={handleAssignObjective}
            onObjectiveRowClick={handlePanelObjectiveClick}
            onSessionClick={handlePanelSessionClick}
          />
        ) : null;
      })()}

      {filtersOpen && (
        <FilterDrawer
          filters={filters}
          onChange={setFilters}
          onClose={() => setFiltersOpen(false)}
          onClearAll={handleClearAllFilters}
          activeFilterCount={activeFilterCount}
        />
      )}

      {assignPickerWorker && (
        <AssignObjectivePicker
          worker={assignPickerWorker}
          assignments={assignments}
          onAssign={handleAssignPicked}
          onClose={() => setAssignPickerWorker(null)}
        />
      )}

      {detailSession && (
        <DetailPanel
          session={detailSession}
          onClose={() => setDetailSession(null)}
          onEdit={handleEditFromDetail}
          onAction={handlePanelAction}
        />
      )}

      {entryContext && (
        <EntryModal
          worker={entryContext.worker}
          date={entryContext.date}
          assignments={assignments}
          sessions={sessions}
          onPick={handleEntryPick}
          onAssignAndPick={handleEntryAssignAndPick}
          onClose={() => setEntryContext(null)}
        />
      )}

      {modalRow && (
        <SchedulerModal
          row={modalRow}
          sessions={sessions}
          onClose={() => setModalRow(null)}
          onSave={handleModalSave}
        />
      )}

      {toast && (
        <div className="qmvp-toast">
          <div className="qmvp-toast-dot" />
          <span>{toast}</span>
        </div>
      )}
    </div>
  );
}
