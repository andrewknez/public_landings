const ACTIVE_SESSION_STATUSES = new Set(['scheduled', 'overdue', 'extended', 'paused']);

function findActiveSession(sessions, workerId, objectiveId) {
  return sessions.find(
    (s) => s.traineeId === workerId
      && s.objectiveId === objectiveId
      && ACTIVE_SESSION_STATUSES.has(s.status)
  );
}

// Find the most recent completed session for a worker+objective pair.
// Used to display completion date for "Active" (completed) assignments.
function findCompletedSession(sessions, workerId, objectiveId) {
  const matches = sessions.filter(
    (s) => s.traineeId === workerId
      && s.objectiveId === objectiveId
      && s.status === 'completed'
  );
  if (matches.length === 0) return null;
  // Sort by completedAt (if set) or end date, descending — return most recent.
  return matches.sort((a, b) => {
    const aT = (a.completedAt || a.end).getTime();
    const bT = (b.completedAt || b.end).getTime();
    return bT - aT;
  })[0];
}

function deriveSchedulingStatus(sessions, workerId, objectiveId) {
  if (findActiveSession(sessions, workerId, objectiveId)) return 'Scheduled';
  return 'Unscheduled';
}

function barColourClass(status) {

function addDays(d, n) {
  const x = new Date(d);
  x.setDate(x.getDate() + n);
  return x;
}
function addHours(d, h) {
  const x = new Date(d);
  x.setHours(x.getHours() + h);
  return x;
}
function startOfDay(d) {
  const x = new Date(d);
  x.setHours(0, 0, 0, 0);
  return x;
}
function endOfDay(d) {
  const x = new Date(d);
  x.setHours(23, 59, 59, 999);
  return x;
}
function startOfWeek(d) {
  const x = new Date(d);
  x.setDate(x.getDate() - x.getDay());
  x.setHours(0, 0, 0, 0);
  return x;
}
function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear()
    && a.getMonth() === b.getMonth()
    && a.getDate() === b.getDate();
}
function dayIndex(date, frameStart) {
  const a = new Date(date); a.setHours(0, 0, 0, 0);
  const b = new Date(frameStart); b.setHours(0, 0, 0, 0);
  return Math.round((a - b) / (1000 * 60 * 60 * 24));
}
function fmtDate(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function fmtDateFull(d) {
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}
function fmtTime(d) {
  return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

/* Form input helpers (used by the scheduler modal) */
function toInputDate(d) {
  if (!d) return '';
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}
function parseInputDate(s) {
  if (!s) return null;
  const parts = s.split('-').map(Number);
  return new Date(parts[0], parts[1] - 1, parts[2], 0, 0, 0, 0);
}
function addDaysEod(d, n) {
  const x = new Date(d);
  x.setDate(x.getDate() + n);
  x.setHours(23, 59, 59, 999);
  return x;
}

/* Lane stacking: greedy assignment for overlapping windows */
function assignLanes(windows) {
  const sorted = [...windows].sort((a, b) => a.start - b.start);
  const lanes = [];
  const out = [];
  sorted.forEach((w) => {
    let placed = false;
    for (let i = 0; i < lanes.length; i++) {
      if (lanes[i] < w.start) {
        lanes[i] = w.end;
        out.push({ ...w, lane: i });
        placed = true;
        break;
      }
    }
    if (!placed) {
      lanes.push(w.end);
      out.push({ ...w, lane: lanes.length - 1 });
    }
  });
  return out;
}

function initials(name) {
  return name.split(' ').map((p) => p[0]).slice(0, 2).join('').toUpperCase();
}

/* ============================================================================
   CAPACITY HELPERS
   ========================================================================== */

function rangesOverlap(aStart, aEnd, bStart, bEnd) {
  return aStart <= bEnd && bStart <= aEnd;
}

function trainerConcurrentLoad(sessions, trainerId, propStart, propEnd, excludeSessionId) {
  if (!trainerId || !propStart || !propEnd) return 0;
  return sessions.filter((s) => {
    if (s.id === excludeSessionId) return false;
    if (s.trainerId !== trainerId) return false;
    if (!ACTIVE_SESSION_STATUSES.has(s.status)) return false;
    return rangesOverlap(s.start, s.end, propStart, propEnd);
  }).length;
}

function workstationConcurrentLoad(sessions, workstationId, propStart, propEnd, propObjectiveId, excludeSessionId) {
  if (!workstationId || !propStart || !propEnd) return 0;
  const overlapping = sessions.filter((s) => {
    if (s.id === excludeSessionId) return false;
    if (s.workstationId !== workstationId) return false;
    if (!ACTIVE_SESSION_STATUSES.has(s.status)) return false;
    return rangesOverlap(s.start, s.end, propStart, propEnd);
  });
  const distinctObjectives = new Set(overlapping.map((s) => s.objectiveId));
  if (propObjectiveId) distinctObjectives.add(propObjectiveId);
  return distinctObjectives.size;
}

function loadLevel(current, max) {
  if (current < max) return 'green';
  if (current === max) return 'amber';
  return 'red';
}

    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
  }
  .qmvp-scope-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    background: var(--navy-700);
    color: var(--ink-200);
    padding: 4px 10px;
    border-radius: 3px;
    letter-spacing: 0.03em;
  }

  /* Container */
  .qmvp-container {
    max-width: 1480px;
    margin: 0 auto;
    padding: 24px 32px;
  }
  .qmvp-page-header { margin-bottom: 16px; }
  .qmvp-page-header h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 4px 0;
    letter-spacing: -0.01em;
  }
  .qmvp-page-header .sub { font-size: 14px; color: var(--ink-500); margin: 0; }

  /* Compact grid header — title + date inline, controls + legend right-aligned */
  .qmvp-grid-page-header {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .qmvp-grid-page-title {
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-shrink: 0;
  }
  .qmvp-grid-page-title h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0;
    letter-spacing: -0.01em;
    color: var(--ink-900);
  }
  .qmvp-grid-page-title-date {
    font-size: 13px;
    color: var(--ink-500);
    font-family: 'IBM Plex Mono', monospace;
  }
  .qmvp-inline-legend {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-left: auto;
    margin-right: 16px;
    font-size: 11px;
    color: var(--ink-500);
    font-family: 'IBM Plex Sans', sans-serif;
    flex-wrap: wrap;
  }
  .qmvp-inline-legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .qmvp-inline-legend-swatch {
    width: 9px;
    height: 9px;
    border-radius: 2px;
  }
  .qmvp-inline-legend-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }
  .qmvp-inline-legend-divider {
    width: 1px;
    height: 14px;
    background: var(--ink-200);
    flex-shrink: 0;
  }

  /* ===== Backlog table ===== */
  .qmvp-table-wrap {
    background: white;
    border: 1px solid var(--ink-200);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(15,23,42,0.04);
  }
  .qmvp-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .qmvp-table thead th {
    background: var(--ink-50);
    border-bottom: 1px solid var(--ink-200);
    padding: 12px 20px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-500);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .qmvp-table tbody tr {
    border-bottom: 1px solid var(--ink-100);
    transition: background 100ms ease;
  }
  .qmvp-table tbody tr:last-child { border-bottom: none; }
  .qmvp-table tbody tr.clickable { cursor: pointer; }
  .qmvp-table tbody tr.clickable:hover { background: var(--ink-50); }
  .qmvp-table td { padding: 14px 20px; vertical-align: middle; }
  .qmvp-trainee-cell { display: flex; align-items: center; gap: 12px; }
  .qmvp-trainee-name { font-weight: 500; color: var(--ink-900); }
  .qmvp-trainee-role { font-size: 12px; color: var(--ink-500); margin-top: 2px; }
  .qmvp-shift-chip {
    display: inline-block;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    background: var(--ink-100);
    color: var(--ink-700);
    padding: 2px 6px;
    border-radius: 3px;
    margin-left: 6px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .qmvp-trainer-chip {
    display: inline-block;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    background: #f3e8ff;
    color: #6b21a8;
    padding: 2px 6px;
    border-radius: 3px;
    margin-left: 6px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .qmvp-objective-name { font-weight: 500; color: var(--ink-900); }
  .qmvp-objective-dur {
    display: block;
    font-size: 12px;
    color: var(--ink-500);
    margin-top: 2px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .qmvp-tag {
    display: inline-block;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 500;
    letter-spacing: 0.01em;
  }
  .qmvp-tag-assigned    { background: var(--ink-100); color: var(--ink-700); }
  .qmvp-tag-inprogress  { background: var(--accent-bg); color: var(--accent); }
  .qmvp-tag-renewal     { background: #f3e8ff; color: #6b21a8; }
  .qmvp-tag-active      { background: var(--green-bg); color: var(--green); }
  .qmvp-tag-unscheduled {
    background: transparent;
    color: var(--amber);
    border: 1px dashed var(--amber);
  }
  .qmvp-tag-scheduled   { background: var(--green-bg); color: var(--green); }
  .qmvp-scheduling-cell { display: flex; flex-direction: column; gap: 4px; }
  .qmvp-scheduling-meta {
    font-size: 11px;
    color: var(--ink-500);
    font-family: 'IBM Plex Mono', monospace;
  }
  .qmvp-row-hint {
    font-size: 11px;
    color: var(--ink-400);
    font-family: 'IBM Plex Mono', monospace;
    opacity: 0;
    transition: opacity 100ms ease;
  }
  .qmvp-table tbody tr.clickable:hover .qmvp-row-hint { opacity: 1; }
  .qmvp-footer-meta {
    margin-top: 16px;
    font-size: 12px;
    color: var(--ink-500);
    font-family: 'IBM Plex Mono', monospace;
    display: flex;
    gap: 24px;
  }

  /* ===== Grid controls ===== */
  .qmvp-controls {
    background: white;
    border: 1px solid var(--ink-200);
    border-radius: 6px 6px 0 0;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 0;
  }
  .qmvp-control-group { display: flex; align-items: center; gap: 8px; }
  .qmvp-control-label {
    font-size: 11px;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--ink-500);
    letter-spacing: 0.05em;
    font-family: 'IBM Plex Mono', monospace;
  }
  .qmvp-toggle {
    display: inline-flex;
    background: var(--ink-100);
    border-radius: 5px;
    padding: 2px;
  }
  .qmvp-toggle-btn {
    border: none;
    background: transparent;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    padding: 5px 14px;
    border-radius: 3px;
    cursor: pointer;
    color: var(--ink-500);
    font-weight: 500;
    transition: all 100ms ease;
  }
  .qmvp-toggle-btn.active {
    background: white;
    color: var(--ink-900);
    box-shadow: 0 1px 3px rgba(15,23,42,0.1);
  }
  .qmvp-frame-nav {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .qmvp-nav-btn {
    background: white;
    border: 1px solid var(--ink-200);
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--ink-700);
  }
  .qmvp-nav-btn:hover { background: var(--ink-50); }
  .qmvp-nav-btn-active {
    background: var(--accent-bg);
    border-color: #bfdbfe;
    color: var(--accent);
  }
  .qmvp-nav-btn-active:hover { background: #dceaff; }
  .qmvp-nav-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-900);
    padding: 0 12px;
    min-width: 220px;
    text-align: center;
  }

  /* ===== Schedule grid =====
     The grid is constructed as:
       - One CSS-Grid 'header strip' (concurrency row + day headers)
       - One CSS-Grid 'row strip' per worker, containing:
         - row-header cell (sticky left)
         - background cells (for visual columns + hover/today highlight)
         - bars overlay (single absolutely-positioned layer per row, holds all bars)

     The bars overlay is OUTSIDE individual cells, positioned absolutely against
     the row-strip wrapper, so there's no DOM-stacking ambiguity. Bars always
     paint above background cells; cells receive empty-cell clicks; bars receive
     bar clicks. No magic, no stopPropagation tricks.
  */
  .qmvp-grid-wrap {
    background: white;
    border: 1px solid var(--ink-200);
    border-radius: 6px;
    overflow: auto;
    box-shadow: 0 1px 3px rgba(15,23,42,0.04);
  }
  .qmvp-grid-inner {
    min-width: max-content;
    position: relative;
  }
  .qmvp-grid-header-strip {
    display: grid;
    background: var(--ink-50);
    border-bottom: 1px solid var(--ink-200);
    position: sticky;
    top: 0;
    z-index: 5;
  }
  .qmvp-grid-corner {
    background: var(--ink-50);
    color: var(--ink-500);
    padding: 12px 16px;
    border-right: 1px solid var(--ink-200);
    border-bottom: 1px solid var(--ink-200);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
    display: flex;
    align-items: center;
    gap: 8px;
    position: sticky;
    left: 0;
    z-index: 6;
    grid-row: 1;
  }
  .qmvp-grid-corner-count {
    background: var(--ink-100);
    color: var(--ink-700);
    padding: 1px 9px;
    border-radius: 12px;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  /* Unit-column header cell (row 1): "DAY"/"HOUR" + contextual sub-label */
  .qmvp-unit-cell-r1 {
    grid-row: 1;
    background: white;
    padding: 8px 10px;
    border: 1px solid var(--ink-200);
    border-right-width: 1px;
    border-bottom: 1px solid var(--ink-200);
    border-top: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: sticky;
    left: 200px;
    z-index: 5;
    box-shadow: inset 0 0 0 1px var(--ink-100);
  }
  .qmvp-unit-cell-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    color: var(--ink-700);
    font-family: 'IBM Plex Mono', monospace;
  }
  .qmvp-unit-cell-context {
    font-size: 10px;
    color: var(--ink-400);
    margin-top: 3px;
    font-family: 'IBM Plex Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* Empty corner cell on row 2 (under EMPLOYEE column) */
  .qmvp-corner-r2 {
    grid-row: 2;
    grid-column: 1;
    background: var(--ink-50);
    border-bottom: 1px solid var(--ink-200);
    border-right: 1px solid var(--ink-200);
    position: sticky;
    left: 0;
    z-index: 6;
  }

  /* Per-worker unit cell — shows active scheduled session count.
     Typography matches the column concurrency counts so they read as the
     same kind of object. */
  .qmvp-row-unit-cell {
    background: white;
    border-right: 1px solid var(--ink-200);
    border-bottom: 1px solid var(--ink-100);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: sticky;
    left: 200px;
    z-index: 3;
  }
  .qmvp-row-unit-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-700);
    line-height: 1;
    transition: color 100ms;
  }
  /* Zero-count gets dimmed to match how empty column cells behave */
  .qmvp-row-unit-count.zero { color: var(--ink-300); font-weight: 500; }
  /* Worker rows: unit cell follows alternating-row stripe */
  .qmvp-row-strip:nth-child(even) .qmvp-row-unit-cell { background: var(--row-stripe); }

  /* "Open Sessions" label cell (row 2, in unit column) — matches EMPLOYEE corner styling */
  .qmvp-concurrent-label-cell {
    background: var(--ink-50);
    color: var(--ink-500);
    padding: 4px 8px;
    border-right: 1px solid var(--ink-200);
    border-bottom: 1px solid var(--ink-200);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    line-height: 1.15;
    text-align: center;
    position: sticky;
    left: 200px;
    z-index: 5;
    grid-row: 2;
  }

  /* Concurrent count cells (row 2) — light treatment, typography matches per-worker counts */
  .qmvp-grid-concurrency-cell {
    background: var(--ink-50);
    color: var(--ink-300);
    padding: 6px 4px;
    border-bottom: 1px solid var(--ink-200);
    border-left: 1px solid var(--ink-100);
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    grid-row: 2;
    transition: color 100ms, font-weight 100ms;
  }
  .qmvp-grid-concurrency-cell.active {
    color: var(--ink-700);
    font-weight: 600;
  }
  /* Hot column = elevated capacity. Soft accent treatment, not loud. */
  .qmvp-grid-concurrency-cell.hot {
    color: var(--accent);
    font-weight: 700;
  }
  /* Today's column highlight extends through the concurrent cell too */
  .qmvp-grid-concurrency-cell.today { background: var(--today-bg); }
  .qmvp-grid-col-header {
    background: var(--ink-50);
    padding: 10px 4px;
    text-align: center;
    font-size: 11px;
    color: var(--ink-700);
    grid-row: 1;
    border-bottom: 1px solid var(--ink-200);
    border-left: 1px solid var(--ink-100);
  }
  .qmvp-grid-col-header.today {
    background: var(--today-bg);
    color: var(--ink-900);
    font-weight: 600;
    border-bottom: 2px solid var(--today-line);
  }
  .qmvp-col-header-dow {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--ink-500);
    font-weight: 500;
  }
  .qmvp-col-header-dom {
    font-size: 14px;
    font-weight: 500;
    margin-top: 2px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .qmvp-col-header-hour {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--ink-700);
  }
  .qmvp-grid-col-header.today .qmvp-col-header-dom { color: var(--today-line); }

  /* Row strip — one per worker. Holds row-header + cells + bars overlay. */
  .qmvp-row-strip {
    display: grid;
    border-bottom: 1px solid var(--ink-100);
    position: relative;
  }
  .qmvp-row-header {
    background: white;
    border-right: 1px solid var(--ink-200);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    left: 0;
    z-index: 4;
  }
  .qmvp-row-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
    flex-shrink: 0;
  }
  .qmvp-row-meta { flex: 1; min-width: 0; }
  .qmvp-row-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-900);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .qmvp-row-sub {
    font-size: 11px;
    color: var(--ink-500);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: 'IBM Plex Mono', monospace;
  }
  .qmvp-bg-cell {
    background: white;
    cursor: pointer;
    transition: background 100ms;
    border-right: 1px solid var(--ink-100);
  }
  .qmvp-bg-cell:hover { background: var(--ink-50); }
  .qmvp-bg-cell.today { background: var(--today-bg); }
  .qmvp-bg-cell.today:hover { background: #e3effc; }

  /* Alternating row stripes (very subtle) */
  .qmvp-row-strip:nth-child(even) .qmvp-bg-cell { background: var(--row-stripe); }
  .qmvp-row-strip:nth-child(even) .qmvp-bg-cell:hover { background: var(--ink-50); }
  .qmvp-row-strip:nth-child(even) .qmvp-bg-cell.today { background: var(--today-bg); }
  .qmvp-row-strip:nth-child(even) .qmvp-row-header { background: var(--row-stripe); }
  .qmvp-bg-cell-hint {
    font-size: 10px;
    color: var(--ink-400);
    font-family: 'IBM Plex Mono', monospace;
    text-align: center;
    line-height: 100%;
    padding-top: 4px;
    opacity: 0;
    transition: opacity 100ms;
  }
  .qmvp-bg-cell:hover .qmvp-bg-cell-hint { opacity: 0.8; }

  /* Bars overlay — one per row, absolutely positioned. */
  .qmvp-bars-overlay {
    position: absolute;
    top: 0;
    bottom: 0;
    pointer-events: none; /* the layer itself is transparent to clicks */
    z-index: 1;
  }
  .qmvp-bar {
    position: absolute;
    height: 20px;
    border-radius: 3px;
    padding: 0 8px 0 7px;
    font-size: 11px;
    color: white;
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    overflow: hidden;
    font-family: 'IBM Plex Sans', sans-serif;
    transition: transform 100ms ease, box-shadow 100ms ease, background 100ms ease;
    box-shadow: 0 1px 1px rgba(15,23,42,0.08);
    pointer-events: auto;
    z-index: 2;
  }
  .qmvp-bar:hover {
    box-shadow: 0 2px 6px rgba(15,23,42,0.18);
  }
  .qmvp-bar-scheduled {
    background: var(--accent);
  }
  .qmvp-bar-scheduled:hover { background: var(--accent-dk, #1d4ed8); }
  .qmvp-bar-completed {
    background: var(--green);
    opacity: 0.78;
  }
  .qmvp-bar-completed:hover { opacity: 0.92; }

  /* Trainer-mode bars — shown on a trainer's row when they're teaching a session.
     Soft-fill variant of the same color: the bar is clearly "their session"
     but visually distinct from sessions where the row's worker is being trained. */
  .qmvp-bar.qmvp-bar-trainer-mode.qmvp-bar-scheduled {
    background: var(--accent-bg);
    color: var(--accent);
    box-shadow: inset 0 0 0 1px var(--accent), 0 1px 1px rgba(15,23,42,0.06);
  }
  .qmvp-bar.qmvp-bar-trainer-mode.qmvp-bar-scheduled:hover {
    background: #dceaff;
    box-shadow: inset 0 0 0 1px var(--accent), 0 2px 6px rgba(15,23,42,0.18);
  }
  .qmvp-bar.qmvp-bar-trainer-mode.qmvp-bar-completed {
    background: var(--green-bg);
    color: var(--green);
    opacity: 1;
    box-shadow: inset 0 0 0 1px var(--green), 0 1px 1px rgba(15,23,42,0.06);
  }
  .qmvp-bar.qmvp-bar-trainer-mode.qmvp-bar-completed:hover {
    background: #c4f1d0;
  }
  /* In trainer-mode, the dot, meta, and clip arrows pick up the bar's text color */
  .qmvp-bar-trainer-mode .qmvp-bar-dot {
    background: currentColor;
    opacity: 0.85;
  }
  .qmvp-bar-trainer-mode .qmvp-bar-meta {
    color: currentColor;
    opacity: 0.7;
  }
  .qmvp-bar-trainer-mode .qmvp-clip-arrow {
    color: currentColor;
    opacity: 0.7;
  }
  .qmvp-bar-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: white;
    flex-shrink: 0;
    opacity: 0.9;
  }
  .qmvp-bar-label {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 500;
    letter-spacing: -0.005em;
  }
  .qmvp-bar-meta {
    font-size: 10px;
    opacity: 0.78;
    font-family: 'IBM Plex Mono', monospace;
    white-space: nowrap;
  }
  .qmvp-clip-arrow {
    flex-shrink: 0;
    color: white;
    opacity: 0.85;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* Legend */
  .qmvp-legend {
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: var(--ink-500);
    margin-top: 12px;
    font-family: 'IBM Plex Mono', monospace;
    flex-wrap: wrap;
  }
  .qmvp-legend-item { display: flex; align-items: center; gap: 6px; }
  .qmvp-legend-swatch { width: 10px; height: 10px; border-radius: 2px; }

  /* ===== Modal & Detail panel ===== */
  .qmvp-modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(11,25,41,0.6);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(2px);
    padding: 40px 20px;
    overflow-y: auto;
  }
  .qmvp-modal {
    background: white;
    border-radius: 8px;
    max-width: 640px;
    width: 100%;
    box-shadow: 0 20px 50px rgba(11,25,41,0.3);
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 80px);
  }
  .qmvp-modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--ink-200);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .qmvp-modal-header h2 { margin: 0; font-size: 17px; font-weight: 600; }
  .qmvp-modal-status-chip {
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    background: var(--accent-bg);
    color: var(--accent);
    padding: 3px 8px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .qmvp-modal-status-chip.overdue   { background: var(--red-bg); color: var(--red); }
  .qmvp-modal-status-chip.extended  { background: var(--amber-bg); color: var(--amber); }
  .qmvp-modal-status-chip.completed { background: var(--green-bg); color: var(--green); }
  .qmvp-modal-status-chip.cancelled { background: var(--ink-100); color: var(--ink-500); }
  .qmvp-modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
  .qmvp-modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--ink-200);
    display: flex;
    justify-content: space-between;
    gap: 8px;
    background: var(--ink-50);
    border-radius: 0 0 8px 8px;
  }
  .qmvp-context-card {
    background: var(--ink-50);
    border: 1px solid var(--ink-200);
    border-radius: 6px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .qmvp-context-text { flex: 1; font-size: 13px; }
  .qmvp-context-line1 { font-weight: 500; color: var(--ink-900); }
  .qmvp-context-line2 { color: var(--ink-500); margin-top: 2px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; }

  .qmvp-field { margin-bottom: 16px; }
  .qmvp-field-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-700);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .qmvp-field-required::after { content: '*'; color: var(--red); margin-left: 3px; }
  .qmvp-input, .qmvp-select, .qmvp-textarea {
    width: 100%;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    padding: 8px 12px;
    border: 1px solid var(--ink-300);
    border-radius: 5px;
    background: white;
    color: var(--ink-900);
    transition: border-color 100ms ease;
  }
  .qmvp-input:focus, .qmvp-select:focus, .qmvp-textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-bg);
  }
  .qmvp-textarea { min-height: 64px; resize: vertical; }
  .qmvp-row-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .qmvp-derived-card {
    background: var(--accent-bg);
    border: 1px solid #bfdbfe;
    border-radius: 5px;
    padding: 10px 14px;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .qmvp-derived-label {
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .qmvp-derived-val { font-weight: 600; color: var(--ink-900); }

  .qmvp-load-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .qmvp-load-green { background: var(--green-bg); color: var(--green); }
  .qmvp-load-amber { background: var(--amber-bg); color: var(--amber); }
  .qmvp-load-red   { background: var(--red-bg); color: var(--red); }
  .qmvp-select-with-badge { position: relative; }
  .qmvp-select-with-badge .qmvp-load-badge {
    position: absolute;
    right: 32px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
  }

  .qmvp-warn {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--amber-bg);
    border: 1px solid #fde68a;
    border-radius: 5px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--amber);
    margin-bottom: 16px;
  }
  .qmvp-warn-icon { flex-shrink: 0; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
  .qmvp-warn strong { font-weight: 600; }
  .qmvp-warn-sub { color: #92400e; margin-top: 2px; }

  .qmvp-btn {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 5px;
    border: 1px solid transparent;
    cursor: pointer;
    font-weight: 500;
    transition: all 100ms ease;
  }
  .qmvp-btn:disabled { cursor: not-allowed; opacity: 0.5; }
  .qmvp-btn-primary { background: var(--navy-900); color: white; }
  .qmvp-btn-primary:hover:not(:disabled) { background: var(--navy-800); }
  .qmvp-btn-secondary { background: white; color: var(--ink-700); border-color: var(--ink-200); }
  .qmvp-btn-secondary:hover:not(:disabled) { background: var(--ink-50); }
  .qmvp-btn-danger { background: white; color: var(--red); border-color: #fecaca; }
  .qmvp-btn-danger:hover:not(:disabled) { background: var(--red-bg); }
  .qmvp-btn-complete { background: var(--green); color: white; }
  .qmvp-btn-complete:hover:not(:disabled) { background: #166534; }
  .qmvp-btn-sm { font-size: 12px; padding: 6px 12px; }
  .qmvp-footer-actions-left { display: flex; gap: 8px; }
  .qmvp-footer-actions-right { display: flex; gap: 8px; }

  /* Detail panel actions */
  .qmvp-detail {
    background: white;
    border-radius: 8px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 20px 50px rgba(11,25,41,0.3);
    overflow: hidden;
  }
  .qmvp-detail-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--ink-200);
    background: var(--ink-50);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .qmvp-detail-header h2 { margin: 0; font-size: 15px; font-weight: 600; }
  .qmvp-detail-status-chip {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 3px 8px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
  }
  .qmvp-detail-status-chip.scheduled { background: var(--accent-bg); color: var(--accent); }
  .qmvp-detail-status-chip.completed { background: var(--green-bg); color: var(--green); }
  .qmvp-detail-status-chip.overdue   { background: var(--red-bg); color: var(--red); }
  .qmvp-detail-status-chip.extended  { background: var(--amber-bg); color: var(--amber); }
  .qmvp-detail-status-chip.paused    { background: var(--ink-100); color: var(--ink-500); }
  .qmvp-detail-body { padding: 20px; }
  .qmvp-detail-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 13px;
    border-bottom: 1px dashed var(--ink-100);
  }
  .qmvp-detail-row:last-child { border-bottom: none; }
  .qmvp-detail-label { color: var(--ink-500); }
  .qmvp-detail-val { color: var(--ink-900); font-weight: 500; }
  .qmvp-detail-actions {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    padding: 12px 20px;
    border-top: 1px solid var(--ink-200);
    background: var(--ink-50);
  }
  .qmvp-detail-actions-left { display: flex; gap: 8px; }
  .qmvp-detail-actions-right { display: flex; gap: 8px; }
  .qmvp-confirm-card {
    margin: 16px 20px;
    padding: 16px;
    background: var(--amber-bg);
    border: 1px solid #fde68a;
    border-radius: 6px;
    font-size: 13px;
    color: #92400e;
  }
  .qmvp-confirm-card strong { display: block; margin-bottom: 4px; color: var(--amber); }
  .qmvp-confirm-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    justify-content: flex-end;
  }
  .qmvp-close-btn {
    background: transparent;
    border: none;
    font-size: 18px;
    color: var(--ink-500);
    cursor: pointer;
    padding: 0;
    width: 24px; height: 24px;
    line-height: 1;
  }
  .qmvp-close-btn:hover { color: var(--ink-900); }

  /* Entry modal — picker + new objective */
  .qmvp-entry-tabs {
    display: flex;
    border-bottom: 1px solid var(--ink-200);
    background: var(--ink-50);
  }
  .qmvp-entry-tab {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 12px 16px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    color: var(--ink-500);
    transition: all 100ms ease;
  }
  .qmvp-entry-tab:hover { color: var(--ink-900); }
  .qmvp-entry-tab.active {
    color: var(--ink-900);
    border-bottom-color: var(--accent);
    background: white;
    font-weight: 500;
  }
  .qmvp-entry-tab-count {
    margin-left: 6px;
    background: var(--ink-100);
    color: var(--ink-700);
    padding: 1px 6px;
    border-radius: 10px;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .qmvp-entry-tab.active .qmvp-entry-tab-count {
    background: var(--accent-bg); color: var(--accent);
  }
  .qmvp-picker-list {
    padding: 8px;
    max-height: 360px;
    overflow-y: auto;
  }
  .qmvp-picker-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border: 1px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    transition: all 100ms ease;
  }
  .qmvp-picker-item:hover {
    background: var(--ink-50);
    border-color: var(--ink-200);
  }
  .qmvp-picker-item-icon {
    width: 32px; height: 32px;
    border-radius: 4px;
    background: var(--accent-bg);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
    flex-shrink: 0;
  }
  .qmvp-picker-item-meta { flex: 1; }
  .qmvp-picker-item-title { font-size: 14px; font-weight: 500; color: var(--ink-900); }
  .qmvp-picker-item-sub { font-size: 12px; color: var(--ink-500); margin-top: 2px; font-family: 'IBM Plex Mono', monospace; }
  .qmvp-picker-empty {
    padding: 32px 20px;
    text-align: center;
    color: var(--ink-500);
    font-size: 13px;
  }

  /* Toast */
  .qmvp-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--navy-900);
    color: white;
    padding: 12px 20px;
    border-radius: 6px;
    font-size: 13px;
    box-shadow: 0 8px 24px rgba(11,25,41,0.3);
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 10px;
    max-width: 480px;
  }
  .qmvp-toast-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ===== Profile side panel ===== */
  .qmvp-panel-overlay {
    position: fixed;
    inset: 0;
    z-index: 49;
    pointer-events: auto;
  }
  .qmvp-panel {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: 460px;
    max-width: 100vw;
    background: white;
    box-shadow: -8px 0 24px rgba(11,25,41,0.15);
    z-index: 50;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .qmvp-panel-header {
    padding: 24px 24px 16px;
    border-bottom: 1px solid var(--ink-200);
    flex-shrink: 0;
  }
  .qmvp-panel-header-top {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 12px;
  }
  .qmvp-panel-header-meta { flex: 1; min-width: 0; }
  .qmvp-panel-header-name {
    font-size: 20px;
    font-weight: 600;
    color: var(--ink-900);
    letter-spacing: -0.01em;
    margin: 0 0 4px 0;
    line-height: 1.2;
  }
  .qmvp-panel-header-role {
    font-size: 13px;
    color: var(--ink-500);
  }
  .qmvp-panel-header-badges {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .qmvp-panel-badge {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 12px;
    font-weight: 500;
    letter-spacing: 0.01em;
  }
  .qmvp-panel-badge-trainer { background: #f3e8ff; color: #6b21a8; }
  .qmvp-panel-badge-shift   { background: var(--ink-100); color: var(--ink-700); font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 0.05em; font-size: 10px; }
  .qmvp-panel-stats {
    display: flex;
    gap: 16px;
    margin-top: 12px;
  }
  .qmvp-panel-stat {
    flex: 1;
  }
  .qmvp-panel-stat-label {
    font-size: 10px;
    text-transform: uppercase;
    color: var(--ink-500);
    letter-spacing: 0.06em;
    font-weight: 600;
    font-family: 'IBM Plex Mono', monospace;
  }
  .qmvp-panel-stat-val {
    font-size: 22px;
    font-weight: 600;
    color: var(--ink-900);
    margin-top: 2px;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* Focus toggle pill */
  .qmvp-focus-row {
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--ink-50);
    border: 1px solid var(--ink-200);
    border-radius: 6px;
  }
  .qmvp-focus-row.active {
    background: var(--accent-bg);
    border-color: #bfdbfe;
  }
  .qmvp-focus-icon {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 2px solid var(--ink-300);
    flex-shrink: 0;
    transition: all 100ms;
  }
  .qmvp-focus-row.active .qmvp-focus-icon {
    background: var(--accent);
    border-color: var(--accent);
  }
  .qmvp-focus-text {
    flex: 1;
    font-size: 13px;
    color: var(--ink-700);
  }
  .qmvp-focus-row.active .qmvp-focus-text { color: var(--accent); font-weight: 500; }
  .qmvp-focus-toggle-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--accent);
    font-size: 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 500;
    padding: 0;
  }
  .qmvp-focus-toggle-btn:hover { text-decoration: underline; }

  /* Panel body and sections */
  .qmvp-panel-body {
    overflow-y: auto;
    padding: 0 24px;
    flex: 1;
  }
  .qmvp-panel-cta {
    width: 100%;
    margin: 16px 0 0 0;
  }
  .qmvp-panel-section { margin: 24px 0 0 0; }
  .qmvp-panel-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .qmvp-panel-section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--ink-700);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: 'IBM Plex Mono', monospace;
  }
  .qmvp-panel-section-add {
    background: transparent;
    border: 1px solid var(--ink-200);
    border-radius: 5px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    color: var(--ink-700);
    font-family: 'IBM Plex Sans', sans-serif;
  }
  .qmvp-panel-section-add:hover { background: var(--ink-50); }

  /* Mini table for assigned objectives */
  .qmvp-mini-table {
    width: 100%;
    border: 1px solid var(--ink-200);
    border-radius: 6px;
    overflow: hidden;
    border-collapse: collapse;
    font-size: 13px;
  }
  .qmvp-mini-table th {
    background: var(--ink-50);
    padding: 8px 12px;
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    color: var(--ink-500);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--ink-200);
  }
  .qmvp-mini-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--ink-100);
    vertical-align: middle;
  }
  .qmvp-mini-table tr:last-child td { border-bottom: none; }
  .qmvp-mini-table tr.clickable { cursor: pointer; }
  .qmvp-mini-table tr.clickable:hover { background: var(--ink-50); }
  .qmvp-mini-table-empty {
    padding: 24px 12px;
    text-align: center;
    font-size: 12px;
    color: var(--ink-500);
  }

  /* Session card list (Scheduled Sessions sections) */
  .qmvp-session-card {
    border: 1px solid var(--ink-200);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 100ms;
    background: white;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .qmvp-session-card:hover {
    border-color: var(--accent);
    background: var(--accent-bg);
  }
  .qmvp-session-card-stripe {
    width: 4px;
    align-self: stretch;
    border-radius: 2px;
    background: var(--accent);
    flex-shrink: 0;
  }
  .qmvp-session-card-stripe.completed { background: var(--green); }
  .qmvp-session-card-stripe.overdue   { background: var(--red); }
  .qmvp-session-card-stripe.extended  { background: var(--amber); }
  .qmvp-session-card-meta { flex: 1; min-width: 0; }
  .qmvp-session-card-title {
    font-weight: 500;
    color: var(--ink-900);
    font-size: 13px;
    line-height: 1.3;
  }
  .qmvp-session-card-sub {
    font-size: 11px;
    color: var(--ink-500);
    margin-top: 2px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .qmvp-session-card-status {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: 'IBM Plex Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
    flex-shrink: 0;
  }
  .qmvp-session-card-status.scheduled { background: var(--accent-bg); color: var(--accent); }
  .qmvp-session-card-status.completed { background: var(--green-bg); color: var(--green); }
  .qmvp-session-card-status.overdue   { background: var(--red-bg); color: var(--red); }
  .qmvp-session-card-status.extended  { background: var(--amber-bg); color: var(--amber); }

  .qmvp-section-empty {
    padding: 16px 12px;
    text-align: center;
    font-size: 12px;
    color: var(--ink-500);
    border: 1px dashed var(--ink-200);
    border-radius: 6px;
  }

  /* Close button positioned at top-right of panel */
  .qmvp-panel-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: transparent;
    border: none;
    font-size: 22px;
    color: var(--ink-500);
    cursor: pointer;
    padding: 0;
    width: 28px; height: 28px;
    line-height: 1;
    border-radius: 4px;
  }
  .qmvp-panel-close:hover { background: var(--ink-100); color: var(--ink-900); }

  /* Row header is clickable to open profile */
  .qmvp-row-header.clickable { cursor: pointer; }
  .qmvp-row-header.clickable:hover { background: var(--ink-50); }
  .qmvp-row-header.focused {
    background: var(--accent-bg);
    border-right-color: var(--accent);
  }

  /* Focus chip in grid controls */
  .qmvp-focus-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent-bg);
    color: var(--accent);
    border: 1px solid #bfdbfe;
    padding: 4px 6px 4px 12px;
    border-radius: 14px;
    font-size: 12px;
    font-weight: 500;
    margin-left: 12px;
  }
  .qmvp-focus-chip-clear {
    background: transparent;
    border: none;
    color: var(--accent);
    cursor: pointer;
    width: 18px; height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    line-height: 1;
    padding: 0;
  }
  .qmvp-focus-chip-clear:hover { background: white; }

  /* Dimmed bars in focus mode */
  .qmvp-bar.dimmed {
    opacity: 0.22;
    transition: opacity 200ms ease;
  }
  .qmvp-bar.dimmed:hover {
    opacity: 0.35;
  }

  /* Picker modal for "Assign Objective" — same as entry but lighter */
  .qmvp-assign-modal {
    background: white;
    border-radius: 8px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 20px 50px rgba(11,25,41,0.3);
    overflow: hidden;
  }

  /* ===== Filter drawer ===== */
  .qmvp-filter-drawer {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: 360px;
    max-width: 100vw;
    background: white;
    box-shadow: -8px 0 24px rgba(11,25,41,0.15);
    z-index: 50;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .qmvp-filter-drawer-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--ink-200);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;

/* ============================================================================
   AVATAR
   ========================================================================== */

function Avatar({ worker, size }) {
  const px = size || 32;
  return (
    <div
      className="qmvp-row-avatar"
      style={{
        background: worker.color,
        width: px,
        height: px,
        fontSize: Math.round(px * 0.34),
      }}
    >
      {initials(worker.name)}
    </div>
  );
}

/* ============================================================================
   GRID VIEW

   Architecture (different from earlier prototypes — fixes the click bug):

     <grid-wrap>                        ← scroll container
       <grid-inner>                     ← position:relative wrapper
         <header-strip grid>            ← concurrency + day-of-week + day-number
         <row-strip grid> per worker:
           <row-header>                 ← sticky left
           <bg-cell> per column         ← clickable empty cells
           <bars-overlay>               ← absolutely positioned, ONE per row
             <bar> for each session     ← absolutely positioned, ONE per session
                                          with KEY (fix for missing-key warning)

   Why this works:
   • Bars are NOT children of any single cell. They live in their own overlay
     layer that spans the full row width.
   • Bars overlay has pointer-events: none, so clicks pass through to cells.
   • Bars themselves have pointer-events: auto, so clicks LAND on the bar
     when you actually hit a bar.
   • Z-index ordering: cells default 0, overlay 1, bars 2, row-header 4. No
     stacking conflicts.
   ========================================================================== */

const HEADER_WIDTH = 200;
const UNIT_COL_WIDTH = 80;

function getFrameSpec(zoom, frameStart) {
  // Returns { numCols, colWidth, totalDuration, getColLabel, getColTime }
  // colWidth in px. totalDuration in ms — full extent of the visible frame.
  if (zoom === 'day') {
    return {
      numCols: 24,
      colWidth: 50,
      totalMs: 24 * 60 * 60 * 1000,
      frameEnd: addHours(startOfDay(frameStart), 24),
      getColTime: (i) => addHours(startOfDay(frameStart), i),
      isHourly: true,
    };
  }
  if (zoom === 'week') {
    return {
      numCols: 7,
      colWidth: 132,
      totalMs: 7 * 24 * 60 * 60 * 1000,
      frameEnd: addDays(startOfDay(frameStart), 7),
      getColTime: (i) => addDays(startOfDay(frameStart), i),
      isHourly: false,
    };
  }
  // month
  return {
    numCols: 28,
    colWidth: 40,
    totalMs: 28 * 24 * 60 * 60 * 1000,
    frameEnd: addDays(startOfDay(frameStart), 28),
    getColTime: (i) => addDays(startOfDay(frameStart), i),
    isHourly: false,
  };
}

function GridView({ sessions, frameStart, zoom, focusedWorkerId, showCounts, workerFilterFn, sessionFilterFn, onBarClick, onCellClick, onRowHeaderClick, onClearFilters, filtersActive }) {
  const spec = getFrameSpec(zoom, frameStart);
  const { numCols, colWidth: baseColWidth, totalMs, frameEnd, getColTime, isHourly } = spec;
  const frameStartMs = startOfDay(frameStart).getTime();

  /* Responsive column width.
     Day view: keep fixed (24 hour columns at 50px = 1200px is already wide; spreading
     hour cells wider doesn't help readability — bars just look more sparse).
     Week / Month: expand columns to fill the available container width.
     We measure the wrap element via ResizeObserver and recompute colWidth so that
     the grid fills the wrap. The minimum baseline (the `colWidth` from the spec)
     guarantees readable columns on narrower viewports. */
  const wrapRef = useRef(null);
  const [wrapWidth, setWrapWidth] = useState(0);

  useEffect(() => {
    if (!wrapRef.current) return;
    const el = wrapRef.current;
    const ro = new ResizeObserver((entries) => {
      for (const entry of entries) {
        const w = entry.contentRect.width;
        if (w > 0) setWrapWidth(w);
      }
    });
    ro.observe(el);
    // Initial measurement
    setWrapWidth(el.getBoundingClientRect().width);
    return () => ro.disconnect();
  }, []);

  // Effective unit column width — 0 when counts are hidden, normal otherwise.
  // All grid math (template, responsive stretch, bar positioning, gridColumn indices)
  // uses this so the column can be cleanly removed in one place.
  const effectiveUnitColWidth = showCounts ? UNIT_COL_WIDTH : 0;

  // For Week/Month: fill the wrap, but never below the baseline column width
  let colWidth = baseColWidth;
  if (!isHourly && wrapWidth > 0) {
    const availableForCols = wrapWidth - HEADER_WIDTH - effectiveUnitColWidth;
    const stretchedColWidth = availableForCols / numCols;
    colWidth = Math.max(baseColWidth, stretchedColWidth);
  }

  const totalGridWidth = numCols * colWidth;

  /* Sessions visible in the frame, with cancelled excluded.
     For Day view, we want any session that overlaps the day in time.
     For Week/Month view, sessions overlap on a date basis. The math is the
     same: filter by overlap of [s.start, s.end] with [frameStart, frameEnd]. */
  const framedSessions = useMemo(() => {
    return sessions
      .filter((s) => s.status !== 'cancelled')
      .filter((s) => s.end >= frameStart && s.start <= frameEnd);
  }, [sessions, frameStart, frameEnd]);

  /* Lane height — used for both row sizing and bar vertical positioning */
  const laneHeight = 26;
  const ROW_MIN_HEIGHT = 56;  // Minimum row height (1-2 lanes plus padding)
  const ROW_VPAD = 12;         // Vertical padding around bars within a row

  /* Build worker rows.
     A worker's row shows sessions where they are EITHER the trainee OR the trainer.
     Each laned session is tagged with `roleOnRow` so bar rendering can distinguish
     "I'm being trained" (trainee) vs "I'm teaching" (trainer).

     Filtering is applied in two stages:
     1. workerFilterFn (row-level): drops workers from the list entirely
     2. sessionFilterFn (record-level): narrows which sessions appear on visible rows
        — empty rows are preserved for cross-team context

     Each row computes its OWN minHeight based on its peak lane count, so a worker
     with 4 concurrent sessions gets a tall row while quieter rows stay compact. */
  const rows = useMemo(() => {
    return WORKERS
      .filter((w) => !workerFilterFn || workerFilterFn(w))
      .map((w) => {
        const sessionsForRow = framedSessions
          .filter((s) => s.traineeId === w.id || s.trainerId === w.id)
          .filter((s) => !sessionFilterFn || sessionFilterFn(s))
          .map((s) => ({
            ...s,
            roleOnRow: s.traineeId === w.id ? 'trainee' : 'trainer',
          }));
        const laned = assignLanes(sessionsForRow);
        const peakLanes = Math.max(1, ...laned.map((w) => w.lane + 1));
        const rowMinHeight = Math.max(ROW_MIN_HEIGHT, peakLanes * laneHeight + ROW_VPAD);
        return {
          id: w.id,
          worker: w,
          windows: laned,
          rowMinHeight,
        };
      });
  }, [framedSessions, workerFilterFn, sessionFilterFn]);

  /* Column concurrency.
     Day view: how many sessions are running at each hour-start moment?
     Week/Month: how many are active during the day? */
  /* Column concurrency.
     Day view: counts sessions active at the column's hour-start moment.
     Week/Month: counts distinct sessions that touch any part of that day. */
  const columnConcurrency = useMemo(() => {
    const counts = Array(numCols).fill(0);
    // Sessions counted = framedSessions, narrowed by record-level filters.
    // Note: filtered sessions also need to involve at least one visible worker
    // for the count to be honest. We check trainee OR trainer is in the filtered worker set.
    const visibleWorkerIds = new Set(WORKERS.filter((w) => !workerFilterFn || workerFilterFn(w)).map((w) => w.id));
    const countedSessions = framedSessions.filter((s) => {
      if (sessionFilterFn && !sessionFilterFn(s)) return false;
      // Must involve a visible worker on either side
      if (visibleWorkerIds.size < WORKERS.length) {
        if (!visibleWorkerIds.has(s.traineeId) && !visibleWorkerIds.has(s.trainerId)) return false;
      }
      return true;
    });

    for (let c = 0; c < numCols; c++) {
      const colTime = getColTime(c);

      if (isHourly) {
        // Day view: count sessions running at this exact hour
        countedSessions.forEach((s) => {
          if (s.status === 'completed') return;
          if (s.start <= colTime && s.end > colTime) counts[c] += 1;
        });
      } else {
        // Week/Month view: count distinct sessions that overlap this day at all
        const dayStart = colTime;
        const dayEnd = new Date(colTime.getTime() + 24 * 60 * 60 * 1000);
        countedSessions.forEach((s) => {
          if (s.status === 'completed') return;
          // Session overlaps day if it starts before day-end AND ends after day-start
          if (s.start < dayEnd && s.end > dayStart) counts[c] += 1;
        });
      }
    }
    return counts;
  }, [framedSessions, numCols, getColTime, isHourly, workerFilterFn, sessionFilterFn]);

  const maxConcurrency = Math.max(...columnConcurrency, 0);
  const hotThreshold = Math.max(3, Math.ceil(maxConcurrency * 0.75));

  /* Grid template for both header strip and each row strip.
     When counts are hidden, the unit column track is dropped entirely. */
  const gridTemplate = showCounts
    ? HEADER_WIDTH + 'px ' + UNIT_COL_WIDTH + 'px repeat(' + numCols + ', ' + colWidth + 'px)'
    : HEADER_WIDTH + 'px repeat(' + numCols + ', ' + colWidth + 'px)';

  // gridColumn index for the first date column (CSS Grid is 1-based)
  // When counts are shown: col 1 = employee, col 2 = unit, col 3+ = dates
  // When counts are hidden: col 1 = employee, col 2+ = dates
  const dateColStart = showCounts ? 3 : 2;

  /* Contextual label for the unit cell (row 1) — sub-label below "DAY"/"HOUR" */
  const unitContextLabel = (() => {
    if (zoom === 'day') {
      return frameStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }
    if (zoom === 'week') {
      return frameStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }
    return frameStart.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
  })();

  /* Per-worker active scheduled session count — displayed in unit column for each row.
     Includes sessions where the worker is EITHER the trainee or the trainer.
     "Active" = scheduled / overdue / extended / paused (matches ACTIVE_SESSION_STATUSES). */
  const workerActiveSessionCount = (workerId) =>
    sessions.filter((s) =>
      (s.traineeId === workerId || s.trainerId === workerId)
      && ACTIVE_SESSION_STATUSES.has(s.status)
    ).length;

  /* Compute pixel position for a session bar.
     Position is measured in ms-from-frameStart, scaled to pixels. */
  function barRect(session) {
    const startMs = Math.max(session.start.getTime(), frameStartMs);
    const endMs   = Math.min(session.end.getTime(), frameStart.getTime() + totalMs);
    const clipLeft  = session.start.getTime() < frameStartMs;
    const clipRight = session.end.getTime()   > frameStart.getTime() + totalMs;
    const leftPx = ((startMs - frameStartMs) / totalMs) * totalGridWidth;
    const widthPx = ((endMs - startMs) / totalMs) * totalGridWidth;
    return { leftPx, widthPx, clipLeft, clipRight };
  }

  return (
    <div className="qmvp-grid-wrap" ref={wrapRef}>
      <div className="qmvp-grid-inner" style={{ minWidth: HEADER_WIDTH + effectiveUnitColWidth + totalGridWidth }}>

        {/* Header strip:
            Row 1: corner ("EMPLOYEE 11") + (optional) unit cell ("DAY"/"HOUR") + day headers
            Row 2 (only when showCounts): empty corner + Open Sessions label + count cells */}
        <div
          className="qmvp-grid-header-strip"
          style={{
            gridTemplateColumns: gridTemplate,
            gridTemplateRows: showCounts ? 'auto 36px' : 'auto',
          }}
        >
          {/* Row 1: corner cell with EMPLOYEE count */}
          <div className="qmvp-grid-corner">
            <span>Employee</span>
            <span className="qmvp-grid-corner-count">{WORKERS.length}</span>
          </div>

          {/* Row 1: unit-label cell (DAY / HOUR) with contextual sub-label.
             Only present when counts are shown — the column itself is dropped otherwise. */}
          {showCounts && (
            <div className="qmvp-unit-cell-r1">
              <div className="qmvp-unit-cell-label">{isHourly ? 'Hour' : 'Day'}</div>
              <div className="qmvp-unit-cell-context">{unitContextLabel}</div>
            </div>
          )}

          {/* Row 1: column headers (day-of-week + day number) */}
          {Array.from({ length: numCols }).map((_, i) => {
            const t = getColTime(i);
            const isToday = sameDay(t, TODAY);
            return (
              <div
                key={'col-' + i}
                className={'qmvp-grid-col-header' + (isToday && !isHourly ? ' today' : '')}
                style={{ gridColumn: (i + dateColStart) }}
              >
                {isHourly ? (
                  <div className="qmvp-col-header-hour">{t.getHours().toString().padStart(2, '0') + ':00'}</div>
                ) : (
                  <>
                    <div className="qmvp-col-header-dow">
                      {t.toLocaleDateString('en-US', { weekday: 'short' })}
                    </div>
                    <div className="qmvp-col-header-dom">{t.getDate()}</div>
                  </>
                )}
              </div>
            );
          })}

          {/* Row 2: only rendered when counts column is visible */}
          {showCounts && (
            <>
              {/* Empty corner cell (under EMPLOYEE) */}
              <div className="qmvp-corner-r2" />

              {/* "Open Sessions" left-side label cell (in unit column) */}
              <div className="qmvp-concurrent-label-cell">
                <span>Open</span>
                <span>Sessions</span>
              </div>

              {/* Concurrency count cells */}
              {columnConcurrency.map((count, i) => {
                const t = getColTime(i);
                const isToday = !isHourly && sameDay(t, TODAY);
                const isHot = count >= hotThreshold && count > 0;
                const isActive = count > 0;
                const cls = 'qmvp-grid-concurrency-cell'
                  + (isActive ? ' active' : '')
                  + (isHot ? ' hot' : '')
                  + (isToday ? ' today' : '');
                return (
                  <div
                    key={'conc-' + i}
                    className={cls}
                    style={{ gridColumn: (i + dateColStart) }}
                    title={count + ' concurrent at ' + (isHourly ? fmtTime(t) : fmtDate(t))}
                  >
                    {count > 0 ? count : '0'}
                  </div>
                );
              })}
            </>
          )}
        </div>

        {/* Empty state when filters yield no rows */}
        {rows.length === 0 && (
          <div className="qmvp-grid-empty">
            <p className="qmvp-grid-empty-title">No matching employees</p>
            <p>No workers match the current row-level filters. Try removing some filters or clearing all.</p>
            {onClearFilters && filtersActive && (
              <button className="qmvp-empty-clear-btn" onClick={onClearFilters}>Clear all filters</button>
            )}
          </div>
        )}

        {/* Row strips */}
        {rows.map((row) => (
          <div
            key={row.id}
            className="qmvp-row-strip"
            style={{
              gridTemplateColumns: gridTemplate,
              minHeight: row.rowMinHeight,
            }}
          >
            {/* Row header (sticky left) — clickable to open profile panel */}
            <div
              className={
                'qmvp-row-header clickable'
                + (focusedWorkerId === row.id ? ' focused' : '')
              }
              style={{ minHeight: row.rowMinHeight }}
              onClick={() => onRowHeaderClick(row.id)}
            >
              <Avatar worker={row.worker} />
              <div className="qmvp-row-meta">
                <div className="qmvp-row-name">
                  {row.worker.name}
                  <span className="qmvp-shift-chip">{row.worker.shift}</span>
                  {row.worker.canTrain && (
                    <span className="qmvp-trainer-chip">Trainer</span>
                  )}
                </div>
                <div className="qmvp-row-sub">{row.worker.role}</div>
              </div>
            </div>

            {/* Unit-column cell for this worker — shows their active scheduled session count.
               Only rendered when the counts column is visible. */}
            {showCounts && (
              <div
                className="qmvp-row-unit-cell"
                style={{ minHeight: row.rowMinHeight }}
                title="Open scheduled sessions"
              >
                {(() => {
                  const count = workerActiveSessionCount(row.id);
                  return (
                    <div className={'qmvp-row-unit-count' + (count === 0 ? ' zero' : '')}>
                      {count}
                    </div>
                  );
                })()}
              </div>
            )}

            {/* Background cells (clickable for empty-cell scheduling) */}
            {Array.from({ length: numCols }).map((_, i) => {
              const t = getColTime(i);
              const isToday = !isHourly && sameDay(t, TODAY);
              return (
                <div
                  key={'bg-' + row.id + '-' + i}
                  className={'qmvp-bg-cell' + (isToday ? ' today' : '')}
                  style={{ gridColumn: (i + dateColStart), minHeight: row.rowMinHeight }}
                  onClick={() => onCellClick(row.worker, t)}
                />
              );
            })}

            {/* Bars overlay — single layer per row, holds all bars for this worker */}
            <div
              className="qmvp-bars-overlay"
              style={{
                left: HEADER_WIDTH + effectiveUnitColWidth,
                width: totalGridWidth,
              }}
            >
              {row.windows.map((w) => {
                const { leftPx, widthPx, clipLeft, clipRight } = barRect(w);
                const top = 8 + w.lane * laneHeight;
                const objective = OBJECTIVES.find((o) => o.id === w.objectiveId);
                const trainer = WORKERS.find((x) => x.id === w.trainerId);
                const trainee = WORKERS.find((x) => x.id === w.traineeId);

                // The "other person" — shown as initials in the bar meta.
                // On a trainee row, that's the trainer. On a trainer row, that's the trainee.
                const counterpart = w.roleOnRow === 'trainer' ? trainee : trainer;
                const counterpartInitials = counterpart ? initials(counterpart.name) : '';

                // Bar label: objective name (worker is in row header).
                // For sub-day sessions in Day view, prefix the time range.
                let label = objective ? objective.name : '—';
                if (isHourly && w.start.getDate() === frameStart.getDate() && w.end.getDate() === frameStart.getDate()) {
                  label = fmtTime(w.start) + '–' + fmtTime(w.end) + ' · ' + label;
                }

                // Focus mode: dim bars not involving the focused worker.
                // A bar is "in focus" if focused worker is trainee OR trainer.
                const isInFocus = !focusedWorkerId
                  || w.traineeId === focusedWorkerId
                  || w.trainerId === focusedWorkerId;
                const dimmedClass = !isInFocus ? ' dimmed' : '';

                // Trainer-mode bars get a soft-fill variant so the role is visually distinct.
                const trainerModeClass = w.roleOnRow === 'trainer' ? ' qmvp-bar-trainer-mode' : '';

                return (
                  <div
                    key={w.id}
                    className={'qmvp-bar ' + barColourClass(w.status) + trainerModeClass + dimmedClass}
                    style={{
                      left: leftPx + 2,
                      width: Math.max(widthPx - 4, 12),
                      top,
                    }}
                    onClick={(e) => {
                      e.stopPropagation();
                      onBarClick(w);
                    }}
                    title={
                      (objective ? objective.name : '') +
                      ' · ' + (w.roleOnRow === 'trainer'
                        ? 'Teaching ' + (trainee ? trainee.name : '')
                        : 'Trainer: ' + (trainer ? trainer.name : '')) +
                      ' · ' + fmtDateFull(w.start) + (isHourly ? ' ' + fmtTime(w.start) : '')
                    }
                  >
                    {clipLeft && <span className="qmvp-clip-arrow">◀</span>}
                    {!clipLeft && <span className="qmvp-bar-dot" />}
                    <span className="qmvp-bar-label">{label}</span>
                    {widthPx > 100 && counterpartInitials && (
                      <span className="qmvp-bar-meta">· {counterpartInitials}</span>
                    )}
                    {clipRight && <span className="qmvp-clip-arrow">▶</span>}
                  </div>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ============================================================================
   BACKLOG VIEW
   ========================================================================== */

function BacklogView({ assignments, sessions, filterFn, totalRowCount, onRowClick, onClearFilters }) {
  const allRows = useMemo(() => {
    return assignments.map((a, idx) => ({
      key: a.workerId + '-' + a.objectiveId + '-' + idx,
      assignment: a,
      worker: WORKERS.find((w) => w.id === a.workerId),
      objective: OBJECTIVES.find((o) => o.id === a.objectiveId),
      schedulingStatus: deriveSchedulingStatus(sessions, a.workerId, a.objectiveId),
      activeSession: findActiveSession(sessions, a.workerId, a.objectiveId),
    })).filter((r) => r.worker && r.objective);
  }, [assignments, sessions]);

  // Apply filter (if provided)
  const rows = filterFn ? allRows.filter(filterFn) : allRows;
  const filtersActive = allRows.length !== rows.length;

  const unscheduled = rows.filter((r) => r.schedulingStatus === 'Unscheduled' && r.assignment.status !== 'active').length;
  const scheduled   = rows.filter((r) => r.schedulingStatus === 'Scheduled').length;
  const completed   = rows.filter((r) => r.assignment.status === 'active').length;

  const tagClassFor = (raw) => raw === 'in_progress' ? 'qmvp-tag-inprogress'
    : raw === 'renewal' ? 'qmvp-tag-renewal'
    : raw === 'active'  ? 'qmvp-tag-active'
    : 'qmvp-tag-assigned';

  const schedulingCellFor = (r) => {
    // Active (completed) assignment — show "Completed Apr 23, 2026"
    if (r.assignment.status === 'active') {
      const completed = findCompletedSession(sessions, r.assignment.workerId, r.assignment.objectiveId);
      const completedDate = completed ? (completed.completedAt || completed.end) : null;
      return (
        <div className="qmvp-scheduling-cell">
          <span style={{ fontSize: 12, color: 'var(--green)', fontWeight: 500 }}>Completed</span>
          {completedDate && (
            <span className="qmvp-scheduling-meta">
              {completedDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}
            </span>
          )}
        </div>
      );
    }

    // Scheduled — show tag + planned date range + trainer / workstation
    if (r.schedulingStatus === 'Scheduled') {
      const trainer = r.activeSession ? WORKERS.find((w) => w.id === r.activeSession.trainerId) : null;
      const workstation = r.activeSession ? WORKSTATIONS.find((ws) => ws.id === r.activeSession.workstationId) : null;
      return (
        <div className="qmvp-scheduling-cell">
          <span className="qmvp-tag qmvp-tag-scheduled">Scheduled</span>
          {r.activeSession && (
            <span className="qmvp-scheduling-meta">
              {fmtDate(r.activeSession.start)} → {fmtDate(r.activeSession.end)}
            </span>
          )}
          {(trainer || workstation) && (
            <span className="qmvp-scheduling-meta" style={{ color: 'var(--ink-700)' }}>
              {trainer && <>Trainer: {trainer.name}</>}
              {trainer && workstation && ' · '}
              {workstation && workstation.name}
            </span>
          )}
        </div>
      );
    }

    // Unscheduled — show dashed-outline tag
    return (
      <div className="qmvp-scheduling-cell">
        <span className="qmvp-tag qmvp-tag-unscheduled">Unscheduled</span>
      </div>
    );
  };

  return (
    <>
      <div className="qmvp-page-header">
        <h1>Training Backlog</h1>
        <p className="sub">
          All Objective Records in scope. Click an Unscheduled row to create a window,
          or a Scheduled row to edit the existing one.
        </p>
      </div>

      <div className="qmvp-table-wrap">
        {rows.length === 0 ? (
          <div className="qmvp-table-empty">
            <p className="qmvp-table-empty-title">No matching records</p>
            <p>No backlog records match the current filters. Try removing some filters or clearing all.</p>
            {onClearFilters && (
              <button className="qmvp-empty-clear-btn" onClick={onClearFilters}>Clear all filters</button>
            )}
          </div>
        ) : (
          <table className="qmvp-table">
            <thead>
              <tr>
                <th style={{ width: '28%' }}>Trainee</th>
                <th style={{ width: '24%' }}>Objective</th>
                <th style={{ width: '14%' }}>Assignment Status</th>
                <th style={{ width: '24%' }}>Scheduling Status</th>
                <th style={{ width: '10%' }}></th>
              </tr>
            </thead>
            <tbody>
            {rows.map((r) => {
              // Active (completed) assignments aren't clickable — nothing to schedule.
              const clickable = r.assignment.status !== 'active';
              return (
                <tr
                  key={r.key}
                  className={clickable ? 'clickable' : ''}
                  onClick={() => clickable && onRowClick(r.worker, r.objective, r.activeSession)}
                >
                  <td>
                    <div className="qmvp-trainee-cell">
                      <Avatar worker={r.worker} />
                      <div>
                        <div className="qmvp-trainee-name">
                          {r.worker.name}
                          <span className="qmvp-shift-chip">{r.worker.shift}</span>
                          {r.worker.canTrain && (
                            <span className="qmvp-trainer-chip">Trainer</span>
                          )}
                        </div>
                        <div className="qmvp-trainee-role">{r.worker.role}</div>
                      </div>
                    </div>
                  </td>
                  <td>
                    <div className="qmvp-objective-name">{r.objective.name}</div>
                    <span className="qmvp-objective-dur">
                      {r.objective.duration} {r.objective.duration === 1 ? 'shift' : 'shifts'}
                    </span>
                  </td>
                  <td>
                    <span className={'qmvp-tag ' + tagClassFor(r.assignment.status)}>
                      {ASSIGNMENT_LABEL[r.assignment.status]}
                    </span>
                  </td>
                  <td>
                    {schedulingCellFor(r)}
                  </td>
                  <td style={{ textAlign: 'right' }}>
                    {clickable && (
                      <span className="qmvp-row-hint">
                        {r.schedulingStatus === 'Unscheduled' ? 'Schedule →' : 'Edit →'}
                      </span>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
        )}
      </div>

      {rows.length > 0 && (
        <div className="qmvp-footer-meta">
          <div>{rows.length} records{filtersActive && ' (filtered from ' + totalRowCount + ')'}</div>
          <div>{unscheduled} unscheduled</div>
          <div>{scheduled} scheduled</div>
          {completed > 0 && <div>{completed} completed</div>}
        </div>
      )}
    </>
  );
}

/* ============================================================================
   DETAIL PANEL — opened from grid bar click
   Has Edit / Cancel / Complete actions in the footer.
   Cancel and Complete show a confirmation banner before committing.
   ========================================================================== */

function DetailPanel({ session, onClose, onEdit, onAction }) {
  const [confirmAction, setConfirmAction] = useState(null);

  if (!session) return null;
  const worker = WORKERS.find((w) => w.id === session.traineeId);
  const objective = OBJECTIVES.find((o) => o.id === session.objectiveId);
  const trainer = WORKERS.find((w) => w.id === session.trainerId);
  const workstation = WORKSTATIONS.find((ws) => ws.id === session.workstationId);

  const durationMs = session.end - session.start;
  const durationDays = Math.max(1, Math.round(durationMs / (1000 * 60 * 60 * 24)));
  const isHourSession = Boolean(session.durationHours);
  const statusLabel = SESSION_LABEL[session.status] || session.status;

  const canTakeAction = ACTIVE_SESSION_STATUSES.has(session.status);

  const confirmCopy = confirmAction === 'cancel' ? {
    title: 'Cancel this training window?',
    body: 'The window will be removed from the schedule. The underlying assignment returns to Unscheduled. The audit trail preserves the cancellation.',
    confirmLabel: 'Yes, cancel window',
    confirmClass: 'qmvp-btn-danger',
  } : confirmAction === 'complete' ? {
    title: 'Mark this window complete?',
    body: 'The objective record moves to Active. Completion is recorded against the trainee. This cannot be undone in Q MVP.',
    confirmLabel: 'Yes, mark complete',
    confirmClass: 'qmvp-btn-complete',
  } : null;

  return (
    <div className="qmvp-modal-backdrop" onClick={onClose}>
      <div className="qmvp-detail" onClick={(e) => e.stopPropagation()}>
        <div className="qmvp-detail-header">
          <h2>Training Window</h2>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <span className={'qmvp-detail-status-chip ' + session.status}>{statusLabel}</span>
            <button className="qmvp-close-btn" onClick={onClose}>×</button>
          </div>
        </div>

        <div className="qmvp-detail-body">
          <div className="qmvp-detail-row">
            <span className="qmvp-detail-label">Objective</span>
            <span className="qmvp-detail-val">{objective ? objective.name : ''}</span>
          </div>
          <div className="qmvp-detail-row">
            <span className="qmvp-detail-label">Trainee</span>
            <span className="qmvp-detail-val">{worker ? worker.name : ''}</span>
          </div>
          <div className="qmvp-detail-row">
            <span className="qmvp-detail-label">Trainer</span>
            <span className="qmvp-detail-val">{trainer ? trainer.name : ''}</span>
          </div>
          <div className="qmvp-detail-row">
            <span className="qmvp-detail-label">Workstation</span>
            <span className="qmvp-detail-val">{workstation ? workstation.name : ''}</span>
          </div>
          <div className="qmvp-detail-row">
            <span className="qmvp-detail-label">Planned Start</span>
            <span className="qmvp-detail-val">
              {fmtDateFull(session.start)}
              {isHourSession && ' · ' + fmtTime(session.start)}
            </span>
          </div>
          <div className="qmvp-detail-row">
            <span className="qmvp-detail-label">Planned End</span>
            <span className="qmvp-detail-val">
              {fmtDateFull(session.end)}
              {isHourSession && ' · ' + fmtTime(session.end)}
            </span>
          </div>
          <div className="qmvp-detail-row">
            <span className="qmvp-detail-label">Duration</span>
            <span className="qmvp-detail-val">
              {isHourSession
                ? session.durationHours + ' ' + (session.durationHours === 1 ? 'hour' : 'hours')
                : durationDays + ' ' + (durationDays === 1 ? 'shift' : 'shifts')}
            </span>
          </div>
          <div className="qmvp-detail-row">
            <span className="qmvp-detail-label">Shift</span>
            <span className="qmvp-detail-val">{session.shift}</span>
          </div>
        </div>

        {confirmCopy ? (
          <div className="qmvp-confirm-card">
            <strong>{confirmCopy.title}</strong>
            {confirmCopy.body}
            <div className="qmvp-confirm-actions">
              <button
                className="qmvp-btn qmvp-btn-secondary qmvp-btn-sm"
                onClick={() => setConfirmAction(null)}
              >Keep window</button>
              <button
                className={'qmvp-btn qmvp-btn-sm ' + confirmCopy.confirmClass}
                onClick={() => {
                  onAction(confirmAction === 'cancel' ? 'cancelled' : 'completed', session);
                  setConfirmAction(null);
                }}
              >{confirmCopy.confirmLabel}</button>
            </div>
          </div>
        ) : (
          <div className="qmvp-detail-actions">
            <div className="qmvp-detail-actions-left">
              {canTakeAction && (
                <button
                  className="qmvp-btn qmvp-btn-danger qmvp-btn-sm"
                  onClick={() => setConfirmAction('cancel')}
                >Cancel Window</button>
              )}
            </div>
            <div className="qmvp-detail-actions-right">
              {canTakeAction && (
                <button
                  className="qmvp-btn qmvp-btn-secondary qmvp-btn-sm"
                  onClick={() => onEdit(session)}
                >Edit</button>
              )}
              {canTakeAction && (
                <button
                  className="qmvp-btn qmvp-btn-complete qmvp-btn-sm"
                  onClick={() => setConfirmAction('complete')}
                >Mark Complete</button>
              )}
              {!canTakeAction && (
                <button
                  className="qmvp-btn qmvp-btn-secondary qmvp-btn-sm"
                  onClick={onClose}
                >Close</button>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================================================================
   ENTRY MODAL — opened from grid empty-cell click

   Two tabs:
   • "Existing assignments" — worker's unscheduled assignments
   • "Assign new objective" — catalog filtered to objectives this worker
                              doesn't already have

   Picking from either tab routes to SchedulerModal with the (worker, objective,
   date) context. The "Assign new" path also triggers an assignment write
   (handled by parent via onAssignAndPick).
   ========================================================================== */

function EntryModal({ worker, date, assignments, sessions, onPick, onAssignAndPick, onClose }) {
  // Existing unscheduled assignments for this worker
